      toast(`Emptied ${done} node${done === 1 ? '' : 's'}`);
    }
  },
    el('div', { class: 'row-action', style: 'color: var(--fox);' }, svg(ICON.trash)),
    el('div', { class: 'row-main' },
      el('div', { class: 'row-title' }, 'Empty this node + everything below'),
      el('div', { class: 'row-sub' }, 'from ' + state.currentAddr + ' down · continuations & branches')
    )
  ));

  body.appendChild(el('button', {
    class: 'list-row',
    onclick: async () => {
      const ok = await showPopup('Erase entire story?',
        'Every node, option, glossary entry, and bookmark in this story will be deleted. The story itself remains in your library.',
        { confirm: true, danger: true, okLabel: 'Erase content' });
      if (!ok) return;
      await eraseStoryContent();
      closeSheet();
      state.currentAddr = '1A';
      toast('Story content erased');
      renderMain();
    }
  },
    el('div', { class: 'row-action', style: 'color: var(--rate-h);' }, svg(ICON.trash)),
    el('div', { class: 'row-main' },
      el('div', { class: 'row-title' }, 'Erase entire story content'),
      el('div', { class: 'row-sub' }, 'every node in ' + state.story.title)
    )
  ));

  body.appendChild(el('button', {
    class: 'list-row',
    onclick: async () => {
      const ok = await showPopup('Delete whole story?',
        `"${state.story.title}" and all its content will be permanently removed from this device.`,
        { confirm: true, danger: true, okLabel: 'Delete story' });
      if (!ok) return;
      const slug = state.story.slug;
      state.story = null;
      state.db = null;
      await deleteStory(slug);
      closeSheet();

      toast('Story deleted');

    el('div', { class: 'row-main' },
      el('div', { class: 'row-title' }, 'Delete entire story'),
      el('div', { class: 'row-sub' }, 'remove from device')

  ));

  openSheet('Delete', body);

/* ----- Writer ----- */

/* Markdown toolbar with sticky/active mode.
   Each button toggles a "current format" state. When a button is active,
   typed characters get wrapped on the fly using a `keydown`/`input` hook
   that re-applies markers after each new character.

   For selected text, tapping a button still wraps the selection immediately
   (same as before), and the sticky mode doesn't engage.

   With no selection: the button becomes "armed" — markers get inserted now,
   the caret sits between them, and future typed characters automatically
   live inside the markers. Tapping the same button again disarms it.

   Multiple buttons can be armed at once for combined formatting. */

function wrapSelection(textarea, marker) {
  const start = textarea.selectionStart;
  const end = textarea.selectionEnd;
  const before = textarea.value.slice(0, start);
  const selected = textarea.value.slice(start, end);
  const after = textarea.value.slice(end);
  textarea.value = before + marker + selected + marker + after;
  textarea.focus();
  const newPos = start + marker.length + selected.length + marker.length;
  textarea.selectionStart = textarea.selectionEnd = newPos;
  haptic(6);
}

/* The toolbar is now an in-flow row above the textarea (see .md-toolbar CSS),
   so the textarea's visible area is fully visible and the browser's built-in
   caret-into-view does the right thing: it scrolls the minimum needed to keep
   the cursor visible, never under a bar. No manual scroll nudging needed. */

function makeMarkdownToolbar(textarea) {
  // Sticky state — markers currently active, in order of activation.
  // Each entry is the marker string like '**' or '*' or '_'.
  const active = [];

  function isActive(marker) { return active.includes(marker); }

  function setButtonState(btn, marker) {
    btn.classList.toggle('md-active', isActive(marker));
  }

  function arm(marker, btn) {
    // Insert opening + closing marker, place caret between them
    const pos = textarea.selectionStart;
    const before = textarea.value.slice(0, pos);
    const after = textarea.value.slice(pos);
    textarea.value = before + marker + marker + after;
    const caret = pos + marker.length;
    textarea.selectionStart = textarea.selectionEnd = caret;
    active.push(marker);
    setButtonState(btn, marker);
    textarea.focus();
    haptic(6);
  }

  function disarm(marker, btn) {
    // Move caret past the closing marker of `marker` if it sits right after caret
    const pos = textarea.selectionStart;
    const val = textarea.value;
    if (val.substr(pos, marker.length) === marker) {
      textarea.selectionStart = textarea.selectionEnd = pos + marker.length;
    }
    const idx = active.indexOf(marker);
    if (idx >= 0) active.splice(idx, 1);
    setButtonState(btn, marker);
    textarea.focus();
    haptic(6);
  }

  function makeButton(label, marker, cssClass) {
    const btn = el('button', {
      class: 'md-btn ' + cssClass,
      onclick: () => {
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        if (start !== end) {
          // Wrap selection immediately, don't toggle sticky mode
          wrapSelection(textarea, marker);
          return;
        }
        if (isActive(marker)) disarm(marker, btn);
        else arm(marker, btn);
      }
    }, label);
    return btn;
  }

  const bBtn = makeButton('B', '**', 'b');
  const iBtn = makeButton('I', '*',  'i');
  const uBtn = makeButton('U', '_',  'u');
  const cBtn = el('button', {
    class: 'md-btn c',
    onclick: () => openColorPicker(textarea)
  });
  cBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="18" height="18" style="vertical-align: middle;">${ICON.palette}</svg>`;

  const lBtn = el('button', {
    class: 'md-btn c',
    onclick: () => insertGlossaryLink(textarea)
  });
  lBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="18" height="18" style="vertical-align: middle;">${ICON.link}</svg>`;

  const jBtn = el('button', {
    class: 'md-btn c',
    onclick: () => insertJumpLink(textarea)
  });
  jBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="18" height="18" style="vertical-align: middle;">${ICON.jump}</svg>`;

  // The + button opens a drawer of additional, less-frequent tools.
  // Keeps the main bar to a fixed set; everything new lives in the drawer.
  const plusBtn = el('button', {
    class: 'md-btn c',
    onclick: () => openToolDrawer(textarea)
  });
  plusBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" width="18" height="18" style="vertical-align: middle;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;

  return el('div', { class: 'md-toolbar' }, bBtn, iBtn, uBtn, cBtn, lBtn, jBtn, plusBtn);
}

/* The tool drawer — a sheet of additional editor tools opened from the +
   button. Currently holds custom fonts; image insert and others will live
   here too. Keeps the main toolbar from growing past its fixed button set. */
function openToolDrawer(textarea) {
  // Snapshot the selection NOW, the instant + is tapped — before openSheet
  // steals focus and the textarea's selection collapses (which on mobile it
  // does). Every tool in here operates on this frozen range, not the live
  // selectionStart/End, which would read 0–0 by the time a row is tapped.
  const sel = { start: textarea.selectionStart, end: textarea.selectionEnd };

  const body = el('div', { class: 'list' });

  // Insert glyph text — wraps the selection (or inserts a template) in
  // {{n:...}}. If there are multiple sets, pick one first.
  body.appendChild(el('button', {
    class: 'list-row',
    onclick: () => { closeSheet(); insertGlyphText(textarea, sel); }
  },
    el('div', { class: 'row-action', style: 'color: var(--fox);' }, svg(ICON.plus)),
    el('div', { class: 'row-main' },
      el('div', { class: 'row-title' }, 'Insert glyph text'),
      el('div', { class: 'row-sub' }, 'Wrap text in a custom font')
    )
  ));

  // Redact — destructively replace the selected characters with full-block
  // glyphs. SCP-style: the text is GONE, not hidden. Newlines are preserved
  // so paragraph shape survives; everything else (letters, spaces, punctuation)
  // becomes █. Disabled with a hint if nothing was selected.
  const hasSel = sel.end > sel.start;
  body.appendChild(el('button', {
    class: 'list-row',
    style: hasSel ? '' : 'opacity: 0.45;',
    onclick: () => {
      if (!hasSel) { toast('Select text first, then tap +'); return; }
      closeSheet();
      redactSelection(textarea, sel);
    }
  },
    el('div', { class: 'row-action', style: 'color: var(--fox);' }, svg(ICON.redact)),
    el('div', { class: 'row-main' },
      el('div', { class: 'row-title' }, 'Redact selection'),
      el('div', { class: 'row-sub' }, hasSel ? 'Black out the selected text — permanent' : 'Select text first')
    )
  ));

  // Insert image — pick a file, store the blob in Dexie, drop an [IMG:id:label]
  // token on its own line at the caret. No transcoding: the original is stored
  // and rendered natively. Inserts at the caret position (snapshot start).
  body.appendChild(el('button', {
    class: 'list-row',
    onclick: () => { closeSheet(); pickAndInsertImage(textarea, sel); }
  },
    el('div', { class: 'row-action', style: 'color: var(--fox);' }, svg(ICON.image)),
    el('div', { class: 'row-main' },
      el('div', { class: 'row-title' }, 'Insert image'),
      el('div', { class: 'row-sub' }, 'Embed a picture at this point')
    )
  ));

  // Manage custom fonts — the set list / editor
  body.appendChild(el('button', {
    class: 'list-row',
    onclick: () => { closeSheet(); openGlyphSets(textarea); }
  },
    el('div', { class: 'row-action', style: 'color: var(--fox);' }, svg(ICON.palette)),
    el('div', { class: 'row-main' },
      el('div', { class: 'row-title' }, 'Manage custom fonts'),
      el('div', { class: 'row-sub' }, 'Create and edit fictional glyph sets')
    )
  ));

  openSheet('Insert', body, null, { compact: true, aboveOverlay: true });
}

/* Destructively redact a frozen selection range. Replaces every character
   in [sel.start, sel.end) with █ (U+2588 FULL BLOCK), EXCEPT newlines, which
   are kept so the text keeps its shape. There is no undo beyond the editor's
   own — this writes block chars straight into the node text, so a redacted
   node literally contains █ and travels as plain text in .cyoa exports. */
const REDACT_CHAR = '█';
function redactSelection(textarea, sel) {
  const start = Math.min(sel.start, sel.end);
  const end = Math.max(sel.start, sel.end);
  if (end <= start) { toast('Nothing selected'); return; }
  const slice = textarea.value.slice(start, end);
  const blocked = slice.replace(/[^\n]/g, REDACT_CHAR);
  textarea.value = textarea.value.slice(0, start) + blocked + textarea.value.slice(end);
  textarea.focus();
  // Leave the caret at the end of the redaction, nothing re-selected.
  textarea.selectionStart = textarea.selectionEnd = start + blocked.length;
  textarea.dispatchEvent(new Event('input', { bubbles: true })); // keep autosave/caret-keeper in sync
  haptic(12);
  toast('Redacted');
}

/* ----- Image insertion ----- */

function newImageId() {
  return 'im_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

/* Make a filename safe to live inside an [IMG:id:label] token: strip the
   characters that would break parsing (brackets, colon) plus newlines, collapse
   whitespace, and truncate. Purely cosmetic — the id is what actually resolves
   the image, so this can be lossy without consequence. */
function sanitizeImageLabel(name) {
  let s = (name || 'image').replace(/[\[\]:\n\r\|]/g, ' ').replace(/\s+/g, ' ').trim();
  if (!s) s = 'image';
  if (s.length > 40) {
    // keep the extension if there is one
    const dot = s.lastIndexOf('.');
    const ext = (dot > 0 && dot > s.length - 8) ? s.slice(dot) : '';
    s = s.slice(0, 40 - ext.length).trim() + ext;
  }
  return s;
}

/* Read a Blob's pixel dimensions without committing it to the DOM. Returns
   {w,h} or {w:0,h:0} if it can't be decoded (which also tells us the browser
   can't display it — see the reject path in pickAndInsertImage). */
function readImageDimensions(blob) {
  return new Promise((resolve) => {
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => { resolve({ w: img.naturalWidth, h: img.naturalHeight }); URL.revokeObjectURL(url); };
    img.onerror = () => { resolve({ w: 0, h: 0 }); URL.revokeObjectURL(url); };
    img.src = url;
  });
}

/* Pick an image file, validate it's something the browser can actually
   display (reject HEIC/unsupported instead of pretending to convert), store
   the original blob in Dexie, and drop an [IMG:id:label] token on its own line
   at the caret. No transcoding — original bytes are kept. */
function pickAndInsertImage(textarea, sel) {
  const input = el('input', {
    type: 'file',
    accept: 'image/png,image/jpeg,image/webp,image/gif,image/avif,image/*',
    style: 'position:fixed; left:-9999px;'
  });
  document.body.appendChild(input);
  input.addEventListener('change', async () => {
    const file = input.files && input.files[0];
    input.remove();
    if (!file) return;

    // Validate by attempting to decode. If the browser can't decode it, it
    // can't display it either (HEIC is the usual culprit) — and we can't
    // reliably transcode it, so we reject with a clear message rather than
    // storing something that renders as a broken image.
    const dims = await readImageDimensions(file);
    if (!dims.w) {
      showPopup('Unsupported image',
        'That image couldn\'t be loaded — your browser may not support its format (HEIC, for example). Try a JPEG, PNG, WebP, or GIF.',
        { okLabel: 'OK' });
      return;
    }

    const id = newImageId();
    const label = sanitizeImageLabel(file.name);
    try {
      await state.db.images.put({ id, blob: file, mime: file.type || 'image/*', name: label, w: dims.w, h: dims.h });
    } catch (err) {
      showPopup('Couldn\'t save image', 'Storing the image failed. Your device may be low on storage.', { okLabel: 'OK' });
      return;
    }

    // Build the token on its own line. Ensure a newline before and after so it
    // sits as its own block regardless of where the caret was.
    const token = `[IMG:${id}:${label}]`;
    const pos = Math.min(sel.start, sel.end);
    const before = textarea.value.slice(0, pos);
    const after = textarea.value.slice(pos);
    const needNlBefore = before.length && !before.endsWith('\n');
    const needNlAfter = after.length && !after.startsWith('\n');
    const insertText = (needNlBefore ? '\n' : '') + token + (needNlAfter ? '\n' : '');
    textarea.value = before + insertText + after;
    const caret = before.length + insertText.length;
    textarea.focus();
    textarea.selectionStart = textarea.selectionEnd = caret;
    textarea.dispatchEvent(new Event('input', { bubbles: true }));
    haptic(10);
    toast('Image inserted');
  });
  // Some mobile browsers need the input in-DOM and clicked synchronously.
  input.click();
}

/* Insert a glyph-text block {{Name:...}}. If no sets exist, offer to make
   one. If one set exists, use it directly. If several, show a picker. */
function insertGlyphText(textarea, sel) {
  const sets = state.story.glyphSets || [];
  if (sets.length === 0) {
    showPopup('No glyph sets yet',
      'You need a custom font first. Open “Manage custom fonts” to build one, then come back to insert it.',
      { okLabel: 'OK' });
    return;
  }
  if (sets.length === 1) {
    doInsertGlyph(textarea, sets[0].name, sel);
    return;
  }
  // Multiple sets — pick which one
  const body = el('div', { class: 'list' });
  body.appendChild(el('div', {
    style: 'padding: var(--pad); color: var(--ink-soft); font-size: 13px; border-bottom: 1px solid var(--line-soft);'
  }, 'Which font?'));
  sets.forEach((set) => {
    const glyphCount = Object.keys(set.glyphs || {}).length;
    body.appendChild(el('button', {
      class: 'list-row',
      onclick: () => { closeSheet(); doInsertGlyph(textarea, set.name, sel); }
    },
      el('div', { class: 'row-main' },
        el('div', { class: 'row-title' }, set.name),
        el('div', { class: 'row-sub' }, `${getGlyphMode(set)} · ${glyphCount} glyph${glyphCount === 1 ? '' : 's'}`)
      )
    ));
  });
  openSheet('Insert glyph text', body, null, { compact: true, aboveOverlay: true });
}

/* Perform the actual {{Name:...}} insertion for a chosen font name. Wraps
   the current selection; if nothing selected, drops the template with the
   caret inside ready to type. Glyph blocks go on the OUTSIDE of any other
   markup, so wrapping a selection that already contains color/links/jumps
   is fine. */
function doInsertGlyph(textarea, name, sel) {
  // Use the frozen snapshot from when + was tapped; the live selection has
  // collapsed by now. Fall back to live caret if no snapshot was passed.
  const start = sel ? Math.min(sel.start, sel.end) : textarea.selectionStart;
  const end   = sel ? Math.max(sel.start, sel.end) : textarea.selectionEnd;
  const selected = textarea.value.slice(start, end);
  const open = '{{' + name + ':';

  if (selected) {
    const tpl = open + selected + '}}';
    textarea.value = textarea.value.slice(0, start) + tpl + textarea.value.slice(end);
    const caret = start + tpl.length;
    textarea.focus();
    textarea.selectionStart = textarea.selectionEnd = caret;
  } else {
    const tpl = open + '}}';
    textarea.value = textarea.value.slice(0, start) + tpl + textarea.value.slice(end);
    const caret = start + open.length; // inside, before the }}
    textarea.focus();
    textarea.selectionStart = textarea.selectionEnd = caret;
  }
  textarea.dispatchEvent(new Event('input', { bubbles: true }));
  haptic(8);
  toast('Format: {{' + name + ': your text }}', 3500);
}

/* Insert an address jump template ((display|address)). Same caret logic
   as the glossary link inserter. */
function insertJumpLink(textarea) {
  const start = textarea.selectionStart;
  const end = textarea.selectionEnd;
  const selected = textarea.value.slice(start, end);

  if (selected) {
    const tpl = '((' + selected + '|))';
    textarea.value = textarea.value.slice(0, start) + tpl + textarea.value.slice(end);
    const caret = start + 2 + selected.length + 1; // after the pipe
    textarea.focus();
    textarea.selectionStart = textarea.selectionEnd = caret;
  } else {
    const tpl = '((|))';
    textarea.value = textarea.value.slice(0, start) + tpl + textarea.value.slice(end);
    const caret = start + 2; // at display position
    textarea.focus();
    textarea.selectionStart = textarea.selectionEnd = caret;
  }
  haptic(8);
  toast('Format: ((display | address))', 3500);
}

/* Custom font glyph sets — management screen. Lists existing sets with
   their properties, lets you create / rename / delete, and set grid size
   and smoothing per set. The actual glyph drawing editor (stage 3) opens
   from a set row; for now tapping a set shows its properties. */
function openGlyphSets(textarea) {
  const sets = state.story.glyphSets || [];
  const body = el('div', { class: 'list' });

  body.appendChild(el('div', {
    style: 'padding: var(--pad); color: var(--ink-soft); font-size: 13px; line-height: 1.5; border-bottom: 1px solid var(--line-soft);'
  }, 'A glyph set is an invented alphabet. Build one, then wrap text in your script with the set\'s number. Sets travel with the story on export.'));

  if (sets.length === 0) {

    }, 'No glyph sets yet.'));
  } else {

      },

          el('div', { class: 'row-title' }, set.name),

        ),

  // New set button
  body.appendChild(el('button', {

        input: '', placeholder: 'Set name', okLabel: 'Next'
      });
      if (name === null) return;
      const clean = name.trim() || 'Untitled script';
      if (/[{}:|]/.test(clean)) {
        await showPopup('Invalid name', 'Font names can\'t contain { } : or | — those characters are used by the markup and export format.', { okLabel: 'OK' });
        return;
      }
      if (glyphNameTaken(clean, null)) {
        await showPopup('Name taken', `You already have a font named "${clean}". Pick a different name so references stay unambiguous.`, { okLabel: 'OK' });
        return;

  openSheet('Custom fonts', body, null, { aboveOverlay: true });
}

/* Per-set properties: rename, grid size, smoothing, delete. Grid size is
   locked once glyphs exist (changing it would misplace existing strokes). */
async function openGlyphSetProperties(setId, textarea) {
  const set = state.story.glyphSets.find(s => s.id === setId);
  if (!set) { openGlyphSets(textarea); return; }
  const glyphCount = Object.keys(set.glyphs || {}).length;

  const body = el('div', { class: 'list' });

    class: 'list-row',

        input: set.name, okLabel: 'Save'
      });

      const clean = name.trim();
      if (!clean) return;
      if (/[{}:|]/.test(clean)) {

        return;

    gridRow.appendChild(el('div', {

    }, `${set.grid} × ${set.grid}`);
    const stepGrid = async (delta) => {
      const next = Math.min(16, Math.max(4, set.grid + delta));
      if (next === set.grid) return;

      onclick: async () => {

/* ----- Glyph editor (stage 3) -----
   Two parts: the assignment view (which characters have glyphs) and the
   grid drawing surface (lay strokes for one character). */

// Characters offered for assignment: lowercase, uppercase, digits, common punctuation.
const GLYPH_ASSIGNABLE = (() => {
  const lower = 'abcdefghijklmnopqrstuvwxyz'.split('');
  const upper = lower.map(c => c.toUpperCase());
  const digits = '0123456789'.split('');
  const punct = '.,!?;:\'"-—…&'.split('');
  return { lower, upper, digits, punct };
})();

function openGlyphEditor(setId, textarea) {
  const set = state.story.glyphSets.find(s => s.id === setId);
  if (!set) { openGlyphSets(textarea); return; }

  const body = el('div', {});

  // Header note
  body.appendChild(el('div', {
    style: 'padding: 12px var(--pad); color: var(--ink-soft); font-size: 13px; line-height: 1.5; border-bottom: 1px solid var(--line-soft);'
  }, `Tap any character to draw its glyph on a ${set.grid}×${set.grid} grid. Characters with a glyph are marked. Unassigned characters fall back to normal text wherever this set is used.`));

  // Render a labelled group of character cells
  function group(title, chars) {
    const wrap = el('div', { style: 'padding: 12px var(--pad);' });
    wrap.appendChild(el('div', {
      style: 'font-family: var(--sans); font-size: 11px; letter-spacing: 0.6px; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 8px;'
    }, title));
    const gridWrap = el('div', {
      style: 'display: grid; grid-template-columns: repeat(auto-fill, minmax(52px, 1fr)); gap: 6px;'
    });
    for (const ch of chars) {
      const hasGlyph = set.glyphs[ch] && set.glyphs[ch].length;
      const cell = el('button', {
        class: 'glyph-cell',
        style: 'aspect-ratio: 1; border: 1px solid ' + (hasGlyph ? 'var(--fox-soft)' : 'var(--line)') +
               '; background: ' + (hasGlyph ? 'var(--bg-elev)' : 'var(--bg-card)') +
               '; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; gap: 2px;',
        onclick: () => openGlyphGrid(setId, ch, textarea)
      });
      // The character label (small, top-left)
      cell.appendChild(el('div', {
        style: 'font-family: var(--mono); font-size: 10px; color: var(--ink-dim); position: absolute; top: 3px; left: 5px;'
      }, ch === ' ' ? '␣' : ch));
      // The glyph preview, if any
      if (hasGlyph) {
        const preview = glyphSVG(set.glyphs[ch], set.grid, getGlyphMode(set), 34, getGlyphWidth(set, ch));
        preview.style.color = 'var(--ink)';
        cell.appendChild(preview);
      } else {
        cell.appendChild(el('div', {
          style: 'font-size: 18px; color: var(--ink-dim); opacity: 0.5;'
        }, ch === ' ' ? '␣' : ch));
      }
      gridWrap.appendChild(cell);
    }
    wrap.appendChild(gridWrap);
    return wrap;
  }

  body.appendChild(group('Lowercase', GLYPH_ASSIGNABLE.lower));
  body.appendChild(group('Uppercase', GLYPH_ASSIGNABLE.upper));
  body.appendChild(group('Digits', GLYPH_ASSIGNABLE.digits));
  body.appendChild(group('Punctuation', GLYPH_ASSIGNABLE.punct));

  openSheet(set.name + ' — glyphs', body, null, { aboveOverlay: true });
}

/* The grid drawing surface for a single character. Tap points in sequence
   to build strokes; New stroke lifts the pen; Undo removes the last point;
   Clear wipes everything. Live preview reflects smoothing. Save persists. */
function openGlyphGrid(setId, ch, textarea) {
  const set = state.story.glyphSets.find(s => s.id === setId);
  if (!set) return;
  const grid = set.grid;

  // Working copy of strokes for this glyph (deep clone so cancel is clean)
  let strokes = (set.glyphs[ch] || []).map(s => s.map(p => [p[0], p[1]]));
  let current = strokes.length ? strokes[strokes.length - 1] : null;
  // Working stroke width — the surface is 300px over a `span`; the stored
  // width is in viewBox (~120) units, so scale it to surface pixels for
  // the live preview. Editing range maps the same way on save.
  let workWidth = getGlyphWidth(set, ch);

  const body = el('div', {});

  body.appendChild(el('div', {
    style: 'padding: 10px var(--pad) 4px; color: var(--ink-soft); font-size: 13px; text-align: center;'
  }, `Drawing “${ch === ' ' ? 'space' : ch}” · tap points to connect them`));

  // The SVG grid surface
  const NS = 'http://www.w3.org/2000/svg';
  const SURFACE = 300; // px
  const pad = 24;
  const span = SURFACE - pad * 2;
  const step = span / (grid - 1 || 1);
  const toPx = (i) => pad + i * step;

  const surfaceWrap = el('div', { style: 'display: flex; justify-content: center; padding: 8px;' });
  const svgEl = document.createElementNS(NS, 'svg');
  svgEl.setAttribute('width', SURFACE);
  svgEl.setAttribute('height', SURFACE);
  svgEl.style.touchAction = 'manipulation';
  svgEl.style.background = 'var(--bg-card)';
  svgEl.style.border = '1px solid var(--line)';

  // Layers: strokes path group, then dots on top
  const pathGroup = document.createElementNS(NS, 'g');
  const dotGroup = document.createElementNS(NS, 'g');
  svgEl.appendChild(pathGroup);
  svgEl.appendChild(dotGroup);

  function redraw() {
    // Reuse the shared path generator (works in 0..100 viewBox space) and
    // map it into the surface's pixel space with a group transform, so the
    // editor preview matches the real render exactly across all modes.
    pathGroup.innerHTML = '';
    // 0..100 maps to [pad .. pad+span]: scale = span/100, translate = pad
    const scale = span / 100;
    pathGroup.setAttribute('transform', `translate(${pad} ${pad}) scale(${scale})`);
    const paths = glyphStrokePaths(strokes, grid, getGlyphMode(set));
    for (const d of paths) {
      const p = document.createElementNS(NS, 'path');
      p.setAttribute('d', d);
      p.setAttribute('fill', 'none');
      p.setAttribute('stroke', 'var(--fox)');
      // Stroke width is in viewBox units; the group scale shrinks it, so
      // divide out the scale to keep the on-screen width = workWidth * scale.
      p.setAttribute('stroke-width', String(workWidth));
      p.setAttribute('stroke-linecap', 'round');
      p.setAttribute('stroke-linejoin', 'round');
      pathGroup.appendChild(p);
    }

    // Dots (drawn in raw pixel space, so this group has no transform)
    dotGroup.innerHTML = '';
    for (let gx = 0; gx < grid; gx++) {
      for (let gy = 0; gy < grid; gy++) {
        const cx = toPx(gx), cy = toPx(gy);
        const inCurrent = current && current.some(p => p[0] === gx && p[1] === gy);

        const dot = document.createElementNS(NS, 'circle');
        dot.setAttribute('cx', cx);
        dot.setAttribute('cy', cy);
        dot.setAttribute('r', inCurrent ? 5 : 3);
        dot.setAttribute('fill', inCurrent ? 'var(--fox-glow)' : 'var(--ink-dim)');
        dot.style.pointerEvents = 'none'; // the hit target below handles taps
        dotGroup.appendChild(dot);

        // Transparent finger-sized hit target on top of each visual dot.
        // `click` on SVG child elements is unreliable on Firefox for Android,
        // so we listen on pointerup — it fires consistently across browsers and
        // unifies mouse/touch/pen. The wide radius makes the tiny dots easy to
        // hit; capped below half-step so neighbouring targets don't overlap.
        const hit = document.createElementNS(NS, 'circle');
        hit.setAttribute('cx', cx);
        hit.setAttribute('cy', cy);
        hit.setAttribute('r', Math.max(8, Math.min(step * 0.45, 16)));
        hit.setAttribute('fill', 'transparent');
        hit.style.cursor = 'pointer';
        hit.style.touchAction = 'manipulation';
        hit.addEventListener('pointerup', (e) => {
          e.preventDefault();
          if (!current) { current = []; strokes.push(current); }
          const lastP = current[current.length - 1];
          if (lastP && lastP[0] === gx && lastP[1] === gy) return;
          current.push([gx, gy]);
          haptic(4);
          redraw();
        });
        dotGroup.appendChild(hit);
      }
    }
  }
  redraw();
  surfaceWrap.appendChild(svgEl);
  body.appendChild(surfaceWrap);

  // ── Glyph seeder ────────────────────────────────────────────────
  // An algorithmic starting point so a set isn't a blank-canvas grind for
  // every letter. Inline, NOT a stacked layer — the sheet is a singleton
  // and stacking here is fragile, so this lives in the body and the
  // overwrite confirm pops cleanly above it. Dials only stage a config;
  // nothing rerolls until the Randomize button (no accidental rerolls).
  const SEED_SYM = { rare: 0.15, some: 0.4, often: 0.75 };
  let seedSymKey = 'some';

  // Complexity is a single 0..1 dial with a gentle ramp: low settings stay
  // sparse (mostly straight lines), it accelerates through the middle, and
  // the top ~25% pins at full density. Maps onto the four stroke/point ranges.
  function complexityToCfg(t) {
    const tt = Math.min(t / 0.75, 1);      // last quarter plateaus at max
    const c = Math.pow(tt, 1.8);           // ease-in so the low end ramps slowly
    const lerp = (a, b) => Math.round(a + (b - a) * c);
    let skMin = lerp(1, 3), skMax = lerp(2, 6);
    let ptMin = lerp(2, 5), ptMax = lerp(3, 9);
    if (skMax < skMin) skMax = skMin;
    if (ptMax < ptMin) ptMax = ptMin;
    return { skMin, skMax, ptMin, ptMax };
  }
  let seedComplexityT = 0.5;               // default ≈ the old "medium"

  // grid + smoothing are inherited from the set, not chosen here.
  const seedCfg = Object.assign(
    { grid, bias: 'squared', jitter: 0.14, symmetry: SEED_SYM.some },
    complexityToCfg(seedComplexityT)
  );
  let seedOpen = false;

  // Compact segmented control that only stages cfg — no regen on tap.
  function seedSeg(label, options, getVal, setVal) {
    const row = el('div', { style: 'margin: 6px 0;' });
    row.appendChild(el('div', {
      style: 'font-family: var(--sans); font-size: 10px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 5px;'
    }, label));
    const seg = el('div', { style: 'display: flex; border: 1px solid var(--line);' });
    const btns = [];
    options.forEach((opt) => {
      const b = el('button', {
        style: 'flex: 1; padding: 8px 4px; border: none; background: var(--bg-card); color: var(--ink-dim); font-family: var(--sans); font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px; cursor: pointer;',
        onclick: () => { setVal(opt.val); paint(); haptic(4); }
      }, opt.label);
      btns.push([b, opt.val]);
      seg.appendChild(b);
    });
    function paint() {
      const v = getVal();
      btns.forEach(([b, val]) => {
        const on = v === val;
        b.style.background = on ? 'var(--fox)' : 'var(--bg-card)';
        b.style.color = on ? 'var(--bg)' : 'var(--ink-dim)';
        b.style.fontWeight = on ? '700' : '400';
      });
    }
    paint();
    row.appendChild(seg);
    return row;
  }

  const seedWall = el('div', {
    style: 'display: grid; grid-template-columns: repeat(auto-fill, minmax(58px, 1fr)); gap: 6px; margin-top: 10px;'
  });

  function regenSeeds() {
    seedWall.innerHTML = '';
    for (let i = 0; i < 12; i++) {
      const g = GlyphSeeder.generate(seedCfg);
      const cell = el('button', {
        class: 'glyph-cell',
        style: 'aspect-ratio: 1; border: 1px solid var(--line); background: var(--bg-card); display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 6px;',
        onclick: () => applySeed(g)
      });
      // Preview in THIS set's mode + the current thickness, so it's WYSIWYG.
      const svg = glyphSVG(g, grid, getGlyphMode(set), 42, workWidth);
      svg.style.color = 'var(--ink)';
      cell.appendChild(svg);
      seedWall.appendChild(cell);
    }
  }

  async function applySeed(g) {
    const hasContent = strokes.some((s) => s.length > 0);
    if (hasContent) {
      const ok = await showPopup(
        'Replace current drawing?',
        'This swaps the strokes on the canvas for the generated glyph. You can still edit or clear it afterwards.',
        { confirm: true, danger: true, okLabel: 'Replace', cancelLabel: 'Keep mine' }
      );
      if (!ok) return;
    }
    strokes = g.map((s) => s.map((p) => [p[0], p[1]])); // clone into the working copy
    current = strokes.length ? strokes[strokes.length - 1] : null;
    seedOpen = false;
    seedPanel.style.display = 'none';
    seedLabel.textContent = 'Randomize a glyph';
    haptic(10);
    redraw();
    toast('Glyph loaded — tweak the points or Save');
    svgEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  const seedPanel = el('div', {
    style: 'display: none; margin: 0 var(--pad); padding: 10px 12px; border: 1px solid var(--line-soft); background: var(--bg);'
  });
  seedPanel.appendChild(el('div', {
    style: 'font-size: 12px; color: var(--ink-soft); line-height: 1.5; margin-bottom: 8px;'
  }, 'Pick a style, hit Randomize, then tap one to drop it on the canvas. Grid and smoothing follow this set.'));
  seedPanel.appendChild(seedSeg('Bias',
    [{ label: 'Vert', val: 'vertical' }, { label: 'Horiz', val: 'horizontal' }, { label: 'Square', val: 'squared' }, { label: 'None', val: 'none' }],
    () => seedCfg.bias, (v) => { seedCfg.bias = v; }
  ));
  // Complexity slider — stages cfg only (no reroll until Randomize).
  const cxRow = el('div', { style: 'margin: 6px 0;' });
  cxRow.appendChild(el('div', {
    style: 'font-family: var(--sans); font-size: 10px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 5px; display: flex; justify-content: space-between;'
  }, el('span', {}, 'Complexity'), el('span', { style: 'color: var(--ink-soft);' }, 'simple ··· dense')));
  cxRow.appendChild(el('input', {
    type: 'range', min: '0', max: '100', value: String(Math.round(seedComplexityT * 100)),
    style: 'width: 100%; accent-color: var(--fox);',
    oninput: (e) => { seedComplexityT = (+e.target.value) / 100; Object.assign(seedCfg, complexityToCfg(seedComplexityT)); }
  }));
  seedPanel.appendChild(cxRow);
  seedPanel.appendChild(seedSeg('Symmetry',
    [{ label: 'Rare', val: 'rare' }, { label: 'Some', val: 'some' }, { label: 'Often', val: 'often' }],
    () => seedSymKey, (v) => { seedSymKey = v; seedCfg.symmetry = SEED_SYM[v]; }
  ));
  seedPanel.appendChild(el('button', {
    class: 'btn primary', style: 'width: 100%; margin-top: 10px;',
    onclick: () => { regenSeeds(); haptic(8); }
  }, 'Randomize'));
  seedPanel.appendChild(seedWall);

  // Mounted below the drawing tools (see further down) so randomizing stays
  // secondary to drawing your own — the toggle + panel are appended after the
  // New stroke / Undo / Clear row, not here.

  // Stroke width stepper. Range maps to viewBox units (thin 3 → chonky 22).
  const widthRow = el('div', { style: 'display: flex; align-items: center; gap: 10px; padding: 4px var(--pad);' });
  widthRow.appendChild(el('div', {
    style: 'font-family: var(--sans); font-size: 11px; letter-spacing: 0.6px; text-transform: uppercase; color: var(--ink-soft); flex: 1;'
  }, 'Thickness'));
  const widthLabel = el('div', {
    style: 'font-family: var(--mono); font-size: 14px; min-width: 36px; text-align: center;'
  }, String(workWidth));
  const stepWidth = (delta) => {
    const next = Math.min(22, Math.max(3, workWidth + delta));
    if (next === workWidth) return;
    workWidth = next;
    widthLabel.textContent = String(workWidth);
    haptic(4);
    redraw();
  };
  widthRow.appendChild(el('button', { class: 'btn ghost', style: 'min-width: 44px; font-size: 18px; font-weight: bold;', onclick: () => stepWidth(-1) }, '−'));
  widthRow.appendChild(widthLabel);
  widthRow.appendChild(el('button', { class: 'btn ghost', style: 'min-width: 44px; font-size: 18px; font-weight: bold;', onclick: () => stepWidth(1) }, '+'));
  body.appendChild(widthRow);

  // Preview button — shows the glyph large in a themed box
  body.appendChild(el('button', {
    class: 'btn ghost',
    style: 'margin: 4px var(--pad); width: calc(100% - var(--pad) * 2);',
    onclick: () => {
      const cleaned = strokes.filter(s => s.length > 0);
      if (!cleaned.length) { toast('Nothing to preview yet'); return; }
      const pv = el('div', { style: 'display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 8px 0;' });
      const box = el('div', {
        style: 'width: 200px; height: 200px; border: 2px solid var(--fox); background: var(--bg); display: flex; align-items: center; justify-content: center;'
      });
      const big = glyphSVG(cleaned, grid, getGlyphMode(set), 150, workWidth);
      big.style.color = 'var(--ink)';
      box.appendChild(big);
      pv.appendChild(box);
      pv.appendChild(el('div', {
        style: 'font-family: var(--mono); font-size: 13px; color: var(--ink-dim);'
      }, `“${ch === ' ' ? 'space' : ch}” · ${getGlyphMode(set)} · thickness ${workWidth}`));
      showPopup('Glyph preview', pv, { okLabel: 'Close' });
    }
  }, 'Preview glyph'));

  // Controls
  const controls = el('div', { style: 'display: flex; gap: 8px; padding: 8px var(--pad); flex-wrap: wrap;' });
  controls.appendChild(el('button', {
    class: 'btn ghost', style: 'flex: 1; min-width: 80px;',
    onclick: () => {
      // New stroke: start a fresh stroke on next tap
      if (current && current.length === 0) return; // already empty
      current = [];
      strokes.push(current);
      haptic(6);
      redraw();
    }
  }, 'New stroke'));
  controls.appendChild(el('button', {
    class: 'btn ghost', style: 'flex: 1; min-width: 80px;',
    onclick: () => {
      // Undo last point from current stroke (or drop empty stroke)
      if (!strokes.length) return;
      let cur = strokes[strokes.length - 1];
      if (cur.length === 0) {
        strokes.pop();
        cur = strokes[strokes.length - 1] || null;
      }
      if (cur && cur.length) cur.pop();
      // Clean trailing empty strokes
      while (strokes.length && strokes[strokes.length - 1].length === 0) strokes.pop();
      current = strokes.length ? strokes[strokes.length - 1] : null;
      haptic(6);
      redraw();
    }
  }, 'Undo point'));
  controls.appendChild(el('button', {
    class: 'btn ghost', style: 'flex: 1; min-width: 80px;',
    onclick: async () => {
      const ok = await showPopup('Clear glyph?', 'Remove all strokes for this character?', { confirm: true, okLabel: 'Clear' });
      if (!ok) return;
      strokes = [];
      current = null;
      haptic(10);
      redraw();
    }
  }, 'Clear'));
  body.appendChild(controls);

  // Randomizer mounts here — below the drawing tools — so it reads as a
  // helper, not the main event, and doesn't push the tools off-screen. Given
  // an accent look (fox outline + shuffle icon) so it still catches the eye —
  // label lives in its own span so toggling text doesn't nuke the icon.
  const seedIcon = svg(ICON.shuffle);
  seedIcon.style.width = '15px';
  seedIcon.style.height = '15px';
  const seedLabel = el('span', {}, 'Randomize a glyph');
  const seedToggle = el('button', {
    class: 'btn',
    style: 'margin: 12px var(--pad); width: calc(100% - var(--pad) * 2); display: flex; align-items: center; justify-content: center; gap: 8px; background: transparent; border: 1px solid var(--fox); color: var(--fox); font-weight: 700;',
    onclick: () => {
      seedOpen = !seedOpen;
      seedPanel.style.display = seedOpen ? 'block' : 'none';
      seedLabel.textContent = seedOpen ? 'Hide randomizer' : 'Randomize a glyph';
      if (seedOpen && !seedWall.childElementCount) regenSeeds();
    }
  }, seedIcon, seedLabel);
  body.appendChild(seedToggle);
  body.appendChild(seedPanel);

  // Save / cancel
  const actions = el('div', { style: 'display: flex; gap: 8px; padding: 8px var(--pad) 14px; border-top: 1px solid var(--line-soft); margin-top: 4px;' });
  actions.appendChild(el('button', {
    class: 'btn ghost', style: 'flex: 1;',
    onclick: () => openGlyphEditor(setId, textarea)
  }, 'Cancel'));
  actions.appendChild(el('button', {
    class: 'btn primary', style: 'flex: 1;',
    onclick: async () => {
      // Strip empty strokes before saving
      const cleaned = strokes.filter(s => s.length > 0);
      if (!set.glyphWidths) set.glyphWidths = {};
      if (cleaned.length === 0) {
        // No strokes = remove the glyph assignment and its width
        delete set.glyphs[ch];
        delete set.glyphWidths[ch];
      } else {
        set.glyphs[ch] = cleaned;
        set.glyphWidths[ch] = workWidth;
      }
      await saveGlyphSets();
      haptic(12);
      openGlyphEditor(setId, textarea);
    }
  }, 'Save glyph'));
  body.appendChild(actions);

  openSheet('Draw glyph', body, null, { aboveOverlay: true });
}

/* Insert a glossary link template at the caret. If text is selected, it
   becomes the display portion: [[selected|]] with caret after the pipe
   (ready to type the key). If nothing is selected, inserts [[|]] with the
   caret at the display position (the first thing you fill in). A toast
   reminds the user of the format. */
function insertGlossaryLink(textarea) {
  const start = textarea.selectionStart;
  const end = textarea.selectionEnd;
  const selected = textarea.value.slice(start, end);

  if (selected) {
    const tpl = '[[' + selected + '|]]';
    textarea.value = textarea.value.slice(0, start) + tpl + textarea.value.slice(end);
    // Caret right after the pipe, ready for the key
    const caret = start + 2 + selected.length + 1;
    textarea.focus();
    textarea.selectionStart = textarea.selectionEnd = caret;
  } else {
    const tpl = '[[|]]';
    textarea.value = textarea.value.slice(0, start) + tpl + textarea.value.slice(end);
    // Caret between the [[ and | — the display text goes first
    const caret = start + 2;
    textarea.focus();
    textarea.selectionStart = textarea.selectionEnd = caret;
  }
  haptic(8);
  toast('Format: [[display | key]]', 3500);
}

/* Legacy alias kept for any other callers */
function applyMarkdown(textarea, marker) { wrapSelection(textarea, marker); }

/* Color picker popup invoked from the writer toolbar. Captures the
   current textarea selection BEFORE opening (since opening shifts focus),
   shows the palette UI, and on pick wraps the captured selection in
   {color:value}text} markup. If nothing was selected, inserts an empty
   color span at the caret position so the user can type into it. */
function openColorPicker(textarea) {
  const start = textarea.selectionStart;
  const end = textarea.selectionEnd;
  const selectedText = textarea.value.slice(start, end);
  const hadSelection = start !== end;

  const NAMED = [
    { name: 'red',    label: 'Red' },
    { name: 'orange', label: 'Orange' },
    { name: 'yellow', label: 'Yellow' },
    { name: 'green',  label: 'Green' },
    { name: 'blue',   label: 'Blue' },
    { name: 'purple', label: 'Purple' },
    { name: 'pink',   label: 'Pink' },
    { name: 'gray',   label: 'Gray' }
  ];

  function applyColor(colorToken) {
    // colorToken is either a named-color string ("red") or a hex code ("#ff5722").
    const wrapped = '{' + colorToken + ':' + selectedText + '}';
    textarea.value = textarea.value.slice(0, start) + wrapped + textarea.value.slice(end);
    textarea.focus();
    if (hadSelection) {
      // Position caret after the inserted block
      const newPos = start + wrapped.length;
      textarea.selectionStart = textarea.selectionEnd = newPos;
    } else {
      // Place caret inside the empty color block so user can type
      const innerPos = start + colorToken.length + 2; // "{color:".length
      textarea.selectionStart = textarea.selectionEnd = innerPos;
    }
    haptic(8);
  }

  async function addToRecents(hex) {
    const cur = state.settings.recentColors || [];
    const without = cur.filter(c => c.toLowerCase() !== hex.toLowerCase());
    const next = [hex, ...without].slice(0, 8);
    await saveSetting('recentColors', next);
  }

  const body = el('div', {});

  // Row 1: named palette
  body.appendChild(el('div', {
    style: 'font-family: var(--sans); font-size: 11px; letter-spacing: 0.6px; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 8px;'
  }, 'Palette'));
  const palette = el('div', { style: 'display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap;' });
  for (const c of NAMED) {
    const swatch = el('button', {
      style: `width: 36px; height: 36px; border: 1px solid var(--line); background: var(--text-${c.name}); cursor: pointer;`,
      title: c.label,
      onclick: () => { applyColor(c.name); resolvePopup(true); }
    });
    palette.appendChild(swatch);
  }
  body.appendChild(palette);

  // Row 2: recents
  body.appendChild(el('div', {
    style: 'font-family: var(--sans); font-size: 11px; letter-spacing: 0.6px; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 8px;'
  }, 'Recent'));
  const recents = state.settings.recentColors || [];
  const recentsRow = el('div', { style: 'display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap;' });
  for (let i = 0; i < 8; i++) {
    const hex = recents[i];
    if (hex) {
      const swatch = el('button', {
        style: `width: 36px; height: 36px; border: 1px solid var(--line); background: ${hex}; cursor: pointer;`,
        title: hex,
        onclick: () => { applyColor(hex); resolvePopup(true); }
      });
      recentsRow.appendChild(swatch);
    } else {
      recentsRow.appendChild(el('div', {
        style: 'width: 36px; height: 36px; border: 1px dashed var(--line-soft); opacity: 0.4;'
      }));
    }
  }
  body.appendChild(recentsRow);

  // Row 3: custom HSV picker (in-app, identical across browsers)
  body.appendChild(el('div', {
    style: 'font-family: var(--sans); font-size: 11px; letter-spacing: 0.6px; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 8px;'
  }, 'Custom'));

  function hsvToHex(h, s, v) {
    const c = v * s, x = c * (1 - Math.abs(((h / 60) % 2) - 1)), m = v - c;
    let r, g, b;
    if (h < 60)       [r, g, b] = [c, x, 0];
    else if (h < 120) [r, g, b] = [x, c, 0];
    else if (h < 180) [r, g, b] = [0, c, x];
    else if (h < 240) [r, g, b] = [0, x, c];
    else if (h < 300) [r, g, b] = [x, 0, c];
    else              [r, g, b] = [c, 0, x];
    const to = (n) => ('0' + Math.round((n + m) * 255).toString(16)).slice(-2);
    return '#' + to(r) + to(g) + to(b);
  }
  function hexToHsv(hex) {
    const n = parseInt(hex.slice(1), 16);
    const r = ((n >> 16) & 255) / 255, g = ((n >> 8) & 255) / 255, b = (n & 255) / 255;
    const mx = Math.max(r, g, b), mn = Math.min(r, g, b), d = mx - mn;
    let h = 0;
    if (d) {
      if (mx === r) h = ((g - b) / d) % 6;
      else if (mx === g) h = (b - r) / d + 2;
      else h = (r - g) / d + 4;
      h *= 60; if (h < 0) h += 360;
    }
    return { h, s: mx ? d / mx : 0, v: mx };
  }
  // Pointer-capture drag — keeps tracking the finger even when it leaves the
  // surface, and fires reliably on Firefox mobile (bare touch can be flaky).
  function dragSurface(elm, onMove) {
    const pt = (e) => {
      const r = elm.getBoundingClientRect();
      onMove(
        Math.min(1, Math.max(0, (e.clientX - r.left) / r.width)),
        Math.min(1, Math.max(0, (e.clientY - r.top) / r.height))
      );
    };
    elm.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      try { elm.setPointerCapture(e.pointerId); } catch (_) {}
      pt(e);
      const move = (ev) => pt(ev);
      const up = () => {
        elm.removeEventListener('pointermove', move);
        elm.removeEventListener('pointerup', up);
        elm.removeEventListener('pointercancel', up);
      };
      elm.addEventListener('pointermove', move);
      elm.addEventListener('pointerup', up);
      elm.addEventListener('pointercancel', up);
    });
  }

  let hsv = hexToHsv('#f97316');
  const svThumb = el('div', { class: 'cp-sv-thumb' });
  const svBox = el('div', { class: 'cp-sv' },
    el('div', { class: 'cp-sv-layer cp-sv-white' }),
    el('div', { class: 'cp-sv-layer cp-sv-black' }),
    svThumb
  );
  const hueThumb = el('div', { class: 'cp-hue-thumb' });
  const hueSlider = el('div', { class: 'cp-hue' }, hueThumb);
  const preview = el('div', { class: 'cp-preview' });
  const hexText = el('div', { class: 'cp-hex' });

  function renderPicker() {
    const hex = hsvToHex(hsv.h, hsv.s, hsv.v);
    svBox.style.backgroundColor = 'hsl(' + hsv.h + ', 100%, 50%)';
    svThumb.style.left = (hsv.s * 100) + '%';
    svThumb.style.top = ((1 - hsv.v) * 100) + '%';
    hueThumb.style.left = (hsv.h / 360 * 100) + '%';
    preview.style.background = hex;
    hexText.textContent = hex.toUpperCase();
    return hex;
  }
  dragSurface(svBox, (x, y) => { hsv.s = x; hsv.v = 1 - y; renderPicker(); });
  dragSurface(hueSlider, (x) => { hsv.h = x * 360; renderPicker(); });
  renderPicker();

  body.appendChild(el('div', { class: 'cp' },
    svBox,
    hueSlider,
    el('div', { class: 'cp-foot' },
      preview,
      hexText,
      el('button', {
        class: 'btn primary',
        style: 'flex: 1;',
        onclick: async () => {
          const hex = hsvToHex(hsv.h, hsv.s, hsv.v);
          await addToRecents(hex);
          applyColor(hex);
          resolvePopup(true);
        }
      }, 'Apply custom')
    )
  ));

  // Cancel
  const cancelBtn = el('button', {
    class: 'btn ghost',
    style: 'width: 100%;',
    onclick: () => resolvePopup(null)
  }, 'Cancel');
  body.appendChild(cancelBtn);

  showPopup(hadSelection ? 'Color the selection' : 'Insert colored text', body, { noActions: true });
}

function openWriter(mode, opts) {
  // mode: 'new' | 'edit' | 'branch'
  const { addr, fromAddr, isRoot } = opts;
  let chosenRating = state.settings.maxRating === 'L' ? 'L' :
                     state.settings.maxRating === 'M' ? 'M' : 'L';

  let initialText = '';
  let initialSubtitle = '';

  (async () => {
    if (mode === 'edit') {
      const node = await getNode(addr);
      if (node) {
        initialText = node.text || '';
        initialSubtitle = node.subtitle || '';
        chosenRating = await getRating(addr);
      }
    } else if (mode === 'new') {
      /* If the address already exists as an emptied (soft-deleted) node,
         preserve its existing rating + subtitle so restoring doesn't
         silently reset metadata the author chose earlier. */
      const node = await getNode(addr);
      if (node && node.emptied) {
        initialSubtitle = node.subtitle || '';
        chosenRating = await getRating(addr);
      }
    }

    const editor = el('textarea', { class: 'editor' });
    editor.value = initialText;

    const subInput = el('input', { type: 'text', placeholder: 'Optional short preview shown when spoilers are hidden' });
    subInput.value = initialSubtitle;

    /* Rating picker shows on any branch-root address (matches `<digits>A`
       at end) regardless of mode, plus on explicit branch creation.
       Previously this only covered edit-mode for branch roots, so writing
       fresh content to a branch-root address via "Write here" silently
       skipped the rating step. */
    let needsRating = isRoot || mode === 'branch' || /[0-9]+A$/.test(addr);

    function ratingBtn(letter) {
      const b = el('button', {
        class: letter,
        onclick: () => {
          chosenRating = letter;
          document.querySelectorAll('.rating-picker button').forEach(x => x.classList.remove('selected'));
          b.classList.add('selected');
          haptic(8);
        }
      }, letter);
      if (chosenRating === letter) b.classList.add('selected');
      return b;
    }

    const overlay = el('div', { style: 'display: flex; flex-direction: column; height: 100%;' });

    const titleText =
      mode === 'edit'   ? 'Edit · ' + addr :
      mode === 'branch' ? 'New branch · ' + addr :
                          'Write · ' + addr;

    overlay.appendChild(el('div', { class: 'writer-head' },
      el('div', { class: 'writer-title' }, titleText),
      el('div', { class: 'writer-actions' },
        el('button', { class: 'btn ghost', onclick: () => closeOverlay() }, 'Cancel'),
        el('button', {
          class: 'btn primary',
          onclick: async () => {
            const text = editor.value;
            if (!text.trim()) {
              toast('Empty — nothing saved');
              closeOverlay();
              return;
            }
            // Ensure author
            if (!state.story.authorName || state.story.authorName === 'Anonymous') {
              const name = await showPopup('Your name',
                'Pick a name to sign this with. You can change it later.',
                { input: '' });
              if (name && name.trim() && !name.includes('|') && !name.includes('\n')) {
                state.story.authorName = name.trim();
                await saveStoryMeta();
              }
            }
            // Save node
            const newNode = {
              address: addr,
              text,
              author: state.story.authorName,
              rating: needsRating ? chosenRating : '',
              subtitle: subInput.value.trim(),
              emptied: false
            };
            await putNode(newNode);

            // Wire up options for new/branch
            if (mode === 'new' && fromAddr) {
              await addOption(fromAddr, addr);
            } else if (mode === 'new' && !isRoot) {
              // Implicit forward link from prev step
              const prv = prevStepAddr(addr);
              if (prv && await nodeExists(prv)) {
                // Forward in same segment doesn't need an explicit option entry,
                // because :fwd uses the address arithmetic. But we still create
                // it to be safe and keep parity with bash semantics.
                await addOption(prv, addr);
              }
            } else if (mode === 'branch' && fromAddr) {
              await addOption(fromAddr, addr);
            }

            closeOverlay();
            haptic(15);
            toast('Saved');
            await navigateTo(addr, true);
          }
        }, 'Save')
      )
    ));

    overlay.appendChild(el('div', { class: 'writer-meta' },
      el('span', {}, el('strong', {}, 'Address: '), addr),
      el('span', { style: 'margin-left: auto;' },
        el('strong', {}, 'as '), state.story.authorName)
    ));

    const toolbar = makeMarkdownToolbar(editor);
    // Exit-writing-mode button rides in the toolbar (always-visible top bar),
    // hidden by CSS until writing mode is active.
    toolbar.appendChild(el('button', {
      class: 'md-btn writing-exit-btn',
      title: 'Exit writing mode',
      onclick: () => overlay.classList.remove('writing-mode')
    }, 'Done'));

    overlay.appendChild(el('div', { class: 'editor-wrap' },
      editor,
      toolbar
    ));

    overlay.appendChild(el('div', { class: 'subtitle-row' },
      el('div', { class: 'subtitle-field' },

        title: 'Collapse everything but the editor for more writing space',
        onclick: () => { overlay.classList.add('writing-mode'); editor.focus(); }

}
