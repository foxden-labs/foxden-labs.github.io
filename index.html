/* ============================================================
   CYOA Engine — Web
   Single-file vanilla. Dexie for IndexedDB, no other deps.
   ============================================================ */

:root {
  /* Default theme: fox-dark (cooler, more grey, more vibrant orange) */
  --bg:          #0a0a0b;
  --bg-raised:   #131315;
  --bg-card:     #15161a;
  --bg-elev:     #1e2025;
  --line:        #2a2c33;
  --line-soft:   #1c1e22;

  --ink:         #ebe6dc;
  --ink-soft:    #a8a39a;
  --ink-dim:     #5e5d5a;

  --fox:         #f97316;
  --fox-glow:    #ff8a3d;
  --fox-soft:    #5a2a0c;

  --rate-l:      #6fb04f;
  --rate-m:      #e0a83b;
  --rate-h:      #d65540;

  /* Named text colors for inline {color:text} markup.
     Tuned for dark backgrounds. Overridden per theme below. */
  --text-red:    #e57373;
  --text-orange: #ffa566;
  --text-yellow: #f3d35e;
  --text-green:  #7ec77a;
  --text-blue:   #6bb6ff;
  --text-purple: #b993f4;
  --text-pink:   #f48bba;
  --text-gray:   #a09e98;
  --text-jump:   #3fb6c4;

  --serif:      Georgia, "Times New Roman", "DejaVu Serif", serif;
  --sans:       "Helvetica Neue", "Helvetica", "Arial", sans-serif;
  --mono:       "SF Mono", "Menlo", "Consolas", monospace;

  --pad:        16px;
  --pad-sm:     10px;
  --pad-lg:     22px;
  --rad:        2px;
  --speed:      220ms;
  --ease:       cubic-bezier(0.4, 0, 0.2, 1);

  /* Scales — controlled by Accessibility settings, applied to :root inline */
  --text-scale: 1;
  --ui-scale:   1;
  /* Optimal reading column on wide screens. Mobile ignores this. */
  --read-max:   640px;
  --edit-max:   720px;
}

/* Warm dark — the original sepia-tinted palette, kept as an alternate */
[data-theme="warm"] {
  --bg:          #0d0c0b;
  --bg-raised:   #181715;
  --bg-card:     #1a1816;
  --bg-elev:     #232120;
  --line:        #2a2724;
  --line-soft:   #1f1d1b;

  --ink:         #e8e3d8;
  --ink-soft:    #b3ada1;
  --ink-dim:     #6e6a62;

  --fox:         #d96e1e;
  --fox-glow:    #f08438;
  --fox-soft:    #6b3a14;
}

/* Light mode — paper-warm with fox orange */
[data-theme="light"] {
  --bg:          #faf7f0;
  --bg-raised:   #f3eee2;
  --bg-card:     #ffffff;
  --bg-elev:     #f0ebde;
  --line:        #d8d2c2;
  --line-soft:   #e6e1d2;

  --ink:         #1a1815;
  --ink-soft:    #4a463e;
  --ink-dim:     #8a8478;

  --fox:         #d65a0c;
  --fox-glow:    #f97316;
  --fox-soft:    #fde0c4;

  --rate-l:      #4a8a30;
  --rate-m:      #b07a18;
  --rate-h:      #b53a25;

  /* Text colors tuned darker for the light theme so they stay readable */
  --text-red:    #b53838;
  --text-orange: #c66a1a;
  --text-yellow: #a98000;
  --text-green:  #3e8a35;
  --text-blue:   #2867b5;
  --text-purple: #6b3eb8;
  --text-pink:   #b53882;
  --text-gray:   #6e6a62;
  --text-jump:   #1d7f8c;
}

/* Light theme adjustments — text rendering */
[data-theme="light"] body { color: var(--ink); }
[data-theme="light"] .toggle::after { background: var(--ink-dim); }
[data-theme="light"] .toggle.on { background: var(--fox-soft); border-color: var(--fox); }
[data-theme="light"] .toggle.on::after { background: var(--fox); }
[data-theme="light"] .gloss-link { border-bottom-color: var(--fox); }
[data-theme="light"] ::-webkit-scrollbar-thumb { background: var(--line); }

/* Blackout — true AMOLED black with brutalist fox orange. Pure #000 ground
   so black pixels are fully off on OLED screens (battery + deep contrast).
   Borrows the BLACKOUT redaction-tool palette: hard edges, warm orange,
   high-contrast ink. Lines are slightly brighter than other dark themes
   so structure stays visible against the absolute black. */
[data-theme="blackout"] {
  --bg:          #000000;
  --bg-raised:   #0a0a0a;
  --bg-card:     #0c0b0a;
  --bg-elev:     #141210;
  --line:        #2a2622;
  --line-soft:   #1a1714;

  --ink:         #e8e3d8;
  --ink-soft:    #9a948a;
  --ink-dim:     #6a655d;

  --fox:         #d96e1e;
  --fox-glow:    #f0843a;
  --fox-soft:    #a8500f;

  --rate-l:      #6fb04f;
  --rate-m:      #e0a83b;
  --rate-h:      #d65540;

  /* Text colors — punchy on pure black */
  --text-red:    #f08080;
  --text-orange: #ffab66;
  --text-yellow: #f5d65e;
  --text-green:  #82d07c;
  --text-blue:   #74bcff;
  --text-purple: #c29bff;
  --text-pink:   #f792c0;
  --text-gray:   #9a968e;
  --text-jump:   #d96e1e;
}
[data-theme="blackout"] body { color: var(--ink); }


* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  min-height: 100dvh;          /* NOT height:100% — on Fenix that locks the
                                  layout to a shortened (phantom-bottom-bar)
                                  viewport, stranding bottom-anchored UI above
                                  the real bottom. min-height lets it reach it. */
  background-color: var(--bg);  /* keep Fenix's mis-painted bottom void dark
                                   instead of letting it sample a surface colour */
  overflow: clip;              /* NOT overflow:hidden — on Fenix a root scroll
                                  container (which hidden creates) is what makes
                                  it miscompute the dynamic-toolbar viewport and
                                  strand the bottom. clip blocks overflow with no
                                  scroll container; nothing scrolls at the root
                                  anyway (every surface is position:fixed). */
  overscroll-behavior: none;
}

body {
  font-family: var(--serif);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  font-size: 17px;
  line-height: 1.55;
}

button, input, textarea, select {
  font-family: inherit;
  color: inherit;
  background: none;
  border: none;
  outline: none;
}

button { cursor: pointer; }

/* ──────────────────────────────────────────────────────────── */
/*  App shell                                                    */
/* ──────────────────────────────────────────────────────────── */

#app {
  position: fixed;
  inset: 0;            /* no explicit height: an explicit height overrides
                          bottom:0; inset:0 alone now reaches the real bottom */
  display: flex;
  flex-direction: column;
  padding-top: env(safe-area-inset-top);
  padding-bottom: 0;   /* Fenix reports a bogus non-zero safe-area-inset-bottom
                          even without viewport-fit=cover; using it paints a
                          strip in the surface's own colour. The viewport ends
                          above the system bar already (probe-verified). */
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}

/* The other full-screen fixed surfaces (.img-lightbox, .sheet-backdrop,
   .popup-host, .boot, .tree-overlay) each already set position:fixed; inset:0
   in their own rules — that's all they need. No explicit height, or it would
   override bottom:0 and re-introduce the Fenix bottom gap. */

/* Header bar */
header.top {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: calc(12px * var(--ui-scale)) var(--pad);
  border-bottom: 1px solid var(--line);
  min-height: calc(52px * var(--ui-scale));
  background: var(--bg);
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}

.story-title {
  flex: 1;
  font-size: 14px;
  letter-spacing: 0.6px;
  color: var(--ink-soft);
  font-family: var(--sans);
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.addr-pill {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.5px;
  color: var(--ink-dim);
  padding: 3px 7px;
  border: 1px solid var(--line);
  background: var(--bg-elev);
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}

.rating-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
}
.rating-dot.L { background: var(--rate-l); }
.rating-dot.M { background: var(--rate-m); }
.rating-dot.H { background: var(--rate-h); }

.icon-btn {
  width: 38px;
  height: 38px;
  display: grid;
  place-items: center;
  color: var(--ink-soft);
  transition: color var(--speed) var(--ease), transform 80ms var(--ease);
}
.icon-btn:active { transform: scale(0.92); color: var(--fox); }
.icon-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }

/* Main content area */
main.body {
  flex: 1;
  position: relative;
  overflow: hidden;
}

/* Node card stack — current and outgoing live here for slide transitions */
.node-stage {
  position: absolute;
  inset: 0;
  overflow: hidden;
}

.node-card {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  will-change: transform, opacity;
}

.node-card.enter-fwd {
  animation: slideInRight var(--speed) var(--ease) both;
}
.node-card.enter-back {
  animation: slideInLeft var(--speed) var(--ease) both;
}
.node-card.exit-fwd {
  animation: slideOutLeft var(--speed) var(--ease) both;
}
.node-card.exit-back {
  animation: slideOutRight var(--speed) var(--ease) both;
}

@keyframes slideInRight {
  from { transform: translateX(40px); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}
@keyframes slideInLeft {
  from { transform: translateX(-40px); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}
@keyframes slideOutLeft {
  from { transform: translateX(0); opacity: 1; }
  to   { transform: translateX(-40px); opacity: 0; }
}
@keyframes slideOutRight {
  from { transform: translateX(0); opacity: 1; }
  to   { transform: translateX(40px); opacity: 0; }
}

/* Node text — scrollable internally, scaled by --text-scale.
   Reading width capped by --read-width when user sets it (>0). 0 = full width. */
.node-text {
  flex: 1;
  overflow-y: auto;
  padding: var(--pad-lg) var(--pad);
  font-size: calc(18px * var(--text-scale));
  line-height: 1.65;
  color: var(--ink);
  white-space: pre-wrap;
  word-wrap: break-word;
  -webkit-overflow-scrolling: touch;
  user-select: none;
  -webkit-user-select: none;
  max-width: var(--read-width, none);
  width: 100%;
  margin-left: auto;
  margin-right: auto;
  box-sizing: border-box;
}

.node-text.empty {
  display: grid;
  place-items: center;
  color: var(--ink-dim);
  font-style: italic;
  font-size: 15px;
  text-align: center;
  padding: var(--pad);
}

/* Inline node images — block-level, sit between paragraphs. CSS-capped to the
   column width; the stored blob stays full-resolution for the lightbox. */
.node-img {
  margin: var(--pad) 0;
  display: block;
  user-select: none;
  -webkit-user-select: none;
}
.node-img img {
  display: block;
  max-width: 100%;
  height: auto;
  border: 1px solid var(--line);
  border-radius: 2px;
  cursor: zoom-in;
}
.node-img-ph {
  font-family: var(--sans);
  font-size: 12px;
  color: var(--ink-dim);
  border: 1px dashed var(--line);
  padding: 12px;
  text-align: center;
}

/* Full-resolution image overlay (lightbox). Sits above everything; tap to
   dismiss. Stays in-page — never opens a new tab or leaves the reader. */
.img-lightbox {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0, 0, 0, 0.92);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}
.img-lightbox img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}
.img-lightbox-cap {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 16px;
  text-align: center;
  font-family: var(--sans);
  font-size: 12px;
  letter-spacing: 0.5px;
  color: var(--ink-soft);
  pointer-events: none;
  padding: 0 16px;
}
.img-lightbox-x {
  position: fixed;
  top: 14px;
  right: 16px;
  background: transparent;
  border: 1px solid var(--line);
  color: var(--ink);
  font-size: 18px;
  width: 40px;
  height: 40px;
  border-radius: 2px;
  cursor: pointer;
}

/* Author/meta sub-line under node */
.node-meta {
  flex-shrink: 0;
  padding: 8px var(--pad) 6px;
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.5px;
  color: var(--ink-dim);
  text-transform: uppercase;
  border-top: 1px solid var(--line-soft);
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Glossary inline link span */
.gloss-link {
  color: var(--fox);
  border-bottom: 1px dotted var(--fox-soft);
  cursor: pointer;
  transition: color 120ms var(--ease), background 120ms var(--ease);
  padding: 0 1px;
}
.gloss-link:active {
  background: rgba(217, 110, 30, 0.18);
  color: var(--fox-glow);
}

/* Address jump links — ((display|address)). Rendered in normal text color
   with a periodic shimmer sweep so they read as interactive without a
   distinct color the reader has to decode. The shimmer is a bright band
   that travels left-to-right across the text, clipped to the glyphs.
   A faint dotted underline gives a static hint too. */
.jump-link {
  cursor: pointer;
  padding: 0 1px;
  border-bottom: 1px dotted var(--ink-dim);
  /* Shimmer: a gradient wider than the text, animated across it.
     The text fill must be transparent so the clipped gradient shows
     through the glyphs — otherwise a solid color paints over it and
     nothing appears to move (notably in Chrome). */
  /* Glow contrast: a dim resting color makes the bright sweeping band
     read as light passing through the letters. Silver/white band so it
     doesn't clash with the orange glossary links. Continuous slow sweep
     left → right with no pause — like the old iOS shimmer. The band is
     centered in the gradient and hidden off-window at both position
     extremes, so the loop restart is seamless (no flash, no jump). */
  background-image: linear-gradient(
    100deg,
    var(--ink-dim) 0%,
    var(--ink-dim) 32%,
    #c9c9c9 42%,
    #ffffff 50%,
    #c9c9c9 58%,
    var(--ink-dim) 68%,
    var(--ink-dim) 100%
  );
  background-size: 400% 100%;
  background-repeat: no-repeat;
  background-position: 100% 0;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
  animation: jump-shimmer 6s linear infinite;
}
.jump-link:active {
  filter: brightness(1.3);
}
@keyframes jump-shimmer {
  from { background-position: 100% 0; }
  to   { background-position: 0% 0; }
}

/* ──────────────────────────────────────────────────────────── */
/*  Choices section                                              */
/* ──────────────────────────────────────────────────────────── */

.choices {
  flex-shrink: 0;
  border-top: 1px solid var(--line);
  background: var(--bg-card);
  max-height: 50%;
  overflow-y: auto;
  transition: max-height var(--speed) var(--ease);
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}
.choices.collapsed {
  max-height: 44px;
  overflow: hidden;
}
.choices.collapsed .choices-list { display: none; }
.choices.collapsed .choices-empty { display: none; }

.choices-collapse-btn {
  background: none;
  border: none;
  color: var(--ink-soft);
  padding: 4px 8px;
  display: flex;
  align-items: center;
  transition: color 120ms var(--ease), transform 80ms var(--ease);
  cursor: pointer;
}
.choices-collapse-btn:active { transform: scale(0.9); color: var(--fox); }
.choices-collapse-btn svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.7;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: transform var(--speed) var(--ease);
}
.choices.collapsed .choices-collapse-btn svg {
  transform: rotate(180deg);
}

.choices-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px var(--pad);
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 1.2px;
  color: var(--ink-dim);
  text-transform: uppercase;
  border-bottom: 1px solid var(--line-soft);
}

.choices-head .more-note {
  color: var(--ink-dim);
  font-size: 10px;
  letter-spacing: 0.5px;
}

.choices-list {
  display: flex;
  flex-direction: column;
}

.choice {
  display: flex;
  align-items: stretch;
  border-bottom: 1px solid var(--line-soft);
  background: var(--bg-card);
  transition: background 120ms var(--ease), transform 90ms var(--ease);
  text-align: left;
  width: 100%;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}
.choice:last-child { border-bottom: none; }
.choice:active {
  background: var(--bg-elev);
  transform: scale(0.985);
}

.choice-num {
  flex-shrink: 0;
  width: 36px;
  display: grid;
  place-items: center;
  font-family: var(--sans);
  font-size: calc(12px * var(--text-scale));
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--fox);
  border-right: 1px solid var(--line-soft);
}

.choice-expand {
  flex-shrink: 0;
  width: 40px;
  display: grid;
  place-items: center;
  border-left: 1px solid var(--line-soft);
  color: var(--ink-dim);
  transition: color 120ms var(--ease), transform 120ms var(--ease);
}
.choice-expand svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
.choice-expand:active { color: var(--fox); transform: scale(0.9); }
.choice-expand.expanded svg { transform: rotate(180deg); }

.choice-body {
  flex: 1;
  min-width: 0;
  padding: 12px 14px;
}

.choice-line1 {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--sans);
  font-size: calc(11px * var(--text-scale));
  letter-spacing: 0.5px;
  color: var(--ink-dim);
  margin-bottom: 4px;
  text-transform: uppercase;
}

.choice-preview {
  font-size: calc(15px * var(--text-scale));
  color: var(--ink-soft);
  line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  white-space: pre-wrap;
}

.choice-preview.expanded {
  -webkit-line-clamp: unset;
  line-clamp: unset;
  display: block;
}

.choice-empty {
  font-size: calc(13px * var(--text-scale));
  color: var(--ink-dim);
  font-style: italic;
}

.choice-rating {
  font-family: var(--mono);
  font-size: calc(10px * var(--text-scale));
  font-weight: 700;
  padding: 1px 5px;
  border: 1px solid currentColor;
}
.choice-rating.L { color: var(--rate-l); }
.choice-rating.M { color: var(--rate-m); }
.choice-rating.H { color: var(--rate-h); }

.choices-empty {
  padding: var(--pad-lg) var(--pad);
  text-align: center;
  color: var(--ink-dim);
  font-size: 14px;
  font-style: italic;
}

/* ──────────────────────────────────────────────────────────── */
/*  Bottom navigation                                            */
/* ──────────────────────────────────────────────────────────── */

nav.nav {
  flex-shrink: 0;
  display: flex;
  align-items: stretch;
  border-top: 1px solid var(--line);
  background: var(--bg);
  min-height: calc(56px * var(--ui-scale));
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: calc(2px * var(--ui-scale));
  color: var(--ink-soft);
  padding: calc(6px * var(--ui-scale)) calc(4px * var(--ui-scale));
  font-family: var(--sans);
  font-size: calc(10px * var(--ui-scale));
  letter-spacing: 0.5px;
  text-transform: uppercase;
  border-right: 1px solid var(--line-soft);
  transition: color 120ms var(--ease), background 120ms var(--ease), transform 80ms var(--ease);
}
.nav-btn:last-child { border-right: none; }
.nav-btn:active:not(:disabled) {
  transform: scale(0.94);
  color: var(--fox);
}
.nav-btn:disabled,
.nav-btn.soft-disabled {
  color: var(--ink-dim);
  opacity: 0.4;
  cursor: default;
}
.nav-btn.write {
  color: var(--fox);
}
.nav-btn.write:active {
  color: var(--fox-glow);
}

.nav-btn svg {
  width: calc(20px * var(--ui-scale));
  height: calc(20px * var(--ui-scale));
  stroke: currentColor;
  fill: none;
  stroke-width: 1.7;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* ──────────────────────────────────────────────────────────── */
/*  Sheets / Modals — slide up from bottom                       */
/* ──────────────────────────────────────────────────────────── */

.sheet-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.65);
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--speed) var(--ease);
  z-index: 50;
}
.sheet-backdrop.show {
  opacity: 1;
  pointer-events: auto;
}

.sheet {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  background: var(--bg-card);
  border-top: 1px solid var(--line);
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform var(--speed) var(--ease);
  z-index: 51;
  padding-bottom: 0;   /* Fenix paints a bogus safe-area-inset-bottom strip */
}
.sheet.show {
  transform: translateY(0);
}

/* When a sheet is opened from within a full-screen overlay (the writer,
   z-index 60), it must sit above that overlay or it opens invisibly
   behind it. These bump the backdrop and sheet above the overlay. */
.sheet-backdrop.above-overlay { z-index: 62; }
.sheet.above-overlay { z-index: 63; }

/* Compact sheet: used for the Accessibility panel and any other sheet
   that needs to show the underlying UI while open. Sits in the upper-right
   corner on PC and as a smaller bottom sheet on mobile. Backdrop is
   transparent (no dimming) so live UI changes stay visible. */
.sheet-backdrop.compact { background: transparent; }
.sheet.compact {
  max-height: 70vh;
}
@media (min-width: 768px) {
  .sheet.compact {
    left: auto;
    right: 16px;
    bottom: 16px;
    width: 360px;
    border: 1px solid var(--line);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
}

.sheet-head {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px var(--pad);
  border-bottom: 1px solid var(--line);
}
.sheet-head-left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
.sheet-title-icon {
  flex: none;
  width: 22px;
  height: 22px;
  image-rendering: pixelated;
  transform: translateY(-2px);  /* the foxmark PNG has empty rows at the top of
                                   its grid, which left it sitting slightly low
                                   next to the label; nudge it back up */
}
.sheet-title-icon[hidden] { display: none; }

.sheet-title {
  font-family: var(--sans);
  font-size: calc(12px * var(--ui-scale));
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: var(--ink-soft);
}

.sheet-close {
  width: 36px;
  height: 36px;
  display: grid;
  place-items: center;
  color: var(--ink-soft);
  transition: color 120ms var(--ease), transform 80ms var(--ease);
}
.sheet-close:active { transform: scale(0.92); color: var(--fox); }

.sheet-body {
  flex: 1;
  overflow-y: auto;
  padding: var(--pad-lg) var(--pad);
  -webkit-overflow-scrolling: touch;
}

.sheet-body.tight {
  padding: 0;
}

/* Scroll hint: a soft fade pinned to the bottom edge of the sheet so it's
   visually obvious that content continues below the fold. The sheet is
   already position:fixed (its own positioning context), so the absolutely
   positioned fade anchors to it correctly without any position override.
   pointer-events:none so it never blocks taps. */
.sheet::after {
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 28px;
  background: linear-gradient(to top, var(--bg-card), transparent);
  pointer-events: none;
  z-index: 2;
}
.sheet.compact::after { height: 20px; }

/* Full-screen overlay (writer, popups) */
.overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 60;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform var(--speed) var(--ease);
  padding-top: env(safe-area-inset-top);
  padding-bottom: 0;   /* Fenix paints a bogus safe-area-inset-bottom strip */
}
.overlay.show {
  transform: translateY(0);
}

/* ──────────────────────────────────────────────────────────── */
/*  Writer / Editor                                              */
/* ──────────────────────────────────────────────────────────── */

.writer-head {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px var(--pad);
  border-bottom: 1px solid var(--line);
}

.writer-title {
  font-family: var(--sans);
  font-size: calc(12px * var(--ui-scale));
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--ink-soft);
}

.writer-actions {
  display: flex;
  gap: 4px;
}

.btn {
  font-family: var(--sans);
  font-size: calc(12px * var(--ui-scale));
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 9px 14px;
  border: 1px solid var(--line);
  color: var(--ink-soft);
  transition: color 120ms var(--ease), background 120ms var(--ease), border-color 120ms var(--ease), transform 80ms var(--ease);
  white-space: nowrap;
}
.btn:active { transform: scale(0.95); }
.btn.primary {
  color: var(--bg);
  background: var(--fox);
  border-color: var(--fox);
}
.btn.primary:active { background: var(--fox-glow); }
.btn.danger { color: var(--rate-h); border-color: var(--rate-h); }
.btn.ghost { border: none; }

.writer-meta {
  flex-shrink: 0;
  padding: 10px var(--pad);
  background: var(--bg-elev);
  font-family: var(--sans);
  font-size: calc(11px * var(--ui-scale));
  color: var(--ink-dim);
  letter-spacing: 0.4px;
  border-bottom: 1px solid var(--line-soft);
  display: flex;
  align-items: center;
  gap: 12px;
}

.writer-meta strong {
  color: var(--ink-soft);
  font-weight: 600;
}

.editor {
  flex: 1;
  width: 100%;
  resize: none;
  padding: var(--pad-lg) var(--pad);
  background: var(--bg);
  color: var(--ink);
  font-family: var(--serif);
  font-size: calc(18px * var(--text-scale));
  line-height: 1.65;
  border: none;
  user-select: text;
  -webkit-user-select: text;
  max-width: var(--read-width, none);
  margin-left: auto;
  margin-right: auto;
  box-sizing: border-box;
}

.subtitle-row {
  flex-shrink: 0;
  border-top: 1px solid var(--line);
  padding: 10px var(--pad);
  background: var(--bg-elev);
  display: flex;
  flex-direction: row;
  align-items: stretch;
  gap: 10px;
}

/* Left half: the subtitle field, shortened so the writing-mode button gets
   the other half. */
.subtitle-field {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.subtitle-row label {
  font-family: var(--sans);
  font-size: calc(10px * var(--ui-scale));
  letter-spacing: 1.1px;
  text-transform: uppercase;
  color: var(--ink-dim);
}

.subtitle-row input {
  background: var(--bg);
  border: 1px solid var(--line);
  padding: 9px 12px;
  font-family: var(--serif);
  font-size: calc(15px * var(--ui-scale));
  color: var(--ink);
  width: 100%;
  user-select: text;
  -webkit-user-select: text;
}
.subtitle-row input:focus { border-color: var(--fox-soft); }

/* Right half: the obvious "writing mode" button. Tapping it collapses all the
   editor chrome (head, meta, this row, rating picker) down to just the toolbar
   and the textarea, for maximum writing space. */
.writing-toggle {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 0 18px;
  font-family: var(--sans);
  font-size: calc(11px * var(--ui-scale));
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--fox);
  background: var(--bg);
  border: 1px solid var(--fox-soft);
  border-radius: 2px;
  transition: background 120ms var(--ease), transform 80ms var(--ease);
}
.writing-toggle .wt-icon { font-size: 1.5em; line-height: 0.8; }
.writing-toggle:active { background: var(--bg-card); transform: scale(0.97); }

/* Collapsed (writing) state — hide everything but .editor-wrap. */
.writing-mode { position: relative; }
.writing-mode .writer-head,
.writing-mode .writer-meta,
.writing-mode .subtitle-row,
.writing-mode .rating-picker { display: none; }

/* Exit-writing-mode button — lives at the end of the editor toolbar so it's
   always visible (the toolbar is pinned to the top, out of reach of both the
   keyboard and Firefox's bottom address bar). Hidden until writing mode. */
.writing-exit-btn { display: none; }
.writing-mode .writing-exit-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 auto;
  padding: 14px 22px;
  color: var(--bg);
  background: var(--fox);
  font-weight: 700;
  letter-spacing: 1.4px;
}
.writing-mode .writing-exit-btn:active { background: var(--fox-soft); color: var(--bg); transform: none; }

.rating-picker {
  flex-shrink: 0;
  display: flex;
  border-top: 1px solid var(--line);
  background: var(--bg);
}
.rating-picker button {
  flex: 1;
  padding: 14px 8px;
  font-family: var(--sans);
  font-size: calc(11px * var(--ui-scale));
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: var(--ink-soft);
  border-right: 1px solid var(--line-soft);
  transition: color 120ms var(--ease), background 120ms var(--ease);
}
.rating-picker button:last-child { border-right: none; }
.rating-picker button.selected {
  color: var(--ink);
  background: var(--bg-elev);
}
.rating-picker button.L.selected { box-shadow: inset 0 -3px 0 var(--rate-l); }
.rating-picker button.M.selected { box-shadow: inset 0 -3px 0 var(--rate-m); }
.rating-picker button.H.selected { box-shadow: inset 0 -3px 0 var(--rate-h); }

/* Custom HSV color picker — drawn in-app so it's identical in every browser.
   (The native <input type="color"> renders a rich spectrum in Chrome but a
   sparse Material grid in Firefox Android, so we don't use it.) */
.cp { display: flex; flex-direction: column; gap: 12px; }
.cp-sv {
  position: relative;
  width: 100%;
  height: 150px;
  border: 1px solid var(--line);
  touch-action: none;   /* drag without scrolling the popup */
  cursor: crosshair;
}
.cp-sv-layer { position: absolute; inset: 0; pointer-events: none; }
.cp-sv-white { background: linear-gradient(to right, #fff, rgba(255,255,255,0)); }
.cp-sv-black { background: linear-gradient(to top, #000, rgba(0,0,0,0)); }
.cp-hue {
  position: relative;
  width: 100%;
  height: 22px;
  border: 1px solid var(--line);
  background: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00);
  touch-action: none;
  cursor: ew-resize;
}
.cp-sv-thumb, .cp-hue-thumb {
  position: absolute;
  width: 16px;
  height: 16px;
  border: 2px solid #fff;
  border-radius: 50%;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.6);
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.cp-hue-thumb { top: 50%; }
.cp-foot { display: flex; align-items: center; gap: 10px; }
.cp-preview { width: 36px; height: 36px; flex-shrink: 0; border: 1px solid var(--line); }
.cp-hex {
  font-family: ui-monospace, Menlo, Consolas, monospace;
  font-size: calc(13px * var(--ui-scale));
  letter-spacing: 1px;
  color: var(--ink-soft);
}

/* ──────────────────────────────────────────────────────────── */
/*  Sheet content lists                                          */
/* ──────────────────────────────────────────────────────────── */

.list {
  display: flex;
  flex-direction: column;
}

.list-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px var(--pad);
  border-bottom: 1px solid var(--line-soft);
  transition: background 120ms var(--ease), transform 90ms var(--ease);
  cursor: pointer;
  text-align: left;
  width: 100%;
  user-select: none;
  -webkit-user-select: none;
}
.list-row:last-child { border-bottom: none; }
.list-row:active {
  background: var(--bg-elev);
  transform: scale(0.99);
}

.list-row .row-main {
  flex: 1;
  min-width: 0;
}

.list-row .row-title {
  font-size: calc(15px * var(--ui-scale));
  color: var(--ink);
  margin-bottom: 3px;
  word-wrap: break-word;
}

.list-row .row-sub {
  font-family: var(--sans);
  font-size: calc(11px * var(--ui-scale));
  letter-spacing: 0.4px;
  color: var(--ink-dim);
  text-transform: uppercase;
}

.list-row.no-tap {
  cursor: default;
}
.list-row.no-tap:active {
  background: transparent;
  transform: none;
}

.list-row .row-action {
  flex-shrink: 0;
  width: calc(36px * var(--ui-scale));
  height: calc(36px * var(--ui-scale));
  display: grid;
  place-items: center;
  color: var(--ink-dim);
  transition: color 120ms var(--ease);
}
.list-row .row-action:active { color: var(--rate-h); }
.list-row .row-action svg {
  width: calc(22px * var(--ui-scale));
  height: calc(22px * var(--ui-scale));
}

.empty-state {
  padding: var(--pad-lg);
  text-align: center;
  color: var(--ink-dim);
  font-size: 14px;
  font-style: italic;
}

/* Settings rows (key-value) */
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px var(--pad);
  border-bottom: 1px solid var(--line-soft);
  gap: 12px;
}
.settings-row:last-child { border-bottom: none; }

.settings-row .label {
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  color: var(--ink-soft);
}

.settings-row .value {
  font-size: 14px;
  color: var(--ink);
  font-family: var(--sans);
}

.settings-row.tappable {
  cursor: pointer;
  transition: background 120ms var(--ease);
}
.settings-row.tappable:active { background: var(--bg-elev); }

.toggle {
  width: 44px;
  height: 24px;
  border-radius: 12px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  position: relative;
  transition: background 120ms var(--ease), border-color 120ms var(--ease);
  flex-shrink: 0;
}
.toggle::after {
  content: "";
  position: absolute;
  top: 2px;
  left: 2px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--ink-dim);
  transition: transform 180ms var(--ease), background 120ms var(--ease);
}
.toggle.on {
  background: var(--fox-soft);
  border-color: var(--fox);
}
.toggle.on::after {
  transform: translateX(20px);
  background: var(--fox-glow);
}

/* Glossary entry display */
.gloss-entry {
  padding: var(--pad);
}
.gloss-entry .g-title {
  font-size: 22px;
  font-family: var(--serif);
  color: var(--ink);
  margin-bottom: 8px;
}
.gloss-entry .g-meta {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--ink-dim);
  margin-bottom: 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}
.gloss-entry .g-meta .stamp {
  color: var(--fox);
}
.gloss-entry .g-text {
  font-size: 16px;
  line-height: 1.65;
  color: var(--ink);
  white-space: pre-wrap;
  word-wrap: break-word;
  user-select: text;
}
.gloss-entry .g-empty {
  color: var(--ink-dim);
  font-style: italic;
  margin-bottom: 14px;
  font-size: 14px;
}
.gloss-entry .g-actions {
  margin-top: 18px;
  display: flex;
  gap: 8px;
}

/* ──────────────────────────────────────────────────────────── */
/*  Popups (centered modal)                                      */
/* ──────────────────────────────────────────────────────────── */

.popup-host {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--speed) var(--ease);
  z-index: 70;
  padding: var(--pad);
}
.popup-host.show {
  opacity: 1;
  pointer-events: auto;
}

.popup-box {
  background: var(--bg-card);
  border: 1px solid var(--line);
  padding: var(--pad-lg);
  width: 100%;
  max-width: 420px;
  transform: scale(0.92);
  opacity: 0;
  transition: transform var(--speed) var(--ease), opacity var(--speed) var(--ease);
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.popup-host.show .popup-box {
  transform: scale(1);
  opacity: 1;
}

.popup-title {
  font-family: var(--sans);
  font-size: 12px;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: var(--fox);
}

.popup-body {
  font-size: 15px;
  line-height: 1.5;
  color: var(--ink);
  user-select: text;
}

.popup-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--line);
  padding: 10px 12px;
  font-family: var(--serif);
  font-size: 16px;
  color: var(--ink);
  user-select: text;
  -webkit-user-select: text;
}
.popup-input:focus { border-color: var(--fox-soft); }

.popup-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

/* Toast */
.toast {
  position: fixed;
  top: calc(16px + env(safe-area-inset-top));
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--ink);
  color: var(--bg);
  padding: 10px 16px;
  font-family: var(--sans);
  font-size: 12px;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  z-index: 80;
  opacity: 0;
  pointer-events: none;
  transition: opacity 200ms var(--ease), transform 200ms var(--ease);
  white-space: nowrap;
  max-width: 92vw;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: center;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Section headers inside sheets */
/* Boot / loading screen — plays once when a new story is created. Pure CSS +
   JS timing, no assets. Caret blinks, the story name types out, the Nixie
   counter spins up and settles onto the destination divergence, then fades to
   reveal the reader. Tap anywhere to skip. */
.boot {
  position: fixed;
  inset: 0;
  z-index: 300;
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 26px;
  transition: opacity var(--boot-fade, 600ms) ease;
}
.boot.out { opacity: 0; pointer-events: none; }
/* Shift variant fades IN over the live UI (boot is opaque from the start).
   Starts transparent; .in brings it to full black. Fade-out reuses .out. */
.boot.shift { opacity: 0; transition: opacity var(--boot-fade, 600ms) ease; }
.boot.shift.in { opacity: 1; }
.boot-title {
  font-family: var(--sans);
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--fox);
  text-shadow: 0 0 7px rgba(249,115,22,0.8), 0 0 20px rgba(249,115,22,0.4);
  min-height: 40px;
  /* Centered block text, NOT flex. With flex the title text and the caret were
     separate flex items, so once the text wrapped the caret got pushed onto its
     own line. As inline block flow, the caret (inline-block) flows right after
     the text and rides the end of the last wrapped line, at any width. */
  display: block;
  max-width: 88%;
  text-align: center;
  line-height: 1.2;
  padding: 0 16px;
}
.boot-caret {
  display: inline-block;
  width: 0.6em;
  height: 1em;
  margin-left: 0.06em;
  /* Cancel the caret's own footprint (width + left margin) with a negative
     right margin. It still paints, but contributes ~0 advance, so text-align
     centers on the TEXT alone instead of counting the caret as a character and
     shoving the words left. Also stops the caret from forcing an extra wrap. */
  margin-right: -0.66em;
  background: var(--fox);
  box-shadow: 0 0 8px var(--fox);
  transform: translateY(0.08em);
  animation: bootCaret 1s steps(1) infinite;
}
.boot-caret.off { animation: none; opacity: 0; }
@keyframes bootCaret { 0%,50%{opacity:1} 50.01%,100%{opacity:0} }
.boot-meter {
  display: flex;
  gap: 5px;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transition: opacity var(--boot-mfade, 500ms) ease;
}
.boot-meter.show { opacity: 1; }
.boot-slot {
  width: 40px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  border: 1px solid #23252b;
  border-radius: 2px;
  font-family: var(--sans);
  font-size: 34px;
  font-weight: 700;
  color: var(--fox);
  text-shadow: 0 0 5px rgba(249,115,22,0.85), 0 0 13px rgba(249,115,22,0.45);
}
.boot-slot.dot { width: 14px; background: transparent; border: none; color: var(--fox-glow); }
.boot-slot.int { border-color: #39342b; }
.boot-slot.blip { animation: divBlip 0.07s linear; }


.diverge {
  margin: 4px var(--pad) 10px;
  padding: 0;
}
.diverge-label {
  font-family: var(--sans);
  font-size: 9px;
  letter-spacing: 2.6px;
  text-transform: uppercase;
  color: var(--ink-dim);
  text-align: center;
  margin-bottom: 10px;
}
.diverge-readout {
  display: flex;
  gap: 5px;
  justify-content: center;
  align-items: center;
}
.diverge-slot {
  flex: 1;
  max-width: 46px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  border: 1px solid #23252b;
  border-radius: 2px;
  font-family: var(--sans);
  font-size: 27px;
  font-weight: 700;
  color: var(--fox);
  text-shadow: 0 0 5px rgba(249, 115, 22, 0.85), 0 0 13px rgba(249, 115, 22, 0.45);
}
.diverge-slot.dot { flex: 0 0 auto; width: 14px; max-width: 14px; background: transparent; border: none; color: var(--fox-glow); }
.diverge-slot.int { border-color: #39342b; }
.diverge-readout.nosignal .diverge-slot { color: var(--ink-dim); text-shadow: none; }
/* Overflow easter egg: raw divergence past the cap. Decimals churn in
   screaming red, faster and busier than the amber emptied state, with a hard
   glow. Integer + dot keep their normal fox glow. */
.diverge-readout.overflow .diverge-slot:not(.int):not(.dot) {
  color: #ff2d1a;
  text-shadow: 0 0 7px rgba(255, 30, 12, 0.95), 0 0 20px rgba(255, 20, 8, 0.6);
}

/* Emptied-node churn: sickly amber (between fox-orange and overflow-red),
   decimals spin with a vertical motion-blur smear on each digit swap. The
   integer + dot keep their normal fox glow. */
.diverge-readout.churn .diverge-slot:not(.int):not(.dot) {
  color: #ffae2e;
  text-shadow: 0 0 6px rgba(255, 150, 30, 0.9), 0 0 16px rgba(255, 110, 20, 0.5);
}
.diverge-slot.blip {
  animation: divBlip 0.07s linear;
}
@keyframes divBlip {
  0%   { filter: blur(2.5px); transform: translateY(-42%); opacity: 0.35; }
  55%  { filter: blur(1px);   transform: translateY(8%);   opacity: 0.9; }
  100% { filter: blur(0);     transform: translateY(0);    opacity: 1; }
}

.section-head {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 1.4px;
  text-transform: uppercase;

}

/* Help / Controls content */
.help-section {
  padding: 12px var(--pad) 8px;
  font-family: var(--sans);
  font-size: 10px;

.picker-crest {

     block's center sits (30-20)/2 = 5px below the box center. Nudge the crest
     down 5px so its midline lands on the text's midline, not the box's. */
  transform: translateY(calc(-50% + 5px));

.rating-onboard .ro-letter {

}

/* Hidden file input */
.file-input { display: none; }

/* Scrollbars */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }

::-webkit-scrollbar-thumb:hover { background: var(--ink-dim); }

/* ──────────────────────────────────────────────────────────── */
/*  Tree view                                                    */
/* ──────────────────────────────────────────────────────────── */

.tree-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 60;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform var(--speed) var(--ease);
  padding-top: env(safe-area-inset-top);
  padding-bottom: 0;   /* Fenix paints a bogus safe-area-inset-bottom strip */
}
.tree-overlay.show { transform: translateY(0); }

.tree-header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px var(--pad);
  border-bottom: 1px solid var(--line);
}

.tree-header .tree-title {
  font-family: var(--sans);
  font-size: 12px;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: var(--ink-soft);
}

.tree-canvas-wrap {
  flex: 1;
  overflow: hidden;
  position: relative;
  cursor: grab;
  user-select: none;
  touch-action: none;
  -webkit-touch-callout: none;
}
.tree-canvas-wrap:active { cursor: grabbing; }

.tree-svg {
  position: absolute;
  top: 0; left: 0;
  overflow: visible;
}

.tree-node rect {
  fill: var(--bg-card);
  stroke: var(--line);
  stroke-width: 1;
  transition: fill 120ms, stroke 120ms;
}
.tree-node rect.current {
  stroke: var(--fox);
  stroke-width: 2;
}
.tree-node rect.has-content { fill: var(--bg-elev); }
.tree-node rect.rating-L { stroke-left: var(--rate-l); }

.tree-node text {
  font-family: var(--mono);
  font-size: 11px;
  fill: var(--ink-soft);
  pointer-events: none;
}
.tree-node text.addr { fill: var(--ink); font-size: 12px; font-weight: bold; }
.tree-node text.curr { fill: var(--fox); }

.tree-edge {
  stroke: var(--line);
  stroke-width: 1;
  fill: none;
}

/* Visited-thread tracker — opens in its own sheet as a vertical thread (tip at
   top). The boxes reuse .tree-node / .addr / .tree-edge for their graphic; only
   this layout is the tracker's own. (.tree-svg can't be reused — it's
   position:absolute for the pan canvas.) The sheet body scrolls on its own. */
.trail-sheet { display: flex; flex-direction: column; align-items: center; }
.trail-controls {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.trail-svg { display: block; margin: 0 auto; }
.trail-hint {
  margin-bottom: 12px;
  color: var(--ink-dim);
  font-size: 12px;
  font-family: var(--mono);
}
.trail-empty { color: var(--ink-dim); font-size: 14px; padding: 8px 0; }

.tree-hint {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--ink-dim);
  pointer-events: none;
  white-space: nowrap;
}

/* ──────────────────────────────────────────────────────────── */
/*  Markdown toolbar (writer)                                    */
/* ──────────────────────────────────────────────────────────── */

/* Editor wrapper — a column of [toolbar, textarea]. The toolbar is a real
   in-flow row at the top (via order:-1), not an overlay, so it occupies its
   own space and never covers text. That's what lets the browser's native
   "scroll the caret into view" work correctly: the textarea's whole visible
   area is genuinely visible, so the caret can't end up hidden behind the bar,
   and the browser scrolls the minimum needed instead of us fighting it.
   The keyboard rises from the bottom and never reaches the top bar; the
   overlay itself is pinned to the visual viewport in JS (see pinOverlay...)
   so the keyboard/address-bar can't push the layout around. */
.editor-wrap {
  flex: 1;
  position: relative;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.editor-wrap .editor {
  flex: 1;
  min-height: 0;
  overscroll-behavior: contain; /* don't chain scroll to the page (kills rubber-band snapback) */
}

.md-toolbar {
  order: -1;        /* sits above the textarea even though it's later in the DOM */
  flex-shrink: 0;
  display: flex;
  border-bottom: 1px solid var(--line);
  background: var(--bg-elev);
  box-shadow: 0 8px 24px -8px rgba(0,0,0,0.4);
}
.md-btn {
  flex: 1;
  padding: 14px 0;
  font-family: var(--sans);
  font-size: calc(14px * var(--ui-scale));
  letter-spacing: 1.4px;
  color: var(--ink-soft);
  border-right: 1px solid var(--line-soft);
  transition: color 120ms var(--ease), background 120ms var(--ease), transform 80ms var(--ease);
}
.md-btn:last-child { border-right: none; }
.md-btn:active {
  color: var(--fox);
  background: var(--bg-card);
  transform: scale(0.96);
}
.md-btn.b { font-weight: 800; }
.md-btn.i { font-style: italic; }
.md-btn.u { text-decoration: underline; }
.md-btn.c { display: flex; align-items: center; justify-content: center; }
.md-btn.md-active {
  color: var(--fox);
  background: var(--bg-card);
  box-shadow: inset 0 -3px 0 var(--fox);
}

/* Inline markdown rendering */
.node-text strong, .gloss-entry strong, .choice-preview strong { font-weight: 700; color: var(--ink); }
.node-text em, .gloss-entry em, .choice-preview em { font-style: italic; }
.node-text u, .gloss-entry u, .choice-preview u { text-decoration: underline; text-underline-offset: 2px; }

/* In-text custom-font glyphs. Each glyph char wraps the real character
   (collapsed to zero width but still present for copy/select) and the SVG
   visual sized to the font (1em). currentColor lets glyphs inherit color
   and shimmer from ancestor spans. */
.glyph-char {
  display: inline-flex;
  align-items: center;
  position: relative;
}
.glyph-real {
  /* present for copy/selection, but takes no visual space */
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: hidden;
  opacity: 0;
  pointer-events: none;
}
.glyph-vis {
  display: inline-block;
  width: 1em;
  height: 1em;
  vertical-align: -0.15em;
}

/* Glyphs inside a shimmer jump link: the jump makes the text color
   transparent (so the gradient shows through real letters), but glyph
   SVG strokes paint with currentColor — which would then be transparent
   and invisible. Re-color glyph strokes to a visible tone inside jumps.
   (Shimmer-on-glyph is a future refinement; for now they render solid in
   the shimmer's resting color so the link is legible.) */
.jump-link .glyph-vis path { stroke: var(--ink-dim) !important; }
.jump-link:active .glyph-vis path { stroke: var(--ink) !important; }

/* Inline color spans from {color:text} markup. Color is set inline on the
   element. Glossary links override this when linksMode is on (see below). */
.md-color { /* inline `color` set via JS */ }
.md-size { line-height: 1.2; display: inline-block; }

/* When linksMode is on and a glossary link contains colored text inside it,
   the link's orange wins over the user's color choice. The .gloss-link rule
   already sets color: var(--fox); we just need to force any nested
   .md-color spans to inherit. */
.gloss-link .md-color { color: inherit !important; }

/* Same story for bold/italic/underline inside a link. The global
   `.node-text strong { color: var(--ink); }` rule (and its em/u siblings)
   has equal specificity to a plain `.gloss-link strong`, and as a direct
   element rule it out-paints the orange the bold would otherwise inherit —
   leaving only the link's underline orange. Force nested emphasis to
   inherit the link colour (and the brighter :active colour with it). */
.gloss-link strong, .gloss-link em, .gloss-link u { color: inherit !important; }

/* Tree direction hint */
.tree-direction-hint {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--ink-dim);
  pointer-events: none;
  white-space: nowrap;
}

/* Disable transitions on initial load */
.no-anim, .no-anim * {
  animation-duration: 0s !important;
  transition-duration: 0s !important;
}
/* ---- Inspire deck ---- */
.inspire-bar {

}

}
.inspire-stepper button:active { background: var(--line); }
.inspire-stepper .n {

  font-family: var(--mono); font-size: 15px; color: var(--ink);

}
.inspire-go { flex: 1; }
@media (min-width: 560px) { .inspire-bar { max-width: 420px; } }
.inspire-deckinfo {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  padding: 0 var(--pad) 12px;
  font-family: var(--sans); font-size: 12px; color: var(--ink-soft);
}
.inspire-deckinfo .acts { display: flex; gap: 16px; flex: none; }
.inspire-deckinfo button {
  background: none; border: none; padding: 0; cursor: pointer; font: inherit;
  color: var(--fox); text-transform: uppercase; letter-spacing: .05em;
}
.inspire-cards { border-top: 1px solid var(--line); }
.inspire-card {
  border-bottom: 1px solid var(--line);
  padding: 16px var(--pad);
  font-family: var(--mono); font-size: 15px; line-height: 1.55;

  font-family: var(--sans); font-size: 13px; color: var(--ink-soft);
}
.inspire-edit-ta {
  width: 100%; min-height: 220px; resize: vertical; box-sizing: border-box;
  background: var(--bg-elev); border: 1px solid var(--line); color: var(--ink);
  font-family: var(--mono); font-size: 14px; line-height: 1.5; padding: 10px;
}
@keyframes inspireIn {
  from { opacity: 0; transform: translateY(7px); }
  to   { opacity: 1; transform: translateY(0); }
}
@media (prefers-reduced-motion: reduce) {

  <!-- Content rendered into here -->
</div>

<!-- Sheet host (single sheet at a time) -->
<div class="sheet-backdrop" id="sheet-backdrop"></div>
<div class="sheet" id="sheet">
  <div class="sheet-head">
    <div class="sheet-head-left">
      <img class="sheet-title-icon" id="sheet-title-icon" alt="" hidden>
      <div class="sheet-title" id="sheet-title">—</div>
    </div>
    <button class="sheet-close" id="sheet-close" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

<!-- Overlay host (writer) -->
<div class="overlay" id="overlay"></div>

<!-- Tree view overlay -->
<div class="tree-overlay" id="tree-overlay"></div>

<!-- Popup host (prompts, confirms) -->
<div class="popup-host" id="popup-host">
  <div class="popup-box" id="popup-box"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Hidden file input for imports -->
<input type="file" id="file-input" class="file-input" accept=".cyoa,.txt">

<script>
'use strict';

/* ============================================================
   APP NAME — change this string to rename the app everywhere.
   It appears in the onboarding screen, the document title, and
   anywhere else the app refers to itself. Single source of truth.
   ============================================================ */

const APP_NAME = 'The Den';
// Brand marks, inlined as data URIs to stay single-file/offline. Stored at native
// pixel-grid resolution (tiny); CSS upscales them crisp via image-rendering: pixelated.
const ASSET_CREST = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACQAAAAkCAYAAADhAJiYAAABZ0lEQVR42s2YPQ7CMAyFmyzMLBULO6fgOEwMlZA4BFIlBiaOwym6d0EsnTuFKVKwnOTlnyzQ1rG/JLXzmq7L0N7zpN7zpHL4kqkO1kuvuP9NGgfQDIrOTNOZ4mCaQdmWqcnymQGej5s1mPmsGBQKUxUKhYmxDZ6ZlFHm8OFN7RAfIdknXY4240ekZA5nuxk/wuVD+mC49wCB4my0LxeU9MGczleBBvQ9O52vAoGCUtt8MbnK7Krc1A4qCb46g24X6DbihEKKHu1Eg7tmzjYLLJRvJFp4Icvj29M4EUfjy2V4OYvXbn8QNmCuLNB7Zh/TFxdzGV6d3N6PP46oQzoqem3ax/bVv5oF3jjXS69Q/aztXKkd9WJzo/RB2WzM6yypj0AhwEHSJAUqO0wKVDGYVKiiCjJUtlaRs6lQRbR1LFRRof+XXx02KLqpVvsEQmRIk4MHG1TTU5AYTV0NyiyKf3FohUgNtH0B9S6LPSRRJfkAAAAASUVORK5CYII=';
const ASSET_FOXMARK = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABYAAAAWCAYAAADEtGw7AAAAuUlEQVR42u2UsRHDMAhFgSYruHHjyjN6gMxIlUYNK7giVe4UBEY6K13oLPGf0TvZAP+ydR6bzmTQLLjN0ozJvQzd1RL10h3nVz1f4Mfzhb1Bu2ezzcQ98AwaqriC90ABAEgKay+8FyqFlZZ1x9FpslMt647NxPbZg9u1jAHnsakUVk+Pp+IDkcLNHkphrXXU0Ho9cun1SmHFkcBIj3vdohOMvDj8pCN4ryrM/gfRPc/8Uwb2ABn0p/UGi5CgfJxNsK0AAAAASUVORK5CYII=';

/* ============================================================
   Vanilla JS, Dexie for IndexedDB, single file.
   ============================================================ */

/* ----- Constants & DB schema ----- */

const DB_VERSION = 1;
const SETTINGS_KEYS = [
  'lastStory', 'shiftOn', 'showAuthor', 'maxRating',
  'spoilerMode', 'linksMode', 'trackerOn'
];

/* Default settings */
const DEFAULT_SETTINGS = {
  lastStory: null,
  shiftOn: false,
  showAuthor: true,
  maxRating: 'H',
  spoilerMode: false,
  linksMode: false,
  trackerOn: false,  // EXPERIMENTAL memory-thread tracker. Off by default. When
                     // off: trailRecord no-ops (author navigation never pollutes
                     // the thread) and the tracker UI is hidden. This same switch
                     // will gate the wiki later — off = legacy ancestry crawl,
                     // on = journey-thread crawl — which is also our fallback for
                     // unrecordable entries (shared links / hardware back).
  treeHideEmpty: true,  // tree view hides emptied nodes by default; persisted per toggle
  hasOnboarded: false,
  theme: 'blackout',   // default for new users; applyTheme() honors saved choice on boot
  textScale: 100,   // % — reading text size
  uiScale: 100,     // % — header, nav buttons, choices chrome
  readWidth: 0,     // px — reading column max width; 0 = full width
  recentColors: [], // most recently used custom hex colors, max 8, newest first
  inspirePool: [],   // personal prompt deck for the Inspire tool. Global (shared
                     // across all stories), persisted in registry.settings, and
                     // deliberately NOT bundled into .cyoa exports.
  inspireCount: 3    // last-used number of cards to draw
};

/* ----- Global state ----- */

const state = {
  settings: { ...DEFAULT_SETTINGS },
  story: null,
  choicesCollapsed: false,        // { slug, title, authorName, shiftN1, shiftN2 }
  currentAddr: null,
  authorFilter: null, // for :more <author>
  shuffleSeed: 0,     // bumped on :more to force re-shuffle
  linkMap: [],        // [{key, displayed}] in order of appearance for current node
  history: [],        // navigation history for back direction detection
  forwardDir: true,   // hint for next slide direction
  navForwardStack: [], // addresses pushed on back-press; popped on forward-press
  trail: [],          // the "wound string" of visited addresses. Pays out on
                      // forward moves; reels back in when you revisit a node
                      // already on it (see trailRecord). Persisted per-story in
                      // meta under 'trail' — written in navigateTo, restored in
                      // setStory. Not yet consulted by glossaryResolve.
  db: null            // Dexie handle for current story
};

/* ----- Storage layer (Dexie) -----
   We use one DB per story, keyed by slug. The "stories" registry lives in
   a meta DB. This keeps imports/exports per-story and makes deletion trivial. */

function openStoryDB(slug) {
  const db = new Dexie(`cyoa_${slug}`);
  db.version(1).stores({
    nodes:    'address, author',
    options:  '[parent+target], parent, target',
    glossary: '[key+origin_address], key',
    bookmarks: 'address, added',
    meta:     'key'  // {key, value}
  });
  // v2 — add origin_address index so glossaryVisibleFrom can query by it.
  db.version(2).stores({
    nodes:    'address, author',
    options:  '[parent+target], parent, target',
    glossary: '[key+origin_address], key, origin_address',
    bookmarks: 'address, added',
    meta:     'key'
  });
  // v3 — images store. Blobs live here (IndexedDB stores Blob natively, no
  // base64 at rest); node text references them by id via [IMG:id:label].
  // Existing stories just gain an empty table — no data migration needed.
  db.version(3).stores({
    nodes:    'address, author',
    options:  '[parent+target], parent, target',
    glossary: '[key+origin_address], key, origin_address',
    bookmarks: 'address, added',
    meta:     'key',
    images:   'id'   // {id, blob, mime, name, w, h}
  });
  return db;
}

const registry = new Dexie('cyoa_registry');
registry.version(1).stores({
  stories:  'slug, title, created',
  settings: 'key'   // {key, value}
});

/* ----- Settings I/O ----- */

async function loadSettings() {
  const rows = await registry.settings.toArray();
  const obj = { ...DEFAULT_SETTINGS };
  for (const r of rows) obj[r.key] = r.value;
  state.settings = obj;
}

async function saveSetting(key, value) {
  state.settings[key] = value;
  await registry.settings.put({ key, value });
}

/* ----- Story registry ----- */

async function listStories() {
  return await registry.stories.orderBy('created').reverse().toArray();
}

async function createStory(title) {
  let slug = (title || 'untitled')
    .toLowerCase()
    .replace(/\s+/g, '_')
    .replace(/[^a-z0-9_-]/g, '')
    .slice(0, 40);
  if (!slug) slug = 'story_' + Date.now();

  // Avoid collisions
  const existing = await registry.stories.toArray();
  const slugs = new Set(existing.map(s => s.slug));
  let final = slug, n = 1;
  while (slugs.has(final)) { final = `${slug}_${n++}`; }

  await registry.stories.put({
    slug: final,
    title: title || 'Untitled Story',
    created: Date.now()
  });

  // Initialize the story DB with default meta
  const db = openStoryDB(final);
  await db.meta.bulkPut([
    { key: 'authorName', value: 'Anonymous' },
    { key: 'shiftN1', value: 0 },
    { key: 'shiftN2', value: 1 }
  ]);
  db.close();

  return final;
}

async function deleteStory(slug) {
  await registry.stories.delete(slug);
  await Dexie.delete(`cyoa_${slug}`);
}

async function setStory(slug) {
  if (state.db) state.db.close();
  state.db = openStoryDB(slug);

  const reg = await registry.stories.get(slug);
  const meta = {};
  for (const m of await state.db.meta.toArray()) meta[m.key] = m.value;

  state.story = {
    slug,
    title: reg ? reg.title : 'Untitled',
    authorName: meta.authorName || 'Anonymous',
    shiftN1: meta.shiftN1 || 0,
    shiftN2: meta.shiftN2 || 1,
    lastAddr: meta.lastAddr || null,
    // Custom font glyph sets. Stored as a JSON array in meta under
    // 'glyphSets'. Each set: { id, name, grid, smooth, glyphs: {char: strokes} }
    glyphSets: parseGlyphSets(meta.glyphSets)
  };

  state.authorFilter = null;
  // Restore the persisted wound-string for this story (meta 'trail'). The open
  // navigation that follows runs through trailRecord, which self-heals the tip:
  // resuming to lastAddr is a no-op truncate, picking a different start appends.
  state.trail = Array.isArray(meta.trail) ? meta.trail.slice() : [];
  await saveSetting('lastStory', slug);
}

async function saveStoryMeta() {
  if (!state.db || !state.story) return;
  await state.db.meta.bulkPut([
    { key: 'authorName', value: state.story.authorName },
    { key: 'shiftN1', value: state.story.shiftN1 },
    { key: 'shiftN2', value: state.story.shiftN2 }
  ]);
}

/* ----- Custom font glyph sets -----
   A glyph set is a fictional alphabet. Stored per-story in the meta table
   as a JSON array under the key 'glyphSets'. Each set:
     { id, name, grid, smooth, glyphs }
   where glyphs maps a character to an array of strokes, each stroke an
   ordered array of [x,y] grid coordinates (0..grid-1).
   Sets are referenced in node text as {{N:text}} where N is the set's
   1-based position in the array. */

function parseGlyphSets(raw) {
  if (!raw) return [];
  try {
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch {
    return [];
  }
}

async function saveGlyphSets() {
  if (!state.db || !state.story) return;
  await state.db.meta.put({
    key: 'glyphSets',
    value: JSON.stringify(state.story.glyphSets || [])
  });
}

function newGlyphSetId() {
  return 'gs_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

async function createGlyphSet(name, grid) {
  const set = {
    id: newGlyphSetId(),
    name: name || 'Untitled script',
    grid: grid || 8,
    mode: 'sharp',
    glyphs: {},
    glyphWidths: {}
  };
  state.story.glyphSets.push(set);
  await saveGlyphSets();
  return set;
}

async function deleteGlyphSet(id) {
  state.story.glyphSets = state.story.glyphSets.filter(s => s.id !== id);
  await saveGlyphSets();
}

function getGlyphSetByIndex(n) {
  // n is 1-based as written in {{n:...}}
  const i = parseInt(n) - 1;
  if (i < 0 || i >= state.story.glyphSets.length) return null;
  return state.story.glyphSets[i];
}

/* Resolve a glyph set by its name, as written in {{Name:...}}. Matched
   case-insensitively and trimmed, so {{ raventongue }} finds "Raventongue".
   Names are kept unique per story (enforced on create/rename), so a name
   maps to exactly one set. */
function getGlyphSetByName(name) {
  if (!name) return null;
  const want = name.trim().toLowerCase();
  return (state.story.glyphSets || []).find(s => (s.name || '').trim().toLowerCase() === want) || null;
}

/* True if `name` is already used by some set other than the one with
   `exceptId`. Used to keep names unique per story so {{Name:}} is
   unambiguous. Comparison is case-insensitive and trimmed. */
function glyphNameTaken(name, exceptId) {
  const want = (name || '').trim().toLowerCase();
  return (state.story.glyphSets || []).some(s =>
    s.id !== exceptId && (s.name || '').trim().toLowerCase() === want);
}

/* Per-glyph stroke width, stored in set.glyphWidths[ch]. Kept separate from
   the stroke arrays so the coordinate data stays clean and old sets (which
   have no widths) still work — they fall back to the default. The value is
   in viewBox units (viewBox ~120 wide); 8 is the medium default. */
const GLYPH_WIDTH_DEFAULT = 8;
function getGlyphWidth(set, ch) {
  if (set.glyphWidths && typeof set.glyphWidths[ch] === 'number') return set.glyphWidths[ch];
  return GLYPH_WIDTH_DEFAULT;
}

/* Smoothing mode for a set: 'sharp' | 'rounded' | 'flowing'. Older sets
   stored a boolean `smooth` (true=flowing, false=sharp); we read `mode`
   if present, else fall back to the boolean, else default to sharp. */
function getGlyphMode(set) {
  if (set.mode === 'sharp' || set.mode === 'rounded' || set.mode === 'flowing') return set.mode;
  if (set.smooth === true) return 'flowing';
  return 'sharp';
}

/* Convert a glyph's stroke data into SVG path `d` strings — one per stroke.
   Coordinates are grid cells (0..grid-1); we map them into a 0..100 viewBox.
   When `smooth` is true, strokes render as a Catmull-Rom-style spline
   through the points (rounded); otherwise as straight line segments.
   Returns an array of path strings.
   `mode` is 'sharp' | 'rounded' | 'flowing'. For backward compatibility a
   boolean is also accepted: true → 'flowing', false → 'sharp'. */
function normalizeGlyphMode(mode) {
  if (mode === true) return 'flowing';
  if (mode === false || mode == null) return 'sharp';
  if (mode === 'sharp' || mode === 'rounded' || mode === 'flowing') return mode;
  return 'sharp';
}

function glyphStrokePaths(strokes, grid, mode) {
  if (!strokes || !strokes.length) return [];
  mode = normalizeGlyphMode(mode);
  const cell = 100 / (grid - 1 || 1); // position of each grid index in viewBox
  const px = (c) => c[0] * cell;
  const py = (c) => c[1] * cell;
  const f = (n) => n.toFixed(2);

  // Corner radius for 'rounded' mode, in viewBox units. Kept modest so a
  // square reads as a square with softened corners, not a blob.
  const RADIUS = Math.min(14, cell * 0.5);

  const paths = [];
  for (const stroke of strokes) {
    if (!stroke.length) continue;

    if (stroke.length === 1) {
      // A single point — render as a tiny dot (a degenerate line)
      const x = f(px(stroke[0])), y = f(py(stroke[0]));
      paths.push(`M ${x} ${y} L ${x} ${y}`);
      continue;
    }

    const pts = stroke.map(c => [px(c), py(c)]);

    if (mode === 'sharp' || stroke.length === 2) {
      // Straight segments, hard corners
      let d = `M ${f(pts[0][0])} ${f(pts[0][1])}`;
      for (let i = 1; i < pts.length; i++) d += ` L ${f(pts[i][0])} ${f(pts[i][1])}`;
      paths.push(d);

    } else if (mode === 'rounded') {
      // Straight segments, but each interior vertex is replaced by a small
      // arc. We pull back from the corner along both adjoining segments by
      // up to RADIUS (clamped to half each segment so short segments don't
      // overshoot), then connect the two pull-back points with a quadratic
      // curve whose control point is the original corner. Straight parts
      // stay perfectly straight — a square stays a square, corners soften.
      let d = `M ${f(pts[0][0])} ${f(pts[0][1])}`;
      for (let i = 1; i < pts.length - 1; i++) {
        const prev = pts[i - 1];
        const cur = pts[i];
        const next = pts[i + 1];

        // Vector from corner back toward prev, and toward next
        const v1x = prev[0] - cur[0], v1y = prev[1] - cur[1];
        const v2x = next[0] - cur[0], v2y = next[1] - cur[1];
        const len1 = Math.hypot(v1x, v1y) || 1;
        const len2 = Math.hypot(v2x, v2y) || 1;
        const r1 = Math.min(RADIUS, len1 / 2);
        const r2 = Math.min(RADIUS, len2 / 2);

        const inX = cur[0] + (v1x / len1) * r1;
        const inY = cur[1] + (v1y / len1) * r1;
        const outX = cur[0] + (v2x / len2) * r2;
        const outY = cur[1] + (v2y / len2) * r2;

        // Line to the entry of the corner, then quad-curve around it
        d += ` L ${f(inX)} ${f(inY)}`;
        d += ` Q ${f(cur[0])} ${f(cur[1])}, ${f(outX)} ${f(outY)}`;
      }
      // Final straight run to the last point
      d += ` L ${f(pts[pts.length - 1][0])} ${f(pts[pts.length - 1][1])}`;
      paths.push(d);

    } else {
      // 'flowing' — Catmull-Rom through points → cubic beziers. Segments
      // themselves curve; organic, calligraphic. Points pull on neighbors.
      let d = `M ${f(pts[0][0])} ${f(pts[0][1])}`;
      for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[i - 1] || pts[i];
        const p1 = pts[i];
        const p2 = pts[i + 1];
        const p3 = pts[i + 2] || p2;
        const c1x = p1[0] + (p2[0] - p0[0]) / 6;
        const c1y = p1[1] + (p2[1] - p0[1]) / 6;
        const c2x = p2[0] - (p3[0] - p1[0]) / 6;
        const c2y = p2[1] - (p3[1] - p1[1]) / 6;
        d += ` C ${f(c1x)} ${f(c1y)}, ${f(c2x)} ${f(c2y)}, ${f(p2[0])} ${f(p2[1])}`;
      }
      paths.push(d);
    }
  }
  return paths;
}

/* Build an inline SVG element rendering a glyph. Strokes use currentColor
   so the glyph inherits text color (and gradients, for shimmer later).
   `size` is the pixel box; `width` is the stroke width in viewBox units
   (the viewBox is ~120 wide), defaulting to 8. */
function glyphSVG(strokes, grid, mode, size, width) {
  const NS = 'http://www.w3.org/2000/svg';
  const el = document.createElementNS(NS, 'svg');
  el.setAttribute('viewBox', '-10 -10 120 120');
  el.setAttribute('width', size);
  el.setAttribute('height', size);
  el.style.display = 'inline-block';
  el.style.verticalAlign = 'middle';
  const paths = glyphStrokePaths(strokes, grid, mode);
  for (const d of paths) {
    const p = document.createElementNS(NS, 'path');
    p.setAttribute('d', d);
    p.setAttribute('fill', 'none');
    p.setAttribute('stroke', 'currentColor');
    p.setAttribute('stroke-width', width || 8);
    p.setAttribute('stroke-linecap', 'round');
    p.setAttribute('stroke-linejoin', 'round');
    el.appendChild(p);
  }
  return el;
}

/* ════════════════════════════════════════════════════════════════
   GLYPH SEEDER — algorithmic starting glyphs so building a set isn't
   a blank-canvas grind for every letter. Not generative, just a
   constrained random walk.

   Hands back stroke data in the EXACT shape the editor already uses
   ([[x,y],…] grid indices, 0-based, top-left origin), so a seeded glyph
   is indistinguishable from a hand-drawn one — nothing new gets persisted
   and export/import doesn't care.

   How it stays legible instead of looking like static:
     - a primary "skeleton" stroke sets the posture (see bias)
     - extra strokes hang off junctions, so they read as one character
     - point count is decoupled from grid size (grid = resolution, not a
       budget to fill), so 16×16 stays elegant, not jumbled
     - symmetry fires only sometimes — real scripts have both symmetric
       and asymmetric letters

   bias picks the skeleton:
     'vertical'   top→bottom spine        'horizontal' left→right spine
     'squared'    Sheikah-style rail walk 'none'       free walk, max chaos

   Wrapped in a module so its helpers don't touch the global scope.
   cfg = { grid, bias, skMin, skMax, ptMin, ptMax, symmetry, jitter }
   ════════════════════════════════════════════════════════════════ */
const GlyphSeeder = (() => {
  const rint  = (a, b) => a + Math.floor(Math.random() * (b - a + 1));
  const rnd   = (a, b) => a + Math.random() * (b - a);
  const pickR = (arr) => arr[Math.floor(Math.random() * arr.length)];
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

  // Free walk: smooth-ish wandering with gentle (or wild) heading changes.
  function freeWalk(sx, sy, n, step, turn, maxIdx) {
    let cx = sx, cy = sy, a = rnd(0, Math.PI * 2);
    const st = [[cx, cy]];
    for (let i = 1; i < n; i++) {
      a += rnd(-turn, turn);
      cx = clamp(cx + Math.cos(a) * step, 0, maxIdx);
      cy = clamp(cy + Math.sin(a) * step, 0, maxIdx);
      st.push([cx, cy]);
    }
    return st;
  }

  // Rail walk (the squared / Sheikah move): coordinates snap to a small set
  // of evenly spaced "rails" including both outer edges; strokes start pinned
  // to an edge and each step jumps to a DIFFERENT rail, so they span the cell
  // edge-to-edge instead of huddling inward, and independent strokes share
  // the lattice so they cross like a labyrinth. divs+1 = number of rails.
  function railWalk(n, divs, maxIdx) {
    const rail = (k) => Math.round((k / divs) * maxIdx);
    const edges = [0, divs];
    let kx, ky;
    if (Math.random() < 0.5) { kx = pickR(edges); ky = rint(0, divs); }
    else                     { ky = pickR(edges); kx = rint(0, divs); }
    let axis = (kx === 0 || kx === divs) ? 'y' : 'x';
    if (Math.random() < 0.3) axis = axis === 'x' ? 'y' : 'x';
    const pts = [[rail(kx), rail(ky)]];
    for (let i = 1; i < n; i++) {
      if (i > 1 && Math.random() < 0.5) axis = axis === 'x' ? 'y' : 'x';
      if (axis === 'x') { let nk; do { nk = rint(0, divs); } while (nk === kx && divs > 0); kx = nk; }
      else              { let nk; do { nk = rint(0, divs); } while (nk === ky && divs > 0); ky = nk; }
      pts.push([rail(kx), rail(ky)]);
    }
    return pts;
  }

  function generate(cfg) {
    const maxIdx = cfg.grid - 1;
    const jit = (cfg.jitter || 0) * maxIdx;
    const bias = cfg.bias || 'vertical';
    // Few rail divisions keeps squared geometric, not fine. Small grids
    // collapse to edges/corners only (very Sheikah).
    const sqDivs = clamp(Math.round(maxIdx / 3), 1, 3);
    const strokes = [];

    // Primary skeleton stroke — posture depends on bias.
    const spinePts = rint(cfg.ptMin, cfg.ptMax);
    if (bias === 'vertical' || bias === 'horizontal') {
      const spanFrac = rnd(0.6, 1.0);
      const lo = rnd(0, maxIdx * (1 - spanFrac));
      const hi = lo + maxIdx * spanFrac;
      let off = rnd(maxIdx * 0.25, maxIdx * 0.75);
      const spine = [];
      for (let i = 0; i < spinePts; i++) {
        const t = spinePts === 1 ? 0 : i / (spinePts - 1);
        const main = lo + (hi - lo) * t;
        off = clamp(off + rnd(-jit, jit), 0, maxIdx);
        spine.push(bias === 'vertical' ? [off, main] : [main, off]);
      }
      strokes.push(spine);
    } else if (bias === 'squared') {
      strokes.push(railWalk(spinePts, sqDivs, maxIdx));
    } else { // 'none'
      strokes.push(freeWalk(rnd(0, maxIdx), rnd(0, maxIdx), spinePts, rnd(0.18, 0.4) * maxIdx, 1.4, maxIdx));
    }

    // Extra strokes — start at/near a junction, walk per bias.
    const total = rint(cfg.skMin, cfg.skMax);
    for (let s = 1; s < total; s++) {
      const base = pickR(pickR(strokes));
      const bx = clamp(base[0] + rnd(-jit, jit), 0, maxIdx);
      const by = clamp(base[1] + rnd(-jit, jit), 0, maxIdx);
      const n = rint(cfg.ptMin, cfg.ptMax);
      if (bias === 'squared') {
        strokes.push(railWalk(n, sqDivs, maxIdx)); // shares lattice → crosses cleanly
      } else {
        const turn = bias === 'none' ? 1.4 : 0.6;
        strokes.push(freeWalk(bx, by, n, rnd(0.15, 0.35) * maxIdx, turn, maxIdx));
      }
    }

    // Optional symmetry — mirror the off-skeleton strokes across vertical.
    if (Math.random() < (cfg.symmetry || 0) && strokes.length > 1) {
      for (const src of strokes.slice(1)) {
        strokes.push(src.map(([sx, sy]) => [maxIdx - sx, sy]));
      }
    }

    // Snap to grid, drop consecutive duplicates, keep non-empty.
    const out = [];
    for (const stroke of strokes) {
      const snapped = [];
      for (const [sx, sy] of stroke) {
        const gp = [Math.round(sx), Math.round(sy)];
        const last = snapped[snapped.length - 1];
        if (!last || last[0] !== gp[0] || last[1] !== gp[1]) snapped.push(gp);
      }
      if (snapped.length) out.push(snapped);
    }
    return out;
  }

  return { generate };
})();

async function renameStory(newTitle) {
  if (!state.story) return;
  state.story.title = newTitle;
  await registry.stories.update(state.story.slug, { title: newTitle });
}

/* ----- Address arithmetic ----- *//* Mirrors the bash logic exactly: Excel-style letter rollover.
   _segLast / _segStrip / nextStepAddr / prevStepAddr / branchParentAddr / ratingAncestor */

function isValidAddress(s) {
  return typeof s === 'string' && /^[0-9A-Z]+$/.test(s);
}
function isValidKey(s) {
  return typeof s === 'string' && /^[a-zA-Z0-9_-]+$/.test(s);
}

function _segLast(addr) {
  // Last segment: trailing digits + uppercase letters
  const m = addr.match(/[0-9]+[A-Z]+$/);
  return m ? m[0] : '';
}
function _segStrip(addr) {
  const seg = _segLast(addr);
  return seg ? addr.slice(0, addr.length - seg.length) : addr;
}
function _segNumber(seg) {
  const m = seg.match(/^[0-9]+/);
  return m ? m[0] : '';
}
function _segLetter(seg) {
  const m = seg.match(/[A-Z]+$/);
  return m ? m[0] : '';
}

function _charInc(s) {
  // Excel-style: A->B, Z->AA, AZ->BA, ZZ->AAA
  if (!s) return 'A';
  const arr = s.split('');
  let i = arr.length - 1;
  while (i >= 0) {
    if (arr[i] !== 'Z') {
      arr[i] = String.fromCharCode(arr[i].charCodeAt(0) + 1);
      return arr.join('');
    } else {
      arr[i] = 'A';
      i--;
    }
  }
  return 'A' + arr.join('');
}

function _charDec(s) {
  // Excel-style reverse: B->A, AA->Z, BA->AZ, AAA->ZZ, A->'' (no prev)
  if (!s) return '';
  if (/^A+$/.test(s)) {
    if (s.length === 1) return '';
    return 'Z'.repeat(s.length - 1);
  }
  const arr = s.split('');
  let i = arr.length - 1;
  while (i >= 0) {
    if (arr[i] !== 'A') {
      arr[i] = String.fromCharCode(arr[i].charCodeAt(0) - 1);
      return arr.join('');
    } else {
      arr[i] = 'Z';
      i--;
    }
  }
  return '';
}

/* ----- Divergence (Steins;Gate-style worldline meter) -----
   Derived purely from the address STRING — no DB, no node walkback. An address
   is segments of [number][letters], e.g. 1C2B1A -> [1C][2B][1A].

     - First segment's NUMBER is the integer part (the timeline).
     - A segment's LETTER value (bijective base-26: A=1,Z=26,AA=27…) minus one
       is the continuations made in that segment, each worth +1.
     - Every segment AFTER the first is a branch, worth (1 + its branch number):
       branch #1 = +2, #2 = +3, #3 = +4 … plus that segment's own continuations.

   Sum across segments = divergence (the 6 decimal digits). Capped at .999999
   for display; the raw value is returned too so an overflow easter egg could
   hook it later. */
function _lettersToNum(s) {
  let n = 0;
  for (let i = 0; i < s.length; i++) n = n * 26 + (s.charCodeAt(i) - 64);
  return n; // A=1, Z=26, AA=27, …
}

function computeDivergence(addr) {
  const segs = (String(addr || '').toUpperCase().match(/[0-9]+[A-Z]+/g)) || [];
  if (!segs.length) return null;
  let div = 0, integer = 0;
  segs.forEach((seg, i) => {
    const num = parseInt(seg.match(/^[0-9]+/)[0], 10);
    const letters = seg.match(/[A-Z]+$/)[0];
    const cont = _lettersToNum(letters) - 1;        // continuations in this segment
    if (i === 0) { integer = num; div += cont; }
    else { div += (1 + num) + cont; }                // branch worth 1+index, plus continuations
  });
  return { integer, raw: div };
}

const DIVERGENCE_CAP = 999999;

/* DEV MODE — master switch for all dev-only UI and behaviour overrides.
   Set false before release. One flip disables everything gated on this:
   - the haywire button in the hamburger menu
   - forced overflow churn on every node (for previewing the easter egg) */
const DEV_MODE = false;

/* Format divergence to {integer, decimals, overflow} for the meter. */
function divergenceReadout(addr) {
  const res = computeDivergence(addr);
  if (!res) return { integer: '-', decimals: '------', overflow: false, ok: false };
