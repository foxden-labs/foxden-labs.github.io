  const overflow = res.raw > DIVERGENCE_CAP;
  const shown = Math.min(res.raw, DIVERGENCE_CAP);
  return { integer: String(res.integer), decimals: String(shown).padStart(6, '0'), overflow, ok: true, raw: res.raw };
}

function nextStepAddr(addr) {
  const seg = _segLast(addr);
  if (!seg) return '';
  const prefix = addr.slice(0, addr.length - seg.length);
  const num = _segNumber(seg);
  const letter = _segLetter(seg);
  return `${prefix}${num}${_charInc(letter)}`;
}

function prevStepAddr(addr) {
  const seg = _segLast(addr);
  if (!seg) return '';
  const prefix = addr.slice(0, addr.length - seg.length);
  const num = _segNumber(seg);
  const letter = _segLetter(seg);
  const prev = _charDec(letter);
  return prev ? `${prefix}${num}${prev}` : '';
}

function branchParentAddr(addr) {
  return _segStrip(addr);
}

function ratingAncestor(addr) {
  // Returns the branch root: numA at the end of the last segment
  const seg = _segLast(addr);
  if (!seg) return addr;
  const prefix = addr.slice(0, addr.length - seg.length);
  const num = _segNumber(seg);
  return `${prefix}${num}A`;
}

/* ----- DB helpers (per-story) ----- */

/* Walk forward in the same segment, skipping gaps, until we find an
   existing node. Returns null if no forward neighbor exists in the segment. */
async function nearestForwardInSegment(addr) {
  /* Fast path: check the immediate next step first (the common case).
     Must also not be emptied. */
  const nxt = nextStepAddr(addr);
  if (nxt) {
    const n = await state.db.nodes.get(nxt);
    if (n && !isNodeEmpty(n)) return nxt;
  }

  /* Gap path: same-segment forward option from options table. */
  const ownParent = branchParentAddr(addr);
  const targets = await listOptionTargets(addr);
  for (const t of targets) {
    if (branchParentAddr(t) === ownParent) {
      const n = await state.db.nodes.get(t);
      if (n && !isNodeEmpty(n)) return t;
    }
  }

  /* Fallback walk — skip gaps AND emptied nodes. */
  let cursor = nxt;
  for (let i = 0; i < 10 && cursor; i++) {
    if (branchParentAddr(cursor) !== ownParent) return null;
    const n = await state.db.nodes.get(cursor);
    if (n && !isNodeEmpty(n)) return cursor;
    cursor = nextStepAddr(cursor);
  }
  return null;
}

/* Walk backward in the same segment, skipping gaps AND emptied nodes. */
async function nearestBackwardInSegment(addr) {
  let cursor = prevStepAddr(addr);
  const ownParent = branchParentAddr(addr);
  for (let i = 0; i < 10 && cursor; i++) {
    if (branchParentAddr(cursor) !== ownParent) return null;
    const n = await state.db.nodes.get(cursor);
    if (n && !isNodeEmpty(n)) return cursor;
    cursor = prevStepAddr(cursor);
  }
  return null;
}

async function nodeExists(addr) {
  if (!state.db || !addr) return false;
  return !!(await state.db.nodes.get(addr));
}

async function getNode(addr) {
  if (!state.db || !addr) return null;
  return await state.db.nodes.get(addr) || null;
}

async function putNode(node) {
  await state.db.nodes.put(node);
  // Gap healing on write: if this node fills a gap that was previously
  // bridged by a same-segment option, replace that bridge with the natural
  // pair (prev → this) and (this → next-existing).
  const addr = node.address;
  const ownParent = branchParentAddr(addr);
  const prv = prevStepAddr(addr);
  const nxt = nextStepAddr(addr);

  // Load all addresses once into a Set — one DB query, then walk in-memory.
  // Avoids up to 2×1000 sequential async DB lookups from the old loop pattern.
  const allAddrs = new Set((await state.db.nodes.toArray()).map(n => n.address));

  // Walk backward to find nearest existing predecessor in same segment
  let backNeighbor = null;
  let cursor = prv;
  for (let i = 0; i < 1000 && cursor; i++) {
    if (branchParentAddr(cursor) !== ownParent) break;
    if (allAddrs.has(cursor)) { backNeighbor = cursor; break; }
    cursor = prevStepAddr(cursor);
  }

  // Walk forward to find nearest existing successor in same segment
  let fwdNeighbor = null;
  cursor = nxt;
  for (let i = 0; i < 1000 && cursor; i++) {
    if (branchParentAddr(cursor) !== ownParent) break;
    if (allAddrs.has(cursor)) { fwdNeighbor = cursor; break; }
    cursor = nextStepAddr(cursor);
  }

  // If there was a bridge option spanning this position (back → fwd),
  // remove it; we'll replace with explicit links to the new node.
  if (backNeighbor && fwdNeighbor) {
    await state.db.options.delete([backNeighbor, fwdNeighbor]).catch(() => {});
  }
  // Wire up neighbors to/from this new node so navigation works either way
  if (backNeighbor) {
    await state.db.options.put({ parent: backNeighbor, target: addr });
  }
  if (fwdNeighbor) {
    await state.db.options.put({ parent: addr, target: fwdNeighbor });
  }
}

async function getRating(addr) {
  // Returns the rating of the branch root
  if (!state.db) return 'L';
  const root = ratingAncestor(addr);
  const r = await state.db.nodes.get(root);
  return (r && r.rating) ? r.rating : 'L';
}

async function setRating(branchRoot, rating) {
  if (!['L','M','H'].includes(rating)) return;
  const node = await state.db.nodes.get(branchRoot);
  if (node) {
    node.rating = rating;
    await state.db.nodes.put(node);
  } else {
    // Create stub node with rating only — only branch roots should have explicit ratings.
    await state.db.nodes.put({
      address: branchRoot, text: '', author: '', rating, subtitle: ''
    });
  }
}

function ratingAllowed(r) {
  const max = state.settings.maxRating || 'H';
  if (max === 'L') return r === 'L';
  if (max === 'M') return r === 'L' || r === 'M';
  return true;
}

async function listOptionTargets(parent) {
  if (!state.db) return [];
  return await state.db.options.where('parent').equals(parent).toArray()
    .then(rows => rows.map(r => r.target));
}

async function addOption(parent, target) {
  await state.db.options.put({ parent, target });
}

/* Soft-delete a node by marking it empty. Preserves the row in the DB,
   the OPTION wiring, and metadata (author, rating, subtitle) — only the
   text content is cleared and an `emptied: true` flag is set. Choice
   pools see through empty nodes to find non-empty descendants; the tree
   view still shows them; writing new content via the editor un-marks them.
   This replaces the old destructive deleteNode/deleteBranch path which
   could orphan nodes and corrupt the tree. */
async function emptyNode(addr) {
  if (!state.db) return;
  const node = await state.db.nodes.get(addr);
  if (!node) return;
  node.text = '';
  node.subtitle = '';
  node.emptied = true;
  await state.db.nodes.put(node);
}

/* Empty a node and everything downstream of it — continuations AND branches,
   scoped via addrIsUnder (the same "what's under here" logic export uses). This
   is the mass version of emptyNode: non-destructive, addresses preserved, fully
   reversible by rewriting. Returns the count actually emptied (skips ones that
   were already empty) so the caller can confirm-with-count. */
async function emptyNodeAndDescendants(root) {
  if (!state.db) return 0;
  const all = await state.db.nodes.toArray();
  const targets = all.filter(n => addrIsUnder(n.address, root) && !n.emptied && (n.text || '').trim());
  for (const n of targets) {
    n.text = '';
    n.subtitle = '';
    n.emptied = true;
    await state.db.nodes.put(n);
  }
  // Mass-emptying can orphan images those nodes referenced.
  await sweepOrphanImages();
  return targets.length;
}

/* Count how many nodes a mass-empty from `root` would actually clear (non-empty
   ones only), for the confirm prompt. */
async function countEmptyableUnder(root) {
  if (!state.db) return 0;
  const all = await state.db.nodes.toArray();
  return all.filter(n => addrIsUnder(n.address, root) && !n.emptied && (n.text || '').trim()).length;
}

/* ============================ DEAD CODE — DO NOT WIRE UP ============================
   ⚠ deleteNode physically REMOVES a node's address from the DB. It is RETIRED and
   intentionally has ZERO call sites. DO NOT call it. DO NOT add a button for it.

   Why it's dangerous: this engine's addressing scans existing nodes to compute the
   next slot, branch points, ancestry, divergence, export scoping — everything. A
   missing address in the middle of a chain ORPHANS whatever was downstream and makes
   the engine miscalculate the next spot. That class of bug is exactly why per-node
   deletion was abandoned.

   The live, SAFE replacement is emptyNode(): it clears text/subtitle and sets
   emptied:true, keeping the address and structure intact. We EMPTY, we never DELETE.
   If you think you need this function, you want emptyNode() instead.
   (Kept in the file only as reference for the old gap-stitching logic.)
   ==================================================================================== */
async function deleteNode(addr) {
  // Before deleting, look for same-segment neighbors so we can stitch them.
  // If both prev (e.g. 1A) and next (e.g. 1C) exist, we add an option
  // 1A → 1C after removing 1B. That way the tree stays connected across
  // the gap and forward/back navigation still works.
  const prv = prevStepAddr(addr);
  const nxt = nextStepAddr(addr);

  // Load all addresses once — same pattern as putNode gap healing.
  const allAddrs = new Set((await state.db.nodes.toArray()).map(n => n.address));
  const prvExists = prv && allAddrs.has(prv);

  // Find the nearest existing forward neighbor in the same segment.
  let forwardNeighbor = null;
  let cursor = nxt;
  const ownParent = branchParentAddr(addr);
  for (let i = 0; i < 1000 && cursor; i++) {
    if (branchParentAddr(cursor) !== ownParent) break;
    if (allAddrs.has(cursor)) { forwardNeighbor = cursor; break; }
    cursor = nextStepAddr(cursor);
  }

  await state.db.nodes.delete(addr);
  // Remove options touching this node
  const opts = await state.db.options
    .filter(o => o.parent === addr || o.target === addr).toArray();
  for (const o of opts) await state.db.options.delete([o.parent, o.target]);

  // Stitch neighbors across the gap
  if (prvExists && forwardNeighbor) {
    await state.db.options.put({ parent: prv, target: forwardNeighbor });
  }

  // Deferred image GC: a deleted node may have held the last reference to an
  // image. Sweep now (not on every edit — that would break cut/paste/undo).
  await sweepOrphanImages();
}

/* ============================ DEAD CODE — DO NOT WIRE UP ============================
   ⚠ deleteBranch physically REMOVES a whole subtree's addresses from the DB. It is
   RETIRED and intentionally has ZERO call sites. DO NOT call it. The name is a TRAP:
   it sounds like what a "delete branch" button should call — it is NOT. Wiring it up
   reintroduces orphaned addresses and breaks next-spot / ancestry / export math.

   The live, SAFE replacement is emptyNodeAndDescendants() (menu → Delete → "Empty this
   node + everything below"). It empties every node downstream — continuations AND
   branches — via addrIsUnder, keeping all addresses and structure. We EMPTY, never
   DELETE. A "branch nuke" in this app means emptying, not removing.
   (Kept only as reference. If you're reaching for this, you want emptyNodeAndDescendants.)
   ==================================================================================== */
async function deleteBranch(prefix) {
  // True descendants only: prefix followed by a digit, plus the prefix itself.
  const descRe = new RegExp('^' + prefix.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '[0-9]');
  const allNodes = await state.db.nodes.toArray();
  for (const n of allNodes) {
    if (n.address === prefix || descRe.test(n.address)) {
      await state.db.nodes.delete(n.address);
    }
  }
  const allOpts = await state.db.options.toArray();
  for (const o of allOpts) {
    const pMatch = o.parent === prefix || descRe.test(o.parent);
    const tMatch = o.target === prefix || descRe.test(o.target);
    if (pMatch || tMatch) await state.db.options.delete([o.parent, o.target]);
  }
  // Glossary stamped within this subtree
  const allGloss = await state.db.glossary.toArray();
  for (const g of allGloss) {
    if (g.origin_address === prefix || descRe.test(g.origin_address)) {
      await state.db.glossary.delete([g.key, g.origin_address]);
    }
  }
  // Deleting a subtree can orphan images it referenced.
  await sweepOrphanImages();
}

async function eraseStoryContent() {
  if (!state.db) return;
  await state.db.nodes.clear();
  await state.db.options.clear();
  await state.db.glossary.clear();
  await state.db.bookmarks.clear();
  if (state.db.images) await state.db.images.clear();
  // The story is now wiped back to a single empty 1A. Reset the position
  // bookkeeping too, or meta would keep pointing lastAddr — and the tracker
  // thread — at addresses that no longer exist.
  state.currentAddr = '1A';
  state.trail = ['1A'];
  await state.db.meta.put({ key: 'lastAddr', value: '1A' }).catch(() => {});
  await state.db.meta.put({ key: 'trail', value: ['1A'] }).catch(() => {});
}

async function topLevelTimelines() {
  // Roots are addresses matching ^[0-9]+A$ (a single first segment). We only
  // surface a timeline if it has ANY readable content — the root itself OR any
  // descendant (continuation or branch). An emptied root with live content
  // below it stays (hiding it would strand that content); a timeline that's
  // empty top to bottom is dropped, since offering it as a pick serves zero
  // purpose. This is the same empty-vs-content distinction used elsewhere; we
  // never delete, so "no content" is judged by emptied/blank, not existence.
  if (!state.db) return [];
  const all = await state.db.nodes.toArray();
  const hasText = (n) => n && !n.emptied && (n.text || '').trim();
  const roots = all.filter(n => /^[0-9]+A$/.test(n.address)).map(n => n.address);
  const tops = roots.filter(root =>
    all.some(n => (n.address === root || addrIsUnder(n.address, root)) && hasText(n))
  );
  return tops.sort((a, b) => parseInt(a) - parseInt(b));
}

async function newTopLevelAddr() {
  let n = 1;
  while (await state.db.nodes.get(`${n}A`)) n++;
  return `${n}A`;
}

// Like newBranchAddr but returns `count` distinct branch slots under fromAddr in
// one pass — newBranchAddr would hand back the same slot on each call since
// nothing is written between them. Used when grafting a multi-timeline import,
// where each imported timeline needs its own branch off the graft node. Stricter
// than newBranchAddr: it skips ANY slot that holds live content (wired or
// orphaned), so an import can never clobber an existing node; only truly free or
// soft-deleted (emptied/blank) slots are handed out.
async function branchSlots(fromAddr, count) {
  const slots = [];
  let n = 1;
  while (slots.length < count) {
    const candidate = `${fromAddr}${n}A`;
    const node = await state.db.nodes.get(candidate);
    const occupied = !!(node && !node.emptied && node.text && node.text.trim());
    if (!occupied) slots.push(candidate);
    n++;
  }
  return slots;
}

async function newBranchAddr(fromAddr) {
  // Walk branch slots 1A, 2A, 3A... in order, never skipping:
  //   free slot    → return it (new branch)
  //   emptied      → return it (reuse soft-deleted slot)
  //   has content, not wired via OPTIONS → return it (orphaned; caller warns + reconnects)
  //   has content, wired via OPTIONS     → existing live branch, skip to next number
  const wiredTargets = new Set(await listOptionTargets(fromAddr));
  let n = 1;
  while (true) {
    const candidate = `${fromAddr}${n}A`;
    const node = await state.db.nodes.get(candidate);
    if (!node) return candidate;                                    // free
    if (node.emptied || !node.text || !node.text.trim()) return candidate; // emptied or blank — reuse
    if (!wiredTargets.has(candidate)) return candidate;             // orphaned — caller handles
    n++;                                                   // live branch — skip
  }
}

async function dbCountNodes() {
  return await state.db.nodes.count();
}

async function randomAddress() {
  const all = await state.db.nodes.toArray();
  if (!all.length) return '';
  return all[Math.floor(Math.random() * all.length)].address;
}

/* ----- Glossary resolution ----- */

async function glossaryResolve(key, fromAddr) {
  // Walk backward through ancestry to find closest entry
  let cursor = fromAddr;
  while (cursor) {
    const hit = await state.db.glossary.get([key, cursor]);
    if (hit) return cursor;
    const prev = prevStepAddr(cursor);
    if (prev && await nodeExists(prev)) {
      cursor = prev;
    } else {
      const par = branchParentAddr(cursor);
      if (par && await nodeExists(par)) {
        cursor = par;
      } else {
        cursor = '';
      }
    }
  }
  return '';
}

async function glossaryGet(key, originAddr) {
  return await state.db.glossary.get([key, originAddr]);
}

async function glossarySave(key, originAddr, title, text) {
  await state.db.glossary.put({
    key, origin_address: originAddr,
    title: title || key,
    text: text || '',
    author: state.story.authorName,
    edited: Date.now()
  });
}

async function glossaryVisibleFrom(fromAddr) {
  // Walking backward, return closest entry per key (one per key max).
  const seen = new Set();
  const results = [];
  let cursor = fromAddr;
  while (cursor) {
    const rows = await state.db.glossary.where('origin_address').equals(cursor).toArray();
    for (const r of rows) {
      if (!seen.has(r.key)) {
        seen.add(r.key);
        results.push(r);
      }
    }
    const prev = prevStepAddr(cursor);
    if (prev && await nodeExists(prev)) cursor = prev;
    else {
      const par = branchParentAddr(cursor);
      if (par && await nodeExists(par)) cursor = par;
      else cursor = '';
    }
  }
  return results;
}

async function glossaryExistsAnywhere(key) {
  const hit = await state.db.glossary.where('key').equals(key).first();
  return !!hit;
}

/* ----- Bookmarks ----- */

async function bookmarkAdd(addr) {
  await state.db.bookmarks.put({ address: addr, added: Date.now() });
}
async function bookmarkRemove(addr) {
  await state.db.bookmarks.delete(addr);
}
async function bookmarkExists(addr) {
  return !!(await state.db.bookmarks.get(addr));
}
async function bookmarkList() {
  return await state.db.bookmarks.orderBy('added').reverse().toArray();
}

/* ----- Render: link parsing -----
   Markup: [[Display Text|key]]
   Returns DOM nodes (text and span) for inline insertion.
   Builds state.linkMap as a side effect. */

function parseLinkMarkup(raw) {
  state.linkMap = [];
  const out = [];
  // Match either a glossary link [[display|key]] or an address jump
  // ((display|address)). We scan with a combined regex and disambiguate
  // by which bracket type matched.
  const re = /\[\[([^|\]]+)\|([^\]]+)\]\]|\(\(([^|)]+)\|([^)]+)\)\)/g;
  let last = 0, match;
  const keyToNum = new Map();

  while ((match = re.exec(raw)) !== null) {
    if (match.index > last) {
      out.push({ type: 'text', value: raw.slice(last, match.index) });
    }

    if (match[1] !== undefined) {
      // Glossary link [[display|key]]
      const display = match[1];
      let key = match[2].trim();
      const at = key.indexOf('@');
      if (at >= 0) key = key.slice(0, at);
      if (!keyToNum.has(key)) {
        keyToNum.set(key, state.linkMap.length + 1);
        state.linkMap.push(key);
      }
      out.push({ type: 'link', display, key, num: keyToNum.get(key) });
    } else {
      // Address jump ((display|address))
      const display = match[3];
      const address = match[4].trim().toUpperCase();
      if (isValidAddress(address)) {
        out.push({ type: 'jump', display, address });
      } else {
        // Not a valid address — leave the whole thing as literal text
        out.push({ type: 'text', value: match[0] });
      }
    }
    last = re.lastIndex;
  }
  if (last < raw.length) {
    out.push({ type: 'text', value: raw.slice(last) });
  }
  return out;
}

/* ════════════════════════════════════════════════════════════════
   MARKDOWN PARSER — supports nesting and combinations.

   Syntax:
     **bold text**          → bold
     *italic text*          → italic
     _underline text_       → underline

   Combinations work freely by nesting:
     ***bold italic***      → bold + italic
     **bold _and underline_ inside**     → bold containing underline
     *italic **with bold** inside*       → italic containing bold

   Rules to avoid false positives:
     - Markers must touch their content (no space immediately inside).
     - Single * and _ require non-alphanumeric context outside, so things
       like "5 * 3" and "snake_case" stay literal.
     - Unmatched markers render as plain text.

   The parser walks the string recursively. Each call looks for the next
   matching delimiter pair, recursively parses what's inside the pair,
   and continues after it. Tokens are nested objects: {type, children}
   for formatted runs, or {type:'text', value} for plain text.
   ════════════════════════════════════════════════════════════════ */

function parseMarkdown(text) {
  /* Color names recognized in {color:text} markup. Hex codes (#rgb / #rrggbb)
     are also accepted. Anything else is treated as literal text — so
     accidental {something:foo} doesn't become a color span. */
  const NAMED_COLORS = ['red','orange','yellow','green','blue','purple','pink','gray'];
  const HEX_RE = /^#(?:[0-9a-f]{3}|[0-9a-f]{6})$/i;

  function validateColor(name) {
    const lc = name.toLowerCase();
    if (NAMED_COLORS.includes(lc)) return { kind: 'named', value: lc };
    if (HEX_RE.test(name)) return { kind: 'hex', value: name };
    return null;
  }

  /* Find the closing } that matches this color block, respecting nesting.
     Returns the index of the matching brace, or -1 if not found. */
  function findColorClose(s, from) {
    let depth = 1;
    for (let i = from; i < s.length; i++) {
      if (s[i] === '{') depth++;
      else if (s[i] === '}') {
        depth--;
        if (depth === 0) return i;
      }
    }
    return -1;
  }

  // Find the next valid opening marker from position `start`.
  // Returns {pos, marker, endPos, ...} or null.
  function findOpen(s, start) {
    for (let i = start; i < s.length; i++) {
      if (s[i] === '#' && s[i+1] === '#') {
        // Size markers: ## / ### / #### (2-4 hashes = levels 1-3). Count the
        // run of hashes. Must be followed by non-space content. The closer is
        // a matching-length run of hashes (handled in findClose/parseRange).
        let run = 0;
        while (s[i + run] === '#') run++;
        const level = Math.min(run, 4); // cap marker length; sizes capped too
        if (s[i + run] && s[i + run] !== ' ' && s[i + run] !== '#') {
          const marker = '#'.repeat(level);
          return { pos: i, marker, endPos: i + level, size: Math.min(level - 2, 2) };
        }
      } else if (s[i] === '*' && s[i+1] === '*') {
        // Allow ** even if followed by another * (the *** triple-marker case)
        if (s[i+2] && s[i+2] !== ' ') {
          return { pos: i, marker: '**', endPos: i + 2 };
        }
      } else if (s[i] === '*') {
        // Single * — must not be followed by * (that's the ** case, handled above)
        if (s[i+1] && s[i+1] !== ' ' && s[i+1] !== '*') {
          return { pos: i, marker: '*', endPos: i + 1 };
        }
      } else if (s[i] === '_') {
        if (s[i+1] && s[i+1] !== ' ' && s[i+1] !== '_') {
          const before = i > 0 ? s[i-1] : ' ';
          if (!/[a-zA-Z0-9]/.test(before)) {
            return { pos: i, marker: '_', endPos: i + 1 };
          }
        }
      } else if (s[i] === '{' && s[i+1] === '{') {
        // Glyph block {{Name:content}} — name is up to the first colon that
        // isn't a brace. The closer is }} matched by NET brace depth so any
        // nested {color:} inside balances out. Emitting it here (in the
        // unified parse) lets outer markers like ## or ** wrap a glyph block.
        const rest = s.slice(i + 2);
        const m = rest.match(/^([^{}:]+):/);
        if (m) {
          const ref = m[1].trim();
          const afterColon = i + 2 + m[0].length;
          let depth = 2, j = afterColon;
          while (j < s.length && depth > 0) {
            if (s[j] === '{') depth++;
            else if (s[j] === '}') depth--;
            j++;
          }
          if (depth === 0) {
            return { pos: i, marker: 'glyph', endPos: j,
                     glyphRef: ref, glyphInner: s.slice(afterColon, j - 2) };
          }
        }
      } else if (s[i] === '{') {
        // {color:content} — find the colon, validate the color word,
        // and only treat as a color block if both check out.
        const colonIdx = s.indexOf(':', i + 1);
        const braceIdx = s.indexOf('}', i + 1);
        if (colonIdx !== -1 && (braceIdx === -1 || colonIdx < braceIdx)) {
          const colorName = s.slice(i + 1, colonIdx);
          const validated = validateColor(colorName);
          if (validated) {
            return {
              pos: i,
              marker: 'color',
              endPos: colonIdx + 1,
              color: validated
            };
          }
        }
      } else if (s[i] === '[' && s[i+1] === '[') {
        // Glossary link [[display|key]] — find the closing ]]
        const close = s.indexOf(']]', i + 2);
        if (close !== -1) {
          const body = s.slice(i + 2, close);
          const pipe = body.indexOf('|');
          if (pipe > 0 && pipe < body.length - 1) {
            return { pos: i, marker: 'link', endPos: close + 2,
                     linkDisplay: body.slice(0, pipe), linkKey: body.slice(pipe + 1) };
          }
        }
      } else if (s[i] === '(' && s[i+1] === '(') {
        // Address jump ((display|address)) — find the closing ))
        const close = s.indexOf('))', i + 2);
        if (close !== -1) {
          const body = s.slice(i + 2, close);
          const pipe = body.indexOf('|');
          if (pipe > 0 && pipe < body.length - 1) {
            const addr = body.slice(pipe + 1).trim().toUpperCase();
            if (isValidAddress(addr)) {
              return { pos: i, marker: 'jump', endPos: close + 2,
                       jumpDisplay: body.slice(0, pipe), jumpAddr: addr };
            }
          }
        }
      }
    }
    return null;
  }

  // Find the matching closing marker for `marker` starting at `from`.
  // Returns the index of the marker, or -1 if none.
  function findClose(s, marker, from) {
    // Size markers (runs of #) must match an EXACT-length run: a ## close
    // must be exactly two hashes, not the first two of ###. So we check the
    // chars on either side aren't also #.
    if (marker[0] === '#') {
      const len = marker.length;
      for (let i = from; i <= s.length - len; i++) {
        if (s.substr(i, len) === marker) {
          const before = s[i - 1];
          const after = s[i + len];
          if (before === '#' || after === '#') continue; // part of a longer run
          if (before === ' ') continue; // no space right before the close
          return i;
        }
      }
      return -1;
    }
    for (let i = from; i < s.length - marker.length + 1; i++) {
      if (s.substr(i, marker.length) === marker) {
        const before = s[i - 1];
        const after = s[i + marker.length];
        if (before === ' ') continue;
        // For _ require non-alphanumeric after
        if (marker === '_' && after && /[a-zA-Z0-9]/.test(after)) continue;
        // For ** close: if the next char is also *, that means we have ***+.
        // The first * of the *** belongs to inner italic content, so the real
        // close is one position later. Only adjust if the resulting position
        // still leaves a valid ** there.
        if (marker === '**' && after === '*') {
          if (s.substr(i+1, 2) === '**') return i + 1;
        }
        if (marker === '**') return i;
        // For single * — must not be next to another * (that's the ** case)
        if (marker === '*' && (after === '*' || before === '*')) continue;
        return i;
      }
    }
    return -1;
  }

  function parseRange(s) {
    const tokens = [];
    let i = 0;
    let buf = '';
    while (i < s.length) {
      const open = findOpen(s, i);
      if (!open) {
        buf += s.slice(i);
        break;
      }
      // Text before the opener
      buf += s.slice(i, open.pos);

      // Link and jump are self-delimiting (endPos already past the close).
      // Emit them directly with their display parsed for nested formatting.
      if (open.marker === 'link') {
        if (buf) { tokens.push({ type: 'text', value: buf }); buf = ''; }
        tokens.push({ type: 'link', display: open.linkDisplay, key: open.linkKey, children: parseRange(open.linkDisplay) });
        i = open.endPos;
        continue;
      }
      if (open.marker === 'jump') {
        if (buf) { tokens.push({ type: 'text', value: buf }); buf = ''; }
        tokens.push({ type: 'jump', display: open.jumpDisplay, address: open.jumpAddr, children: parseRange(open.jumpDisplay) });
        i = open.endPos;
        continue;
      }
      if (open.marker === 'glyph') {
        if (buf) { tokens.push({ type: 'text', value: buf }); buf = ''; }
        tokens.push({ type: 'glyph', ref: open.glyphRef, inner: open.glyphInner });
        i = open.endPos;
        continue;
      }

      // Color blocks use brace-matching close, others use marker search
      let closePos;
      if (open.marker === 'color') {
        closePos = findColorClose(s, open.endPos);
      } else {
        closePos = findClose(s, open.marker, open.endPos);
      }
      if (closePos === -1) {
        // No match — treat opener as literal text
        buf += s.slice(open.pos, open.endPos);
        i = open.endPos;
        continue;
      }

      // Flush buffer as text token
      if (buf) { tokens.push({ type: 'text', value: buf }); buf = ''; }

      const innerText = s.slice(open.endPos, closePos);
      if (open.marker === 'color') {
        tokens.push({ type: 'color', color: open.color, children: parseRange(innerText) });
        i = closePos + 1; // skip the }
      } else if (open.marker[0] === '#') {
        tokens.push({ type: 'size', size: open.size, children: parseRange(innerText) });
        i = closePos + open.marker.length;
      } else {
        const type = open.marker === '**' ? 'b' : open.marker === '*' ? 'i' : 'u';
        tokens.push({ type, children: parseRange(innerText) });
        i = closePos + open.marker.length;
      }
    }
    if (buf) tokens.push({ type: 'text', value: buf });
    return tokens;
  }

  return parseRange(text);
}

function appendMarkdown(container, text) {
  const tokens = parseMarkdown(text);
  function render(parent, tokenList) {
    for (const t of tokenList) {
      if (t.type === 'text') {
        parent.appendChild(document.createTextNode(t.value));
      } else if (t.type === 'color') {
        const span = document.createElement('span');
        span.className = 'md-color';
        const cssColor = t.color.kind === 'named'
          ? `var(--text-${t.color.value})`
          : t.color.value;
        span.style.color = cssColor;
        render(span, t.children || []);
        parent.appendChild(span);
      } else if (t.type === 'size') {
        // Em-relative so sizes ride on top of the reader's text-scale.
        // size 1/2/3 = ## / ### / #### → 1.3 / 1.55 / 1.8 em.
        const factors = [1.3, 1.55, 1.8];
        const span = document.createElement('span');
        span.className = 'md-size';
        span.style.fontSize = (factors[t.size] || 1.3) + 'em';
        render(span, t.children || []);
        parent.appendChild(span);
      } else {
        const tag = t.type === 'b' ? 'strong' : t.type === 'i' ? 'em' : 'u';
        const e = document.createElement(tag);
        render(e, t.children || []);
        parent.appendChild(e);
      }
    }
  }
  render(container, tokens);
}

/* Parse color blocks at the top level only.
   Returns tokens: { type: 'text', value } or { type: 'color', color, inner }.
   The `inner` of a color block is returned as a raw string so the caller
   can recursively process it (for nested colors, links, markdown). */
function parseColorBlocksOnly(text) {
  const NAMED_COLORS = ['red','orange','yellow','green','blue','purple','pink','gray'];
  const HEX_RE = /^#(?:[0-9a-f]{3}|[0-9a-f]{6})$/i;
  function validateColor(name) {
    const lc = name.toLowerCase();
    if (NAMED_COLORS.includes(lc)) return { kind: 'named', value: lc };
    if (HEX_RE.test(name)) return { kind: 'hex', value: name };
    return null;
  }

  const tokens = [];
  let i = 0;
  let buf = '';
  while (i < text.length) {
    if (text[i] === '{') {
      const colonIdx = text.indexOf(':', i + 1);
      const nextBrace = text.indexOf('}', i + 1);
      if (colonIdx !== -1 && (nextBrace === -1 || colonIdx < nextBrace)) {
        const colorName = text.slice(i + 1, colonIdx);
        const validated = validateColor(colorName);
        if (validated) {
          // Find matching close brace with depth tracking
          let depth = 1;
          let j = colonIdx + 1;
          while (j < text.length && depth > 0) {
            if (text[j] === '{') depth++;
            else if (text[j] === '}') {
              depth--;
              if (depth === 0) break;
            }
            j++;
          }
          if (depth === 0) {
            if (buf) { tokens.push({ type: 'text', value: buf }); buf = ''; }
            tokens.push({
              type: 'color',
              color: validated,
              inner: text.slice(colonIdx + 1, j)
            });
            i = j + 1;
            continue;
          }
        }
      }
    }
    buf += text[i];
    i++;
  }
  if (buf) tokens.push({ type: 'text', value: buf });
  return tokens;
}

/* Renders raw node text. The pipeline is layered:
   1. parseColorBlocksOnly extracts {color:...} blocks at the outer level
      so that colors can WRAP links (e.g. {blue:[[link|key]]}).
   2. Within each color block (recursive) and within each non-color text
      region, parseLinkMarkup separates [[display|key]] from plain text.
   3. Each plain-text segment then goes through appendMarkdown which
      handles **bold**, *italic*, _underline_, and (redundantly) any
      color blocks that might have been missed.
   This way: color around link → works. Bold around link still doesn't
   (a limitation of the link parser splitting the markdown markers),
   but bold INSIDE a color block does. */
/* Parse {{Name:text}} glyph blocks at the top level. Returns tokens:
   { type: 'text', value } or { type: 'glyph', ref, inner }.
   `ref` is the font name written in the markup (matched case-insensitively
   against set names at render time); inner is the raw inner string,
   processed recursively by the normal pipeline so color/links/jumps/
   markdown all still work on the real text underneath. */
function parseGlyphBlocks(text) {
  const tokens = [];
  let i = 0, buf = '';
  while (i < text.length) {
    // Look for {{  name  :   where name is anything up to the first colon
    // that isn't itself a brace (so we don't swallow a nested {color:}).
    if (text[i] === '{' && text[i + 1] === '{') {
      const rest = text.slice(i + 2);
      // Name = one or more chars that are not { } or : — then a colon.
      const m = rest.match(/^([^{}:]+):/);
      if (m) {
        const ref = m[1].trim();
        const afterColon = i + 2 + m[0].length;
        // Track NET brace depth from the opening {{ (depth starts at 2).
        // Every { adds 1, every } subtracts 1. This balances any nested
        // single-brace {color:...} blocks inside, because their { and }
        // cancel out. The glyph block closes when depth returns to 0 — at
        // which point the final two characters consumed are the }} close.
        let depth = 2, j = afterColon;
        while (j < text.length && depth > 0) {
          if (text[j] === '{') depth++;
          else if (text[j] === '}') depth--;
          j++;
        }
        if (depth === 0) {
          // j now points just past the final } . The closing token is }},
          // so the inner content is everything up to j-2.
          const innerEnd = j - 2;
          if (buf) { tokens.push({ type: 'text', value: buf }); buf = ''; }
          tokens.push({ type: 'glyph', ref, inner: text.slice(afterColon, innerEnd) });
          i = j;
          continue;
        }
      }
    }
    buf += text[i];
    i++;
  }
  if (buf) tokens.push({ type: 'text', value: buf });
  return tokens;
}

/* Walk every text node under `root` and replace each character with an
   inline glyph from `set`, preserving the real character underneath for
   selection/copy. Characters with no glyph in the set are left as-is, so
   partial sets render mixed (real + fictional). Glyph SVGs use currentColor
   so they inherit any color/shimmer from ancestor spans. */
function swapGlyphsInTree(root, set) {
  const mode = getGlyphMode(set);
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  const textNodes = [];
  let n;
  while ((n = walker.nextNode())) textNodes.push(n);

  for (const node of textNodes) {
    const text = node.nodeValue;
    if (!text) continue;
    const frag = document.createDocumentFragment();
    for (const ch of text) {
      const strokes = set.glyphs[ch];
      if (strokes && strokes.length) {
        // Wrap: real char (hidden) + glyph SVG sized to 1em
        const wrap = document.createElement('span');
        wrap.className = 'glyph-char';
        // Real character, present but visually collapsed (kept for copy/select)
        const real = document.createElement('span');
        real.className = 'glyph-real';
        real.textContent = ch;
        wrap.appendChild(real);
        // The glyph visual, 1em box so it scales with font size
        const g = glyphSVG(strokes, set.grid, mode, '1em', getGlyphWidth(set, ch));
        g.classList.add('glyph-vis');
        wrap.appendChild(g);
        frag.appendChild(wrap);
      } else {
        frag.appendChild(document.createTextNode(ch));
      }
    }
    node.parentNode.replaceChild(frag, node);
  }
}

/* Renders raw node text. Glyph blocks {{n:text}} are the outermost layer:
   their inner text runs through the full color/link/markdown pipeline, then
   each character's visual is swapped for its glyph. Non-glyph text flows
   straight into the existing pipeline unchanged. */
/* Block-level image token: a line that is exactly [IMG:id:label]. Matched
   before any inline parsing so the image sits cleanly between text blocks and
   can never get trapped inside a color/link span. id is authoritative; the
   label is a cosmetic, freely-editable filename hint. A mangled token simply
   fails to match here and falls through to the inline renderer as literal
   text — no crash, consistent with how unknown markup is treated elsewhere. */
const IMG_TOKEN_RE = /^[ \t]*\[IMG:([A-Za-z0-9_]+):([^\]]*)\][ \t]*$/;

function renderRich(container, raw) {
  revokeObjectURLsIn(container);
  container.innerHTML = '';
  const text = raw || '';
  const lines = text.split('\n');

  // Group consecutive non-image lines into text segments; emit images inline
  // between them in document order.
  let buffer = [];
  const flush = () => {
    if (!buffer.length) return;
    const seg = buffer.join('\n');
    if (seg.length) renderInline(container, seg);
    buffer = [];
  };

  for (const line of lines) {
    const m = line.match(IMG_TOKEN_RE);
    if (m) {
      flush();
      container.appendChild(buildImageBlock(m[1], m[2]));
    } else {
      buffer.push(line);
    }
  }
  flush();
}

/* Build the inline image element for the reader. Loads the blob from Dexie
   asynchronously and swaps in an object URL once ready; tapping opens a
   full-resolution lightbox. The element is returned synchronously so render
   order is preserved. */
function buildImageBlock(id, label) {
  const fig = el('figure', { class: 'node-img' });
  const img = el('img', { alt: label || 'image', loading: 'lazy' });
  fig.appendChild(img);
  (async () => {
    try {
      const rec = state.db && await state.db.images.get(id);
      if (!rec || !rec.blob) { fig.classList.add('node-img-missing'); img.remove(); fig.appendChild(el('div', { class: 'node-img-ph' }, label ? `[missing image: ${label}]` : '[missing image]')); return; }
      const url = URL.createObjectURL(rec.blob);
      img.src = url;
      // Revoke when this figure leaves the DOM, to avoid leaking object URLs.
      trackObjectURL(fig, url);
      img.addEventListener('click', (e) => { e.stopPropagation(); openImageLightbox(rec.blob, label); });
    } catch (err) {
      fig.classList.add('node-img-missing');
    }
  })();
  return fig;
}

/* Object-URL lifecycle: revoke URLs created for a node render when that render
   is torn down. We watch the container the figure lives in; when renderRich
   next clears it (innerHTML = ''), a MutationObserver fires and we revoke. */
function trackObjectURL(node, url) {
  // Walk up to the render container (the element renderRich was called on).
  // Simplest robust approach: revoke on the next full re-render by stashing
  // the URL on the node and sweeping in renderRich. We attach to node so GC of
  // the node frees the closure; explicit revoke happens in revokeObjectURLsIn.
  node.__objUrl = url;
}

/* Revoke any object URLs under a container before it is re-rendered/cleared. */
function revokeObjectURLsIn(container) {
  if (!container) return;
  container.querySelectorAll('.node-img').forEach((fig) => {
    if (fig.__objUrl) { try { URL.revokeObjectURL(fig.__objUrl); } catch (e) {} fig.__objUrl = null; }
  });
}

/* Full-resolution image overlay. Reuses the app's top overlay layer; tap
   anywhere or the close control to dismiss. No navigation — stays in-page. */
function openImageLightbox(blob, label) {
  const url = URL.createObjectURL(blob);
  const overlay = el('div', { class: 'img-lightbox' });
  const img = el('img', { alt: label || 'image' });
  img.src = url;
  const close = () => {
    try { URL.revokeObjectURL(url); } catch (e) {}
    overlay.remove();
    document.removeEventListener('keydown', onKey);
  };
  const onKey = (e) => { if (e.key === 'Escape') close(); };
  overlay.addEventListener('click', close);
  document.addEventListener('keydown', onKey);
  overlay.appendChild(img);
  if (label) overlay.appendChild(el('div', { class: 'img-lightbox-cap' }, label));
  overlay.appendChild(el('button', { class: 'img-lightbox-x', 'aria-label': 'Close', onclick: close }, '✕'));
  document.body.appendChild(overlay);
  haptic(6);
}

/* Render all inline formatting — bold, italic, underline, size, color,
   glossary links, and address jumps — from a single unified parse. This
   replaces the older layered approach (separate color → link → markdown
   passes) which broke when an outer marker like ## or ** wrapped an inner
   {color:} block: the layered splitting severed the outer marker's pair.
   Parsing everything in one recursive tokenizer means any nesting order
   composes correctly. */
function renderInline(container, raw) {
  const tokens = parseMarkdown(raw || '');
  renderInlineTokens(container, tokens);
}

function renderInlineTokens(parent, tokenList) {
  for (const t of tokenList) {
    if (t.type === 'text') {
      parent.appendChild(document.createTextNode(t.value));
    } else if (t.type === 'color') {
      const span = document.createElement('span');
      span.className = 'md-color';
      span.style.color = t.color.kind === 'named'
        ? `var(--text-${t.color.value})` : t.color.value;
      renderInlineTokens(span, t.children || []);
      parent.appendChild(span);
    } else if (t.type === 'size') {
      const factors = [1.3, 1.55, 1.8];
      const span = document.createElement('span');
      span.className = 'md-size';
      span.style.fontSize = (factors[t.size] || 1.3) + 'em';
      renderInlineTokens(span, t.children || []);
      parent.appendChild(span);
    } else if (t.type === 'link') {
      if (state.settings.linksMode) {
        const span = document.createElement('span');
        span.className = 'gloss-link';
        renderInlineTokens(span, t.children && t.children.length ? t.children : [{ type:'text', value: t.display }]);
        span.dataset.key = (t.key || '').trim();
        span.addEventListener('click', (e) => {
          e.stopPropagation();
          haptic(8);
          openGlossaryEntry(span.dataset.key, t.display);
        });
        parent.appendChild(span);
      } else {
        renderInlineTokens(parent, t.children && t.children.length ? t.children : [{ type:'text', value: t.display }]);
      }
    } else if (t.type === 'jump') {
      const span = document.createElement('span');
      span.className = 'jump-link';
      renderInlineTokens(span, t.children && t.children.length ? t.children : [{ type:'text', value: t.display }]);
      span.dataset.address = t.address;
      span.addEventListener('click', async (e) => {
        e.stopPropagation();
        haptic(8);
        await handleJumpClick(t.address);
      });
      parent.appendChild(span);
    } else if (t.type === 'glyph') {
      // Resolve the font by name (numeric fallback for legacy {{1:}}).
      let set = getGlyphSetByName(t.ref);
      if (!set && /^\d+$/.test(t.ref)) set = getGlyphSetByIndex(t.ref);
      const region = document.createElement('span');
      region.className = 'glyph-region';
      renderInlineTokens(region, parseMarkdown(t.inner));
      if (set) swapGlyphsInTree(region, set);
      parent.appendChild(region);
    } else {
      const tag = t.type === 'b' ? 'strong' : t.type === 'i' ? 'em' : 'u';
      const e = document.createElement(tag);
      renderInlineTokens(e, t.children || []);
      parent.appendChild(e);
    }
  }
}

/* Handle a click on an address jump link. Checks existence, emptied
   status, and rating before navigating; explains via popup if blocked. */
async function handleJumpClick(address) {
  const node = await getNode(address);
  const isEmpty = !node || !node.text || !node.text.trim();
  if (isEmpty) {
    if (node && node.emptied) {
      await showPopup('Can\'t jump there',
        `Address ${address} has been emptied — there's nothing to read there right now.`,
        { okLabel: 'OK' });
    } else {
      await showPopup('Can\'t jump there',
        `Address ${address} doesn't exist (it may have been removed or never written).`,
        { okLabel: 'OK' });
    }
    return;
  }
  // Rating check — respect the reader's max rating setting
  const rating = await getRating(address);
  if (!ratingAllowed(rating)) {
    await showPopup('Can\'t jump there',
      `Address ${address} is rated ${rating}, which is above your current content filter. Raise the limit in Settings if you want to read it.`,
      { okLabel: 'OK' });
    return;
  }
  await navigateTo(address, true);
}

/* Backward-compat alias for any old callers */
function renderTextWithLinks(container, raw) {
  renderRich(container, raw);
}

function plainText(raw) {
  // Reduce fully-formatted node text to readable display-only prose, for the
  // path export (a shareable .txt with no markup). We reuse the same parser
  // the renderer uses, then walk the token tree keeping only visible text —
  // so every construct (bold, italic, underline, size, color, glossary
  // links, address jumps, and custom-font glyphs) is unwrapped to its
  // display text, and any nesting is handled correctly in one pass.
  function extract(tokens) {
    let out = '';
    for (const t of tokens) {
      if (t.type === 'text') out += t.value;
      else if (t.type === 'link' || t.type === 'jump') {
        // Use the parsed display children if present, else the raw display.
        out += (t.children && t.children.length) ? extract(t.children) : (t.display || '');
      } else if (t.children) {
        out += extract(t.children);
      } else if (t.type === 'glyph') {
        // Glyphs render real letters underneath — keep the inner text.
        out += plainText(t.inner || '');
      }
    }
    return out;
  }
  try {
    return extract(parseMarkdown(raw || ''));
  } catch {
    return raw || '';
  }
}

/* ----- Choices: build, filter, shuffle, render ----- */

/* A node is treated as "empty" if any of the following hold:
   - It doesn't exist in the DB (a ghost address)
   - It has the explicit `emptied: true` flag (soft-deleted)
   - Its text is blank/whitespace
   Empty nodes are transparent to the choice system: they get walked
   through to find the next non-empty descendants. */
function isNodeEmpty(node) {
  if (!node) return true;
  if (node.emptied === true) return true;
  if (!node.text || !node.text.trim()) return true;
  return false;
}

async function buildChoicePool(parent) {
  /* Bulk-load nodes and options once. With the empty-passthrough logic
     we may need to inspect many nodes when expanding through empties;
     one toArray() each is far cheaper than N async lookups. */
  const allNodes = await state.db.nodes.toArray();
  const nodeByAddr = new Map(allNodes.map(n => [n.address, n]));

  const allOpts = await state.db.options.toArray();
  const optsByParent = new Map();
  for (const o of allOpts) {
    if (!optsByParent.has(o.parent)) optsByParent.set(o.parent, []);
    optsByParent.get(o.parent).push(o.target);
  }

  function ratingOf(addr) {
    const root = ratingAncestor(addr);
    const r = nodeByAddr.get(root);
    return (r && r.rating) ? r.rating : 'L';
  }

  /* Recursive expansion: starting from a direct option target, walk
     through any empty nodes to find the nearest non-empty descendants.
     Cycle-protected via the `seen` set. */
  const visible = [];
  const seen = new Set();

  function expand(addr) {
    if (seen.has(addr)) return;
    seen.add(addr);
    const node = nodeByAddr.get(addr);
    if (isNodeEmpty(node)) {
      const children = optsByParent.get(addr) || [];
      for (const c of children) expand(c);
    } else {
      visible.push(addr);
    }
  }

  const directTargets = optsByParent.get(parent) || [];
  for (const t of directTargets) expand(t);

  /* Apply rating + author filters to the expanded visible set */
  const all = [];
  for (const t of visible) {
    const r = ratingOf(t);
    if (!ratingAllowed(r)) continue;
    if (state.authorFilter) {
      const node = nodeByAddr.get(t);
      const au = node ? node.author : '';
      if (au !== state.authorFilter) continue;
    }
    all.push(t);
  }
  /* totalRaw reflects expanded-but-unfiltered count so the "(N filtered)"
     hint in the choices header stays accurate after empty-passthrough. */
  return { all, totalRaw: visible.length };
}

function shuffledPick(items, n) {
  const pool = [...items];
  const out = [];
  const count = Math.min(n, pool.length);
  for (let i = 0; i < count; i++) {
    const idx = Math.floor(Math.random() * pool.length);
    out.push(pool[idx]);
    pool.splice(idx, 1);
  }
  return out;
}

/* ----- Forced shift ----- */

async function shiftTick() {
  if (!state.settings.shiftOn) return;
  state.story.shiftN1 += 1;
  // Shift fires when the counter REACHES the interval (N/N), not one step past
  // it. >= not >. Sequence for shiftN2=1: 0/1 → 1/1 (shift). For shiftN2=2:
  // 0/2 → 1/2 → 2/2 (shift). A prior edit had used strict >, which delayed the
  // shift by one extra navigation (firing at 2/1 instead of 1/1) — wrong.
  if (state.story.shiftN1 >= state.story.shiftN2) {
    // Find a random other address
    let target = '';
    for (let i = 0; i < 30; i++) {
      const r = await randomAddress();
      if (r && r !== state.currentAddr) { target = r; break; }
    }
    // Reset: shiftN1 back to 0 (not 1), so the full new interval is observed,
    // and grow the interval by 1. e.g. after the shift at 1/1: shiftN2 becomes
    // 2, shiftN1 becomes 0. Next sequence: 0/2 → 1/2 → 2/2 (shift).
    state.story.shiftN1 = 0;
    state.story.shiftN2 += 1;
    await saveStoryMeta();
    if (target) {
      // Wrap the jump in the divergence veil: show where we ARE, navigate behind
      // the black, settle the tubes onto where we LAND, then reveal. The veil
      // itself IS the notification — no popup to dismiss; surfacing on the new
      // node with its new divergence is the whole point.
      // noShift: the shift's OWN landing navigation must not re-tick the counter
      // — otherwise the post-shift state ends at 1/N instead of the reset 0/N.
      const fromAddr = state.currentAddr;
      await playShiftAnimation(fromAddr, target, async () => { await navigateTo(target, true, { noShift: true }); });
    }
  } else {
    await saveStoryMeta();
  }
}

   UI Layer

const $app = $('#app');

const $sheetTitleIcon = $('#sheet-title-icon');

function applyTheme(theme) {
  // Themes: 'fox-dark' (default — leave [data-theme] unset), 'warm', 'light'
  if (theme === 'fox-dark' || !theme) {
    document.documentElement.removeAttribute('data-theme');
  } else {
    document.documentElement.setAttribute('data-theme', theme);
  }
  // Update theme-color meta for system browser chrome
  const themeColors = {
    'fox-dark': '#0a0a0b',
    'warm':     '#0d0c0b',
    'light':    '#faf7f0',
    'blackout': '#000000'
  };
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', themeColors[theme] || '#0a0a0b');
}

/* Apply text scale, UI scale, and reading column width as CSS custom
   properties. Scales are percentages (100 = baseline). readWidth is a
   pixel cap on the reading/editor column, with 0 meaning "no cap, full
   width". Called on boot and after any Accessibility change. */
function applyScales() {
  const t = (state.settings.textScale || 100) / 100;
  const u = (state.settings.uiScale   || 100) / 100;
  document.documentElement.style.setProperty('--text-scale', t);
  document.documentElement.style.setProperty('--ui-scale',   u);
  const w = state.settings.readWidth || 0;
  if (w > 0) {
    document.documentElement.style.setProperty('--read-width', w + 'px');
  } else {
    document.documentElement.style.removeProperty('--read-width');
  }
}

function haptic(ms = 10) {
  if (navigator.vibrate) navigator.vibrate(ms);
}

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k.startsWith('on') && typeof attrs[k] === 'function') {
      e.addEventListener(k.slice(2), attrs[k]);
    } else if (attrs[k] !== undefined && attrs[k] !== null && attrs[k] !== false) {
      e.setAttribute(k, attrs[k]);
    }
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else if (Array.isArray(c)) c.forEach(x => x && e.appendChild(x));
    else e.appendChild(c);
  }
  return e;
}

function svg(pathHTML) {
  const wrap = document.createElement('div');
  wrap.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">${pathHTML}</svg>`;
  return wrap.firstElementChild;
}

function iconBtn(iconKey, label, onClick) {
  const b = document.createElement('button');
  b.className = 'icon-btn';
  b.setAttribute('aria-label', label);
  b.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">${ICON[iconKey]}</svg>`;
  b.addEventListener('click', onClick);
  return b;
}

function navBtn(iconKey, label, onClick, opts = {}) {
  const b = document.createElement('button');
  b.className = 'nav-btn'
    + (opts.write ? ' write' : '')
    + (opts.softDisabled ? ' soft-disabled' : '');
  if (opts.disabled) b.disabled = true;
  b.innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">${ICON[iconKey]}</svg>
    <span>${label}</span>
  `;
  if (!opts.disabled) {
    if (opts.onLongPress) {
      // Short tap fires onClick; hold ≥400ms fires onLongPress instead.
      // `pressed` guards against orphan pointer events: if a re-render
      // happens during a long press, the new button instance must NOT
      // treat the user's release as a click (it never saw the press).
      let pressed = false;
      let fired = false;
      let longTimer = null;
      const cancel = () => { pressed = false; clearTimeout(longTimer); };

      b.addEventListener('pointerdown', (e) => {
        // Stop the browser from also firing a synthesized click event
        // on top of our pointerup-based click logic.
        e.preventDefault();
        pressed = true;
        fired = false;
        longTimer = setTimeout(() => {
          if (!pressed) return;
          pressed = false;
          fired = true;
          haptic(20);
          opts.onLongPress();
        }, 400);
      });
      b.addEventListener('pointerup', () => {
        if (!pressed) return; // orphan pointerup — ignore
        pressed = false;
        clearTimeout(longTimer);
        if (!fired) { haptic(8); onClick(); }
      });
      b.addEventListener('pointerleave', cancel);
      b.addEventListener('pointercancel', cancel);
      b.addEventListener('contextmenu', e => e.preventDefault());
    } else {
      b.addEventListener('click', () => { haptic(8); onClick(); });
    }
  }
  return b;
}

/* ----- Toast ----- */

let toastTimer = null;
function toast(msg, ms = 1800) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => $toast.classList.remove('show'), ms);
}

/* ----- Sheet ----- */

let sheetCloser = null;
function openSheet(title, body, onClose, opts = {}) {
  $sheetTitle.textContent = title;
  // Optional brand mark to the left of the title (the menu banner uses it).
  // Reset on every open so it can never leak into another sheet.
  if (opts.titleIcon) { $sheetTitleIcon.src = opts.titleIcon; $sheetTitleIcon.hidden = false; }
  else { $sheetTitleIcon.hidden = true; $sheetTitleIcon.removeAttribute('src'); }
  $sheetBody.innerHTML = '';
  if (typeof body === 'string') $sheetBody.innerHTML = body;
  else $sheetBody.appendChild(body);
  $sheet.classList.remove('show', 'compact', 'above-overlay');
  $sheetBackdrop.classList.remove('show', 'compact', 'above-overlay');
  if (opts.compact) {
    $sheet.classList.add('compact');
    $sheetBackdrop.classList.add('compact');
  }
  // When opened from within the writer overlay, sit above it so the sheet
  // is actually visible instead of opening behind the overlay.
  if (opts.aboveOverlay) {
    $sheet.classList.add('above-overlay');
    $sheetBackdrop.classList.add('above-overlay');
  }
  void $sheet.offsetWidth;
  $sheet.classList.add('show');
  $sheetBackdrop.classList.add('show');
  sheetCloser = onClose || null;
  haptic(10);
  history.pushState({ overlay: 'sheet' }, '');
}

function closeSheet() {
  $sheet.classList.remove('show', 'compact', 'above-overlay');
  $sheetBackdrop.classList.remove('show', 'compact', 'above-overlay');
  if (sheetCloser) sheetCloser();
  sheetCloser = null;
}

$('#sheet-close').addEventListener('click', closeSheet);
$sheetBackdrop.addEventListener('click', closeSheet);

/* ----- Overlay (writer) ----- */

/* Keyboard handling on mobile is delegated to the browser via the viewport
   meta tag's `interactive-widget=resizes-content` (Chrome 108+, Firefox 132+).
   That resizes the layout viewport when the on-screen keyboard appears, so a
   plain position:fixed/inset:0 overlay automatically fits above the keyboard —
   no JS resizing of the fixed element (which was leaving repaint ghosts on
   Firefox Android). Where the key isn't supported the browser falls back to
   its native focus-scrolling. */

function openOverlay(content) {
  $overlay.innerHTML = '';
  $overlay.appendChild(content);
  void $overlay.offsetWidth;
  $overlay.classList.add('show');
  history.pushState({ overlay: 'overlay' }, '');
}
function closeOverlay() {
  $overlay.classList.remove('show');
  setTimeout(() => { $overlay.innerHTML = ''; }, 300);
}

/* ----- Popups ----- */

let popupResolver = null;
// Exposed so custom popup bodies can close the popup from their own buttons.
function resolvePopup(val) {
  $popupHost.classList.remove('show');
  if (popupResolver) { popupResolver(val); popupResolver = null; }
  // Clear the popup contents after the hide transition. Leaving them in
  // the DOM (just visually hidden) lets the browser's tap-to-search scan
  // find text like swatch titles or section labels "behind" the UI.
  setTimeout(() => {
    // Only clear if a new popup hasn't opened in the meantime
    if (!$popupHost.classList.contains('show')) $popupBox.innerHTML = '';
  }, 250);
}

function showPopup(title, body, options = {}) {
  return new Promise((resolve) => {
    popupResolver = resolve;
    $popupBox.innerHTML = '';
    if (title) $popupBox.appendChild(el('div', { class: 'popup-title' }, title));
    const bodyDiv = el('div', { class: 'popup-body' });
    if (typeof body === 'string') bodyDiv.textContent = body;
    else bodyDiv.appendChild(body);
    $popupBox.appendChild(bodyDiv);

    // noActions: caller supplies its own buttons inside body
    if (!options.noActions) {
      const actions = el('div', { class: 'popup-actions' });
      if (options.input !== undefined) {
        const input = el('input', { class: 'popup-input', type: 'text', placeholder: options.placeholder || '' });
        input.value = options.input;
        $popupBox.appendChild(input);
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') resolvePopup(input.value);
        });
        setTimeout(() => input.focus(), 100);
        actions.appendChild(el('button', {
          class: 'btn ghost',
          onclick: () => resolvePopup(null)
        }, 'Cancel'));
        actions.appendChild(el('button', {
          class: 'btn primary',
          onclick: () => resolvePopup(input.value)
        }, options.okLabel || 'OK'));
      } else if (options.confirm) {
        actions.appendChild(el('button', {
          class: 'btn ghost',
          onclick: () => resolvePopup(false)
        }, options.cancelLabel || 'Cancel'));
        actions.appendChild(el('button', {
          class: options.danger ? 'btn danger' : 'btn primary',
          onclick: () => resolvePopup(true)
        }, options.okLabel || 'OK'));
      } else {
        actions.appendChild(el('button', {
          class: 'btn primary',
          onclick: () => resolvePopup(true)
        }, options.okLabel || 'OK'));
      }
      $popupBox.appendChild(actions);
    }
    $popupHost.classList.add('show');
    haptic(10);
  });
}

$popupHost.addEventListener('click', (e) => {
  if (e.target === $popupHost) resolvePopup(null);
});

/* ----- Onboarding (first boot) ----- */

/* Tutorial loading.
   Two modes:
   - Silent (after Continue): attempts to fetch sibling tutorial.cyoa.
     Fails silently if not available (file://, missing file, no network).
     Used so hosted versions auto-populate the tutorial without a prompt.
   - Interactive (button tap): shows feedback popups. Used by "Load tutorial
     story" button so users know if it succeeded or failed.

   Both fetch from the same relative URL "tutorial.cyoa". When served over
   http(s) the file must sit alongside the main .html in the deploy folder.
   On file:// most browsers block the fetch entirely — that's fine, the
   single-file standalone download still works without the tutorial. */
async function fetchTutorialText() {
  // Guard against file:// — fetch() against same-folder files is blocked
  // in modern browsers from file:// origins, so don't even try.
  if (location.protocol === 'file:') {
    throw new Error('Tutorial auto-load is only available when hosted.');
  }
  const res = await fetch('tutorial.cyoa', { cache: 'no-cache' });
  if (!res.ok) throw new Error('Tutorial file not found (HTTP ' + res.status + ')');
  const text = await res.text();
  if (!text || !text.includes('NODE|')) {
    throw new Error('Tutorial file is empty or malformed.');
  }
  return text;
}

async function tryAutoLoadTutorial() {
  try {
    // Don't import if a tutorial is already loaded (e.g. user came back
    // to onboarding after wiping settings but kept the DB).
    const existing = await listStories();
    if (existing.some(s => /tutorial/i.test(s.title))) return;
    const text = await fetchTutorialText();
    await handleImport(text, 'Tutorial');
  } catch {
    // Silent — single-file offline use or no tutorial available
  }
}

async function tryLoadTutorialInteractive() {
  try {
    const text = await fetchTutorialText();
    await handleImport(text, 'Tutorial');
    await showPopup('Tutorial loaded', 'The tutorial story is in your library — open it from the story picker.', { okLabel: 'Got it' });
  } catch (err) {
    await showPopup(
      'Couldn\'t load tutorial',
      el('div', {},
        el('div', { style: 'margin-bottom: 10px;' }, 'The tutorial auto-load only works when running The Den from a hosted version (an http or https URL).'),
        el('div', { style: 'color: var(--ink-soft); font-size: 13px;' }, 'If you\'re using the standalone HTML file offline, you can still load the tutorial by downloading the tutorial.cyoa file and using Menu → Import.')
      ),
      { okLabel: 'Got it' }
    );
  }
}

async function showOnboarding() {
  let chosenRating = state.settings.maxRating || 'H';

  function ratingButton(letter, name, desc) {
    const b = el('button', {
      class: letter,
      onclick: () => {
        chosenRating = letter;
        document.querySelectorAll('.rating-onboard button').forEach(x => x.classList.remove('selected'));
        b.classList.add('selected');
        haptic(8);
      }
    },
      el('span', { class: 'ro-letter' }, letter),
      el('div', { class: 'ro-text' },
        el('div', { class: 'ro-name' }, name),
        el('div', { class: 'ro-desc' }, desc)
      )
    );
    if (chosenRating === letter) b.classList.add('selected');
    return b;
  }

  const screen = el('div', { class: 'onboard' },
    el('div', { class: 'onboard-card' },
      el('h1', {}, APP_NAME, ' ', el('span', { class: 'accent' }, '/')),
      el('p', {}, 'A collaborative branching narrative engine. Read other people\'s stories, write your own, weave them together.'),
      el('p', {}, el('strong', {}, 'Content filter'), ' — choose the maximum rating you want to see. You can change this later in settings.'),
      el('div', { class: 'rating-onboard' },
        ratingButton('L', 'Low', 'Clean, safe, general'),
        ratingButton('M', 'Medium', 'Gritty, violent, complex'),
        ratingButton('H', 'High', 'Unfiltered and potentially explicit')
      ),
      el('button', {
        class: 'btn primary',
        style: 'margin-top: 8px;',
        onclick: async () => {
          await saveSetting('maxRating', chosenRating);
          await saveSetting('hasOnboarded', true);
          haptic(15);
          // On PC-sized screens with hover capability, prompt the user
          // to set up their preferred scale and reading width. Default
          // sizes are tuned for mobile and would otherwise feel cramped.
          const isPC = window.matchMedia('(min-width: 1024px) and (hover: hover)').matches;
          if (isPC) {
            await showPCScaleSetup();
          }
          // Try to auto-load the tutorial. Only works when served over
          // http(s) with a sibling tutorial.cyoa file. Fails silently on
          // file:// (single-file offline use) or when no tutorial is
          // present — the user just lands on an empty story picker, fine.
          await tryAutoLoadTutorial();
          await bootStorySelection();
        }
      }, 'Continue'),
