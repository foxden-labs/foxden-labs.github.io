/* ----- Pick start timeline ----- */

async function pickStartTimeline() {
  // Boot screen on story open: play the same loading animation as new-story
  // creation, settling the counter onto wherever we actually land — the resumed
  // deep node, or the chosen/sole root (1.000000, 2.000000…), or 1A for a fresh
  // empty story. Plays once here, on open. enterAt() wraps "boot then navigate"
  // so every exit path below gets it consistently.
  const title = (state.story && state.story.title) || APP_NAME;
  const enterAt = async (addr) => {
    // Navigation runs BEHIND the boot veil (passed as the callback) so the node
    // snap is hidden by the spinning meter, and the reveal lands on a ready UI.
    // noShift: opening a story must not count as a forced-shift step (it would
    // otherwise tick the counter on load and could fire a shift mid-boot).
    await playBootSequence(title, addr, async () => { await navigateTo(addr, true, { noShift: true }); });
  };

  // Resume where we left off. lastAddr is persisted per-story on every
  // navigation (see navigateTo). If it points at a node that still EXISTS, drop
  // straight back into it instead of forcing a root-node pick — the timeline
  // picker only ever offered 1A/2A/etc, which made returning to a deep position
  // impossible.
  //
  // Existence is the ONLY guard. Emptied nodes still count: the app empties
  // rather than deletes, so an emptied node isn't gone, it's just blank — still
  // a real position the reader was legitimately at, and bouncing them to the
  // root picker to re-hunt their spot in a huge tree is the papercut this fixes.
  // The only truly non-resumable case is genuine removal (branch delete / full
  // erase), where getNode returns null and we fall through to the normal flow.
  const last = state.story && state.story.lastAddr;
  if (last && isValidAddress(last)) {
    const node = await getNode(last);
    if (node) {
      await enterAt(last);
      return;
    }
  }

  const tops = await topLevelTimelines();
  if (tops.length === 0) {
    // Empty story — boot settles on 1.000000, write-ready render behind veil.
    await playBootSequence(title, '1A', async () => {
      state.currentAddr = '1A';
      await renderMain();
    });
    return;
  }
  if (tops.length === 1) {
    await enterAt(tops[0]);
    return;
  }

  // Multiple — show as choices
  const list = el('div', { class: 'list' });
  for (const addr of tops) {
    const node = await getNode(addr);
    const rating = await getRating(addr);
    const author = node ? node.author : '';
    const preview = node ? plainText(node.text).slice(0, 200) : '';
    const row = el('button', {
      class: 'list-row',
      onclick: async () => { haptic(10); closeSheet(); await enterAt(addr); }
    },
      el('div', { class: 'row-main' },
        el('div', {
          style: 'display: flex; gap: 8px; align-items: center; margin-bottom: 6px;'
        },
          el('span', { class: 'choice-rating ' + rating }, rating),
          el('span', { class: 'addr-pill' }, addr),
          author && el('span', { class: 'row-sub' }, 'by ' + author)
        ),
        el('div', {
          style: 'font-size: 14px; color: var(--ink-soft); line-height: 1.5;'
        }, preview + (preview.length >= 200 ? '…' : ''))
      )
    );
    list.appendChild(row);
  }

  // Render to main content while sheet is what user uses, but it's also OK
  // to just put this directly as the screen.
  const screen = el('div', { class: 'picker-screen' },
    el('div', { class: 'picker-head' },
      el('div', { class: 'picker-title' }, state.story.title),
      el('div', { class: 'picker-subtitle' }, tops.length + ' timelines — pick one to begin')
    ),
    el('div', { class: 'picker-list' }, list),
    el('div', { class: 'picker-foot' },
      el('button', {
        class: 'btn',
        onclick: async () => {
          const addr = await newTopLevelAddr();
          state.currentAddr = addr;
          await renderMain();
          openWriter('new', { addr, isRoot: true });
        }
      }, 'New timeline'),
      el('button', {
        class: 'btn',
        onclick: () => showStoryPicker()
      }, 'Stories')
    )
  );

  $app.innerHTML = '';
  $app.appendChild(screen);
}

/* ----- Main reading screen ----- */

// Single place that commits a position change's persistent side effects, shared
// by navigateTo and by the browser-history handlers (popstate / hashchange /
// deep-link) so they can't drift apart. Sets the current address, updates the
// visited thread, and persists both to the story's meta. Deliberately does NOT
// touch the history stack, shift counter, forward stack, or render — those are
// forward-navigation concerns navigateTo layers on top, and which a browser
// back must NOT trigger.
function recordPosition(addr) {
  state.currentAddr = addr;
  trailRecord(addr);
  if (state.db) {
    state.db.meta.put({ key: 'lastAddr', value: addr }).catch(() => {});
    if (state.settings.trackerOn) {
      state.db.meta.put({ key: 'trail', value: state.trail.slice() }).catch(() => {});
    }
  }
}

async function navigateTo(addr, forwardDir = true, { fromStack = false, noShift = false } = {}) {
  if (!isValidAddress(addr)) { toast('Invalid address'); return; }
  // Any navigation that isn't popping the forward stack clears it.
  // This way choosing a different branch, using search, bookmarks, shift,
  // tree taps etc. all reset the remembered path.
  if (!fromStack) state.navForwardStack = [];
  const prev = state.currentAddr;
  recordPosition(addr);   // currentAddr + visited-thread + persist lastAddr/trail (shared)
  state.forwardDir = forwardDir;
  state.shuffleSeed++;
  // URL hash for shareable links and browser back
  if (location.hash !== '#' + addr) {
    history.pushState({ addr }, '', '#' + addr);
  }
  await renderMain();
  // A story-open navigation (resume / pick start) is NOT a story step — it
  // shouldn't count toward a forced shift, and counting it could trip a shift
  // during the boot screen (double animation). Callers pass noShift for opens.
  if (!noShift && prev && prev !== addr) shiftTick();
}

async function renderMain() {
  if (!state.story) {
    await showStoryPicker();
    return;
  }

  const addr = state.currentAddr;
  const node = await getNode(addr);
  const isEmptied = !!(node && node.emptied);
  const exists = !!(node && node.text && !isEmptied);
  /* Emptied branch roots keep their rating so the dot still renders
     accurately even when the body is blank. */
  const rating = (exists || isEmptied) ? await getRating(addr) : null;

  // ─ Header ─
  const header = el('header', { class: 'top' },
    iconBtn('home', 'Stories', () => showStoryPicker()),
    el('div', { class: 'story-title' }, state.story.title),
    rating && el('span', { class: 'rating-dot ' + rating, title: 'Rating ' + rating }),
    el('button', {
      class: 'addr-pill',
      style: 'cursor: pointer; background: none; border: none; padding: 0;',
      title: 'Tap to copy address',
      onclick: () => {
        const body = el('div', {});
        const addrBlock = el('div', {
          style: 'font-family: var(--mono); font-size: 14px; letter-spacing: 0.5px; padding: 10px 12px; background: var(--bg-elev); border: 1px solid var(--line); margin-bottom: 12px; user-select: text; -webkit-user-select: text; word-break: break-all;'
        }, addr);
        body.appendChild(addrBlock);
        const actions = el('div', { style: 'display: flex; gap: 8px;' });
        const copyBtn = el('button', {
          class: 'btn primary',
          style: 'flex: 1;',
          onclick: async () => {
            try {
              await navigator.clipboard.writeText(addr);
              copyBtn.textContent = 'Copied!';
              setTimeout(() => { copyBtn.textContent = 'Copy address'; }, 1500);
            } catch {
              copyBtn.textContent = 'Select above to copy';
              setTimeout(() => { copyBtn.textContent = 'Copy address'; }, 2500);
            }
          }
        }, 'Copy address');
        const closeBtn = el('button', {
          class: 'btn ghost',
          style: 'flex: 1;',
          onclick: () => resolvePopup(true)
        }, 'Close');
        actions.appendChild(copyBtn);
        actions.appendChild(closeBtn);
        body.appendChild(actions);
        showPopup('Current node', body, { noActions: true });
      }
    }, addr || '—'),
    iconBtn('menu', 'Menu', openMenu)
  );

  // ─ Node body ─
  const stage = el('div', { class: 'node-stage' });
  const card = el('div', { class: 'node-card' });

  const textZone = el('div', { class: 'node-text' });
  if (exists) {
    renderRich(textZone, node.text);
  } else {
    textZone.classList.add('empty');
    textZone.textContent = isEmptied
      ? '[ this node has been emptied — tap "Write here" to add new content ]'
      : '[ nothing written here yet ]';
  }
  card.appendChild(textZone);

  // Author / meta line under text
  if (exists && state.settings.showAuthor && node.author) {
    card.appendChild(el('div', { class: 'node-meta' },
      svg(ICON.user),
      el('span', {}, node.author)
    ));
  }

  // ─ Choices ─
  const pool = await buildChoicePool(addr);
  let shown = shuffledPick(pool.all, 3);

  const choicesSection = el('section', { class: 'choices' });
  if (state.choicesCollapsed) choicesSection.classList.add('collapsed');
  const choicesHead = el('div', { class: 'choices-head' });

  // Collapse/expand toggle
  const collapseBtn = el('button', {
    class: 'choices-collapse-btn',
    'aria-label': 'Toggle choices',
    onclick: (ev) => {
      ev.stopPropagation();
      haptic(6);
      state.choicesCollapsed = !state.choicesCollapsed;
      choicesSection.classList.toggle('collapsed', state.choicesCollapsed);
    }
  });
  collapseBtn.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>';

  const headLeft = el('div', {
    style: 'display: flex; align-items: center; gap: 10px; flex: 1;'
  },
    collapseBtn,
    el('span', {}, 'Choices')
  );
  choicesHead.appendChild(headLeft);

  const headRight = el('span', { class: 'more-note' });
  const hidden = pool.totalRaw - pool.all.length;
  if (pool.all.length > 3 || hidden > 0) {
    const parts = [];
    if (pool.all.length > 3) parts.push((pool.all.length - 3) + ' more');
    if (hidden > 0) parts.push(hidden + ' filtered');
    if (state.authorFilter) parts.push('only: ' + state.authorFilter);
    headRight.textContent = parts.join(' · ');
  }
  choicesHead.appendChild(headRight);
  choicesSection.appendChild(choicesHead);

  if (shown.length === 0) {
    const msg = state.authorFilter
      ? `No options from ${state.authorFilter} here.`
      : 'No choices yet.';
    choicesSection.appendChild(el('div', { class: 'choices-empty' }, msg));
  } else {
    const list = el('div', { class: 'choices-list' });
    let i = 1;
    for (const target of shown) {
      list.appendChild(await renderChoice(target, i));
      i++;
    }
    choicesSection.appendChild(list);
  }

  card.appendChild(choicesSection);
  stage.appendChild(card);

  // ─ Bottom navigation ─
  const nxt = nextStepAddr(addr);
  const prv = prevStepAddr(addr);
  const par = branchParentAddr(addr);
  const isBookmarked = exists ? await bookmarkExists(addr) : false;

  const nav = el('nav', { class: 'nav' });

  // Back button.
  // Short press: skip emptied nodes (nearestBackwardInSegment already does this).
  // Long press: go to raw immediate previous address, even if emptied.
  // At top-level root with no back target: open timeline picker.
  // Every back press pushes current addr onto navForwardStack.
  const backTarget = await nearestBackwardInSegment(addr);
  const parExists = par && await nodeExists(par);

  async function doBack(skipEmpty) {
    state.navForwardStack.push(addr);
    if (skipEmpty) {
      if (backTarget) await navigateTo(backTarget, false, { fromStack: true });
      else if (parExists) await navigateTo(par, false, { fromStack: true });
      else await openTimelinePicker();
    } else {
      // Raw previous: immediate prevStep even if empty, or branch parent
      const rawPrev = prevStepAddr(addr);
      if (rawPrev && branchParentAddr(rawPrev) === par) {
        await navigateTo(rawPrev, false, { fromStack: true });
      } else if (parExists) {
        await navigateTo(par, false, { fromStack: true });
      } else {
        await openTimelinePicker();
      }
    }
  }

  nav.appendChild(navBtn('back', 'Back', () => doBack(true), {
    disabled: false,
    onLongPress: () => doBack(false)
  }));

  // Shuffle
  nav.appendChild(navBtn('shuffle', 'Shuffle', () => {
    state.shuffleSeed++;
    renderMain();
  }, { disabled: pool.all.length <= 3 }));

  // Forward / Write next / Write here.
  // Short press: skip emptied nodes, pop stack if available (skipping empty entries).
  // Long press: go to raw next address even if emptied; pops stack as-is.
  // fwdTarget is computed once and reused by canBranch below.
  const fwdTarget = exists ? await nearestForwardInSegment(addr) : null;

  async function doForward(skipEmpty) {
    const stack = state.navForwardStack;
    if (stack.length > 0) {
      if (skipEmpty) {
        // Pop past any emptied entries, go to first real one
        while (stack.length > 0) {
          const top = stack[stack.length - 1];
          const n = await getNode(top);
          if (!isNodeEmpty(n)) {
            stack.pop();
            await navigateTo(top, true, { fromStack: true });
            return;
          }
          stack.pop(); // skip emptied entry silently
        }
        // Stack exhausted of non-empty entries — fall through to default
      } else {
        // Long press: take top as-is, empty or not
        const top = stack.pop();
        await navigateTo(top, true, { fromStack: true });
        return;
      }
    }
    // No usable stack entry — default forward
    if (skipEmpty) {
      if (fwdTarget) await navigateTo(fwdTarget, true);
    } else {
      const rawNext = nextStepAddr(addr);
      if (rawNext) await navigateTo(rawNext, true, { fromStack: false });
    }
  }

  if (exists) {
    if (fwdTarget || state.navForwardStack.length > 0) {
      nav.appendChild(navBtn('fwd', 'Forward', () => doForward(true), {
        onLongPress: () => doForward(false)
      }));
    } else {
      nav.appendChild(navBtn('add', 'Write next', () => openWriter('new', { addr: nxt })));
    }
  } else {
    nav.appendChild(navBtn('add', 'Write here', () => openWriter('new', {
      addr,
      isRoot: !branchParentAddr(addr) || !nodeExists(branchParentAddr(addr))
    })));
  }

  // Branch — only available once a continuation exists so that forward
  // navigation is never left dead when branches are present.
  const canBranch = exists && !!fwdTarget;
  nav.appendChild(navBtn('branch', 'Branch', async () => {
    if (!exists) {
      toast('Write this node first');
      return;
    }
    if (!canBranch) {
      await showPopup(
        'Write the continuation first',
        `Write ${nxt} before branching here. That way readers always have a forward path and the branch appears as an extra choice rather than the only way out.`,
        { confirm: false, okLabel: 'Got it' }
      );
      return;
    }
    const baddr = await newBranchAddr(addr);
    const existing = await getNode(baddr);

    // Orphaned node: has content but wasn't wired via OPTIONS.
    // Warn the author, show the content, and offer to reconnect it.
    if (existing && !existing.emptied && existing.text) {
      const preview = plainText(existing.text).slice(0, 150);
      const ok = await showPopup(
        'Branch ' + baddr + ' already has content',
        el('div', {},
          el('div', { style: 'margin-bottom: 10px; color: var(--ink-soft); font-size: 13px; line-height: 1.5;' },
            'This address exists but is not connected to the tree (orphaned). Tap "Reconnect" to wire it back and navigate there.'
          ),
          el('div', {
            style: 'background: var(--bg-elev); border: 1px solid var(--line); padding: 10px 12px; font-size: 13px; color: var(--ink); line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; max-height: 120px; overflow-y: auto;'
          }, preview + (preview.length >= 150 ? '…' : ''))
        ),
        { confirm: true, okLabel: 'Reconnect', cancelLabel: 'Cancel' }
      );
      if (!ok) return;
      await addOption(addr, baddr);
      await navigateTo(baddr, true);
      toast('Reconnected ' + baddr);
      return;
    }

    openWriter('branch', { addr: baddr, fromAddr: addr, isRoot: true });
  }, { disabled: !exists, softDisabled: exists && !canBranch }));

  // Bookmark
  nav.appendChild(navBtn(isBookmarked ? 'bookmarked' : 'bookmark', 'Save', async () => {
    if (!exists) { toast('Nothing to bookmark'); return; }
    if (await bookmarkExists(addr)) {
      await bookmarkRemove(addr);
      toast('Bookmark removed');
    } else {
      await bookmarkAdd(addr);
      toast('Bookmarked');
    }
    renderMain();
  }, { disabled: !exists }));

  // ─ Assemble ─
  $app.innerHTML = '';
  $app.appendChild(header);
  const main = el('main', { class: 'body' }, stage);
  $app.appendChild(main);
  $app.appendChild(nav);
}

async function renderChoice(addr, num) {
  const node = await getNode(addr);
  const rating = await getRating(addr);
  const author = node ? node.author : '';

  const line1 = el('div', { class: 'choice-line1' });
  line1.appendChild(el('span', { class: 'choice-rating ' + rating }, rating));
  line1.appendChild(el('span', {}, addr));
  if (author) line1.appendChild(el('span', { style: 'color: var(--ink-dim);' }, '· ' + author));

  const fullText = node ? plainText(node.text) : '(nothing written here yet)';
  const truncated = fullText.length > 80 ? fullText.slice(0, 80) + '…' : fullText;

  // Three states:
  //   spoiler mode → subtitle if set, else short truncation
  //   normal → 2-line CSS clamp with full text inside
  //   expanded → full text uncapped
  const previewText = state.settings.spoilerMode
    ? (node && node.subtitle ? node.subtitle : truncated)
    : fullText;

  const preview = el('div', { class: node ? 'choice-preview' : 'choice-empty' }, previewText);

  // Tap on body navigates; tap on chevron expands.
  const tapZone = el('div', {
    class: 'choice-body',
    style: 'cursor: pointer;',
    onclick: (e) => { e.stopPropagation(); navigateTo(addr, true); }
  }, line1, preview);

  const expandBtn = node && fullText.length > 100 && !state.settings.spoilerMode ?
    el('button', {
      class: 'choice-expand',
      'aria-label': 'Expand preview',
      onclick: (e) => {
        e.stopPropagation();
        haptic(6);
        preview.classList.toggle('expanded');
        expandBtn.classList.toggle('expanded');
      }
    },
      svg('<polyline points="6 9 12 15 18 9"></polyline>')
    ) : null;

  const choice = el('div', { class: 'choice' },
    el('div', { class: 'choice-num', onclick: (e) => { e.stopPropagation(); navigateTo(addr, true); } }, '0' + num),
    tapZone,
    expandBtn
  );
  return choice;
}

  link.addEventListener('pointerleave', () => link.style.transform = 'scale(1)');
  body.appendChild(link);

  showPopup('Discord server', body, { okLabel: 'Close' });
}

/* The stripped meter that sits at the top of the hamburger menu: a small
   label and the glowing 8-slot Nixie readout for the current node.

   Two "broken dial" states, both spinning only the 6 decimal slots (integer +
   dot hold steady — a broken clock doesn't know it's broken):
     - EMPTIED node  → sickly amber churn, normal speed. Async (needs the node).
     - OVERFLOW      → raw divergence > cap. Screaming red, faster, glitchier.
       Synchronous — divergenceReadout already knows .overflow, no DB needed.
   Overflow takes precedence if both somehow apply.

   Returns { wrap, stop } — stop() clears the interval and MUST be called when
   the menu closes (wired through openSheet's onClose), or the timer keeps
   firing against detached DOM. */
function buildDivergenceMeter(addr) {
  const r = divergenceReadout(addr);
  const wrap = el('div', { class: 'diverge' });
  wrap.appendChild(el('div', { class: 'diverge-label' }, 'Divergence'));
  const ro = el('div', { class: 'diverge-readout' + (r.ok ? '' : ' nosignal') });
  const slot = (ch, cls) => el('div', { class: 'diverge-slot' + (cls ? ' ' + cls : '') }, ch);
  ro.appendChild(slot(r.integer, 'int'));
  ro.appendChild(slot('.', 'dot'));
  const decimalSlots = [];
  for (const ch of r.decimals) { const s = slot(ch, ''); decimalSlots.push(s); ro.appendChild(s); }
  wrap.appendChild(ro);

  let timer = null, stopped = false;
  const stop = () => { stopped = true; if (timer) { clearInterval(timer); timer = null; } };

  // Shared churn engine. cls = state class; intervalMs = spin speed; everyTick =
  // swap every slot each tick (busy/glitchy) vs staggered every-other.
  // Idempotent (replaces any running churn) and bails if stopped — important
  // because the overflow start is deferred a frame to wait for DOM attach, and
  // the menu may close in between. We DON'T gate on isConnected: closeSheet only
  // hides the sheet, it doesn't detach the node, so isConnected stays true and
  // can't be trusted; the stopped flag (fired via onClose) is the real signal.
  function startChurn(cls, intervalMs, everyTick) {
    if (stopped) return;
    if (timer) { clearInterval(timer); timer = null; }
    ro.classList.remove('churn', 'overflow');
    ro.classList.add(cls);
    const phase = decimalSlots.map(() => Math.floor(Math.random() * 3));
    let t = 0;
    timer = setInterval(() => {
      t++;
      decimalSlots.forEach((s, i) => {
        if (everyTick || (t + phase[i]) % 2 === 0) {
          s.textContent = String(Math.floor(Math.random() * 10));
          s.classList.remove('blip'); void s.offsetWidth; s.classList.add('blip');
        }
      });
    }, intervalMs);
  }

  // Dev hook + the real trigger both go through this.
  const forceHaywire = () => startChurn('overflow', 45, true);

  // OVERFLOW — the real easter egg, auto-fires only when the counter actually
  // rolls past its last digit. Red, fast, every slot every tick. DEFERRED one
  // frame: a synchronous start here runs BEFORE openSheet attaches the menu, so
  // the animation would silently never appear. rAF lets the DOM attach first.
  // (Dev preview is on-demand via the haywire button, not auto — so DEV_MODE is
  // deliberately NOT part of this condition.)
  if (r.ok && r.overflow) {
    requestAnimationFrame(forceHaywire);
    return { wrap, stop, forceHaywire };
  }

  // Otherwise async-check emptied state and start the amber churn if so.
  (async () => {
    if (!r.ok || !state.db || !addr) return;
    let node = null;
    try { node = await state.db.nodes.get(addr); } catch (e) { return; }
    if (!node || !node.emptied) return;
    startChurn('churn', 70, false);
  })();

  return { wrap, stop, forceHaywire };
}

/* Play the new-story boot screen, then resolve. Pure timing; settles the Nixie
   counter onto the real divergence of `destAddr` (1A → 1.000000 for a new
   story, but written to handle any node so it can be reused for live loads
   later). Tap anywhere to skip straight to the reveal. Always resolves exactly
   once, whether it runs to completion or is skipped. */
let bootActive = false;
function playBootSequence(storyName, destAddr, navigate) {
  return new Promise((resolve) => {
    // Idempotency guard: if a boot is already running, don't stack a second
    // one. Still run the navigation (so the destination loads) and resolve
    // immediately — this defends against two open paths racing to boot.
    if (bootActive) {
      (async () => { try { if (navigate) await navigate(); } catch (e) {} resolve(); })();
      return;
    }
    bootActive = true;
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));
    // Locked timing (tuned in the playground).
    const T = { caret: 800, type: 90, hold: 460, fadeIn: 500, spin: 900, spinTick: 60, settle: 180, final: 700, fade: 600 };
    const name = (storyName || 'The Den').trim() || 'The Den';
    const tgt = divergenceReadout(destAddr);
    const integer = tgt.ok ? tgt.integer : '1';
    const decimals = (tgt.ok ? tgt.decimals : '000000').split('');

    const boot = el('div', { class: 'boot' });
    boot.style.setProperty('--boot-fade', T.fade + 'ms');
    boot.style.setProperty('--boot-mfade', T.fadeIn + 'ms');
    const titleText = el('span', {});
    const caret = el('span', { class: 'boot-caret' });
    boot.appendChild(el('div', { class: 'boot-title' }, titleText, caret));
    const meter = el('div', { class: 'boot-meter' });
    const slot = (ch, cls) => el('div', { class: 'boot-slot' + (cls ? ' ' + cls : '') }, ch);
    meter.appendChild(slot(integer, 'int'));
    meter.appendChild(slot('.', 'dot'));
    const decSlots = [];
    for (let i = 0; i < 6; i++) { const s = slot('0', ''); decSlots.push(s); meter.appendChild(s); }
    boot.appendChild(meter);
    document.body.appendChild(boot);
    haptic(8);

    let done = false, spin = null, skipped = false, navigated = false;
    // Run the actual story load behind the veil. Guarded so it happens exactly
    // once, and ALWAYS happens (even on skip) so the UI is on the destination
    // node when the boot lifts — never a half-loaded reveal.
    const ensureNavigated = async () => {
      if (navigated) return; navigated = true;
      try { if (navigate) await navigate(); } catch (e) { /* leave as-is */ }
    };
    const finish = async () => {
      if (done) return; done = true;
      if (spin) { clearInterval(spin); spin = null; }
      await ensureNavigated();
      boot.remove();
      bootActive = false;
      resolve();
    };
    const fadeOutThenFinish = async () => {
      if (done) return;
      if (spin) { clearInterval(spin); spin = null; }
      await ensureNavigated();
      boot.classList.add('out');
      setTimeout(() => { if (!done) { done = true; boot.remove(); bootActive = false; resolve(); } }, T.fade);
    };
    // Tap to skip.
    boot.addEventListener('click', () => { skipped = true; fadeOutThenFinish(); });

    (async () => {
      await sleep(T.caret); if (skipped || done) return;
      for (const ch of name) { if (skipped || done) return; titleText.textContent += ch; await sleep(T.type); }
      await sleep(T.hold); if (skipped || done) return;

      meter.classList.add('show');
      caret.classList.add('off');
      await sleep(T.fadeIn); if (skipped || done) return;

      let locked = 0;
      spin = setInterval(() => {
        decSlots.forEach((s, i) => {
          if (i < locked) return;
          s.textContent = String(Math.floor(Math.random() * 10));
          s.classList.remove('blip'); void s.offsetWidth; s.classList.add('blip');
        });
      }, T.spinTick);

      // Load the story now — fully hidden behind the spinning meter — so the
      // node snap never shows. By the time we settle and fade out, the reader's
      // UI is already in place underneath.
      await ensureNavigated();

      await sleep(T.spin); if (skipped || done) { if (spin) { clearInterval(spin); spin = null; } return; }

      for (let i = 0; i < 6; i++) {
        if (skipped || done) { if (spin) { clearInterval(spin); spin = null; } return; }
        locked = i + 1;
        decSlots[i].textContent = decimals[i];
        decSlots[i].classList.remove('blip'); void decSlots[i].offsetWidth; decSlots[i].classList.add('blip');
        await sleep(T.settle);
      }
      if (spin) { clearInterval(spin); spin = null; }

      await sleep(T.final); if (skipped || done) return;
      fadeOutThenFinish();
    })();
  });
}

/* The forced-shift animation: the veil drops, shows where you ARE, reality
   recomputes behind it, and you surface somewhere new. Reuses the boot meter
   beats (show → churn → settle → fade) but:
     - opens with a gentle FADE-IN over the live UI (boot started already-black)
     - shows the FROM divergence first, holds
     - runs `navigate` while the veil is down (the snap is hidden)
     - churns and settles ALL 7 slots (integer included — a shift can jump
       timelines, e.g. 1.. → 2..) onto the TO divergence
     - fades out to reveal the new node
   `navigate` is an async callback invoked behind the veil. Resolves once,
   complete or skipped. Tap to skip. Timing mirrors the boot (no title type-out,
   so it's naturally a touch shorter); a shift fires rarely, so patience is fine. */
function playShiftAnimation(fromAddr, toAddr, navigate) {
  return new Promise((resolve) => {
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));
    const T = { fadeIn: 500, holdFrom: 600, spin: 900, spinTick: 60, settle: 180, holdTo: 700, fade: 600, fadeOut: 1100 };
    const from = divergenceReadout(fromAddr);
    const to = divergenceReadout(toAddr);
    const fromChars = from.ok ? [from.integer, ...from.decimals.split('')] : ['1','0','0','0','0','0','0'];
    const toChars = to.ok ? [to.integer, ...to.decimals.split('')] : ['1','0','0','0','0','0','0'];

    const boot = el('div', { class: 'boot shift' });
    boot.style.setProperty('--boot-fade', T.fade + 'ms');
    const meter = el('div', { class: 'boot-meter show' });
    const slot = (ch, cls) => el('div', { class: 'boot-slot' + (cls ? ' ' + cls : '') }, ch);
    const intSlot = slot(fromChars[0], 'int');
    meter.appendChild(intSlot);
    meter.appendChild(slot('.', 'dot'));
    const decSlots = [];
    for (let i = 0; i < 6; i++) { const s = slot(fromChars[i + 1], ''); decSlots.push(s); meter.appendChild(s); }
    const slots = [intSlot, ...decSlots]; // 7 active slots, left to right
    boot.appendChild(meter);
    document.body.appendChild(boot);
    haptic(8);

    let done = false, spin = null, skipped = false, navigated = false;
    const stopSpin = () => { if (spin) { clearInterval(spin); spin = null; } };
    // Make sure the navigation runs even if skipped, so the UI is always on the
    // destination node when the veil lifts.
    const ensureNavigated = async () => {
      if (navigated) return; navigated = true;
      try { if (navigate) await navigate(); } catch (e) { /* leave as-is */ }
    };
    const finish = async () => {
      if (done) return; done = true;
      stopSpin();
      await ensureNavigated();
      // Gentler fade-out than the fade-in — let the new node ease in slowly.
      boot.style.setProperty('--boot-fade', T.fadeOut + 'ms');
      boot.classList.add('out');
      setTimeout(() => { boot.remove(); resolve(); }, T.fadeOut);
    };
    boot.addEventListener('click', () => { skipped = true; finish(); });

    (async () => {
      // 2. fade in over the live UI
      void boot.offsetWidth;
      boot.classList.add('in');
      await sleep(T.fadeIn); if (skipped || done) return;
      // 3. hold on the from-value (screen is black now)
      await sleep(T.holdFrom); if (skipped || done) return;
      // 4. the shift happens behind the veil
      await ensureNavigated(); if (skipped || done) return;
      // 5. churn all 7 slots
      let locked = 0;
      spin = setInterval(() => {
        slots.forEach((s, i) => {
          if (i < locked) return;
          s.textContent = String(Math.floor(Math.random() * 10));
          s.classList.remove('blip'); void s.offsetWidth; s.classList.add('blip');
        });
      }, T.spinTick);
      await sleep(T.spin); if (skipped || done) { stopSpin(); return; }
      // settle left-to-right onto the to-value
      for (let i = 0; i < slots.length; i++) {
        if (skipped || done) { stopSpin(); return; }
        locked = i + 1;
        slots[i].textContent = toChars[i];
        slots[i].classList.remove('blip'); void slots[i].offsetWidth; slots[i].classList.add('blip');
        await sleep(T.settle);
      }
      stopSpin();
      // 6. hold on the new value, then 7. fade out
      await sleep(T.holdTo); if (skipped || done) return;
      finish();
    })();
  });
}

/* ----- Visited-thread tracker ("wound string") -----
   A record of the path the reader actually walked, held in state.trail. ONE
   rule is the whole behavior: when you move to a node already on the thread,
   the thread reels back so that node becomes the tip (truncate); otherwise the
   node is paid out onto the end (append).
     - forward onto a new node          → append
     - step back onto the node behind you → it's on the thread → truncate to it
                                            (the node you left pops off)
     - jump back several / revisit        → same truncate, no special case
   trailRecord itself is pure (no I/O). Persistence lives in navigateTo, which
   writes state.trail to the story's meta under 'trail'; setStory restores it.
   Not yet consulted by glossaryResolve — it's the visible half of the eventual
   journey-aware model. */
function trailRecord(addr) {
  if (!state.settings.trackerOn) return;  // experimental & off → don't record
  if (!addr) return;
  const t = state.trail;
  const i = t.indexOf(addr);
  if (i >= 0) t.length = i + 1;  // reel in: addr becomes the tip
  else t.push(addr);             // pay out: new node onto the end
}

// Opens the Memory Tracker sheet (reached from the menu row under Tree view).
// Top controls: Turn off (flips trackerOn and closes) and Clear history (wipes
// the thread back to the current node). Below them, state.trail as a VERTICAL
// thread of tree-view node boxes — current at the TOP, oldest at the bottom,
// arrows climbing up — matching the tree's "continuations go up" flow. Taps
// jump like the tree. render() rebuilds in place so Clear can refresh it.
function openTrailSheet() {
  const body = el('div', { class: 'trail-sheet' });
  openSheet('Memory Tracker', body);

  const render = async () => {
    body.innerHTML = '';

    // ── Controls: turning off and clearing both live here, not in the menu ──
    const controls = el('div', { class: 'trail-controls' });
    controls.appendChild(el('button', { class: 'btn ghost', onclick: async () => {
      await saveSetting('trackerOn', false);  // freezes the thread (not cleared)
      toast('Memory tracker off');
      closeSheet();
    } }, 'Turn off'));
    controls.appendChild(el('button', { class: 'btn ghost', onclick: async () => {
      const ok = await showPopup('Clear memory?',
        'Forget the recorded path. You stay where you are — the trail leading back to here is wiped.',
        { confirm: true, danger: true, okLabel: 'Clear' });
      if (!ok) return;
      // Reseed at the current node rather than fully emptying, so the thread
      // still starts where you are (mirrors enable-seeding). Same persist path.
      state.trail = state.currentAddr ? [state.currentAddr] : [];
      if (state.db) state.db.meta.put({ key: 'trail', value: state.trail.slice() }).catch(() => {});
      toast('Memory cleared');
      render();
    } }, 'Clear history'));
    body.appendChild(controls);

    // ── Thread ──
    const trail = state.trail.slice();
    if (!trail.length) {
      body.appendChild(el('div', { class: 'trail-empty' }, 'No steps recorded yet.'));
      return;
    }

    // emptied/text from the trail nodes themselves; rating from each node's
    // rating-ancestor (ratings live on the branch root and are inherited).
    let nodeRecs = [], raMap = {};
    try {
      nodeRecs = await state.db.nodes.bulkGet(trail);
      const raAddrs = [...new Set(trail.map(a => ratingAncestor(a)))];
      const raRecs = await state.db.nodes.bulkGet(raAddrs);
      raAddrs.forEach((a, idx) => { raMap[a] = (raRecs[idx] && raRecs[idx].rating) || 'L'; });
    } catch (e) {}
    const recByAddr = {};
    trail.forEach((a, idx) => { recByAddr[a] = nodeRecs[idx] || null; });

    const NODE_W = 70, NODE_H = 40, GAP = 30, PAD = 8;
    const n = trail.length;
    const SVG_NS = 'http://www.w3.org/2000/svg';
    const mk = (tag, attrs) => {
      const e = document.createElementNS(SVG_NS, tag);
      for (const k in attrs) e.setAttribute(k, attrs[k]);
      return e;
    };
    const ratingColors = { L: 'var(--rate-l)', M: 'var(--rate-m)', H: 'var(--rate-h)' };
    // index 0 = oldest, sits at the BOTTOM; last index = current tip, at the TOP.
    const yAt = (k) => (n - 1 - k) * (NODE_H + GAP);
    const totalH = n * NODE_H + Math.max(0, n - 1) * GAP;

    const svg = mk('svg', {
      class: 'trail-svg',
      width: NODE_W + PAD * 2, height: totalH + PAD * 2,
      viewBox: `${-PAD} ${-PAD} ${NODE_W + PAD * 2} ${totalH + PAD * 2}`
    });

    // arrow marker — unique id so it can't clash with the tree view's #arrow
    const defs = mk('defs', {});
    const marker = mk('marker', {
      id: 'trail-arrow', viewBox: '0 0 10 10', refX: '8', refY: '5',
      markerWidth: '6', markerHeight: '6', orient: 'auto-start-reverse'
    });
    marker.appendChild(mk('path', { d: 'M 0 0 L 10 5 L 0 10 z', fill: 'var(--ink-soft)' }));
    defs.appendChild(marker);
    svg.appendChild(defs);

    // connectors first, so boxes sit on top. Vertical, climbing up: from the
    // top edge of the older (lower) box to the bottom edge of the newer (upper)
    // one — same shape as the tree's continuation edge, arrow pointing up.
    const edges = mk('g', {});
    for (let k = 0; k < n - 1; k++) {
      const x = NODE_W / 2;
      const yLowTop = yAt(k);                // top of older box (below)
      const yHighBot = yAt(k + 1) + NODE_H;  // bottom of newer box (above)
      edges.appendChild(mk('path', {
        class: 'tree-edge', d: `M ${x} ${yLowTop} L ${x} ${yHighBot}`, 'marker-end': 'url(#trail-arrow)'
      }));
    }
    svg.appendChild(edges);

    const boxes = mk('g', {});
    trail.forEach((addr, k) => {
      const rec = recByAddr[addr];
      const isCurrent = addr === state.currentAddr;
      const isEmptied = !!(rec && rec.emptied);
      const hasText = !!(rec && rec.text && rec.text.trim()) && !isEmptied;

      const g = mk('g', {
        class: 'tree-node',
        transform: `translate(0, ${yAt(k)})`,
        style: 'cursor: pointer;' + (isEmptied ? ' opacity: 0.38;' : '')
      });

      const rect = mk('rect', { x: 0, y: 0, width: NODE_W, height: NODE_H, rx: 0 });
      if (isCurrent) { rect.setAttribute('stroke', 'var(--fox)'); rect.setAttribute('stroke-width', '2'); }
      if (hasText)   rect.setAttribute('fill', 'var(--bg-elev)');
      if (isEmptied) { rect.setAttribute('stroke-dasharray', '4 3'); rect.setAttribute('fill', 'var(--bg-card)'); }
      g.appendChild(rect);

      if (!isEmptied) {
        g.appendChild(mk('circle', {
          cx: NODE_W - 8, cy: 8, r: 3,
          fill: ratingColors[raMap[ratingAncestor(addr)]] || 'var(--ink-dim)'
        }));
      }

      const txt = mk('text', {
        x: NODE_W / 2, y: NODE_H / 2 + 1,
        'text-anchor': 'middle', 'dominant-baseline': 'middle',
        class: 'addr' + (isCurrent ? ' curr' : '')
      });
      txt.textContent = addr.length > 7 ? addr.slice(0, 6) + '…' : addr;
      g.appendChild(txt);

      // Tapping a box jumps there, exactly like the tree view. The jump runs
      // through navigateTo → trailRecord, so tapping an earlier box reels the
      // thread back to it on its own; no special handling needed here.
      g.addEventListener('click', () => { closeSheet(); navigateTo(addr, true); });
      boxes.appendChild(g);
    });
    svg.appendChild(boxes);

    body.appendChild(el('div', { class: 'trail-hint' }, 'Most recent at top · tap a node to jump'));
    body.appendChild(svg);
  };

  render();
}

/* ----- Inspire: a personal prompt deck (like Oblique Strategies, but yours).
   The deck lives in global settings (registry.settings → 'inspirePool'), so it's
   shared across every story and is deliberately NOT bundled into .cyoa exports —
   prompts are a workspace tool, not story data. Draw N distinct prompts and they
   fade in one after another. Editing the deck is just a textarea, one prompt per
   line — that single surface is both "add" and "delete". A .txt import (one line
   per prompt) appends, de-duplicated. No per-card storage, no export plumbing;
   kept intentionally light. ----- */

let lastInspireDraw = [];   // most recent Inspire draw, kept in memory so it
                            // survives closing/reopening the sheet (not a reload).

function getInspirePool() {
  return Array.isArray(state.settings.inspirePool) ? state.settings.inspirePool : [];
}

function openInspireSheet() {
  const body = el('div', { class: 'inspire' });

  let count = state.settings.inspireCount || 3;
  const clampMax = () => Math.max(1, getInspirePool().length);
  count = Math.max(1, Math.min(count, clampMax()));

  const nView = el('span', { class: 'n' }, String(count));
  const dec = el('button', { 'aria-label': 'Fewer cards', onclick: () => setCount(count - 1) }, '\u2212');
  const inc = el('button', { 'aria-label': 'More cards', onclick: () => setCount(count + 1) }, '+');
  const go  = el('button', { class: 'btn primary inspire-go', onclick: () => draw() }, 'Inspire');
  const bar = el('div', { class: 'inspire-bar' },
    el('div', { class: 'inspire-stepper' }, dec, nView, inc),
    go
  );

  const deckCount = el('span', {}, '');
  const deckInfo = el('div', { class: 'inspire-deckinfo' },
    deckCount,
    el('div', { class: 'acts' },
      el('button', { onclick: () => editPool() }, 'Edit deck'),
      el('button', { onclick: () => importTxt() }, 'Import .txt')
    )
  );

  const cards = el('div', { class: 'inspire-cards' });

  body.appendChild(bar);
  body.appendChild(deckInfo);
  body.appendChild(cards);

  refreshDeck();
  renderCards(lastInspireDraw, false);  // restore the last draw, if there is one
  openSheet('Inspire', body);

  function renderCards(list, animate) {
    cards.innerHTML = '';
    if (!list || !list.length) {
      cards.appendChild(el('div', { class: 'inspire-empty' }, 'Pick a number, then tap Inspire to draw.'));
      return;
    }
    list.forEach((text, i) => {
      cards.appendChild(el('div', {
        class: 'inspire-card',
        // Fresh draws fade in staggered; a restored draw is already "yours", so
        // it just appears.
        style: animate ? `animation-delay: ${i * 70}ms` : 'animation: none; opacity: 1;'
      }, text));
    });
  }

  function refreshDeck() {
    const n = getInspirePool().length;
    deckCount.textContent = n
      ? `${n} prompt${n === 1 ? '' : 's'} in your deck`
      : 'Your deck is empty';
    count = Math.max(1, Math.min(count, clampMax()));
    nView.textContent = String(count);
  }

  function setCount(n) {
    count = Math.max(1, Math.min(n, clampMax()));
    nView.textContent = String(count);
    saveSetting('inspireCount', count);
  }

  function draw() {
    const pool = getInspirePool();
    if (!pool.length) { toast('Your deck is empty — add a few prompts first'); return editPool(); }
    // Fisher–Yates on a copy, then take the first `count` for a distinct sample.
    const picks = pool.slice();
    for (let i = picks.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [picks[i], picks[j]] = [picks[j], picks[i]];
    }
    const picked = picks.slice(0, Math.min(count, picks.length));
    lastInspireDraw = picked;
    renderCards(picked, true);
    haptic(12);
  }

  async function editPool() {
    const ta = el('textarea', { class: 'inspire-edit-ta', spellcheck: 'false' });
    ta.value = getInspirePool().join('\n');
    const ok = await showPopup('Edit your deck',
      el('div', {},
        el('div', { class: 'row-sub', style: 'margin-bottom: 8px; color: var(--ink-soft);' },
          'One prompt per line. This is also how you delete — just remove a line.'),
        ta
      ),
      { confirm: true, okLabel: 'Save', cancelLabel: 'Cancel' }
    );
    if (!ok) return;
    const arr = ta.value.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
    await saveSetting('inspirePool', arr);
    refreshDeck();
    toast(arr.length ? `Saved · ${arr.length} prompt${arr.length === 1 ? '' : 's'}` : 'Deck cleared');
  }

  function importTxt() {
    const input = el('input', { type: 'file', accept: '.txt,text/plain' });
    input.style.display = 'none';
    input.addEventListener('change', () => {
      const f = input.files && input.files[0];
      input.remove();
      if (!f) return;
      const r = new FileReader();
      r.onload = () => {
        const lines = String(r.result || '').split(/\r?\n/).map(s => s.trim()).filter(Boolean);
        if (!lines.length) { toast('No usable lines in that file'); return; }
        // Append, de-duplicating against what's already in the deck.
        const have = new Set(getInspirePool());
        const added = [];
        for (const l of lines) if (!have.has(l)) { have.add(l); added.push(l); }
        if (!added.length) { toast('Nothing new to add'); return; }
        saveSetting('inspirePool', getInspirePool().concat(added));
        refreshDeck();
        toast(`Added ${added.length} prompt${added.length === 1 ? '' : 's'}`);
      };
      r.onerror = () => toast('Could not read that file');
      r.readAsText(f);
    });
    document.body.appendChild(input);
    input.click();
  }
}

async function openTimelinePicker(showAll = false) {
  const allTimelines = await topLevelTimelines();
  const allowed = [];
  for (const t of allTimelines) {
    const r = await getRating(t);
    if (ratingAllowed(r)) allowed.push(t);
  }

  const body = el('div', { class: 'list' });

  if (allowed.length === 0) {
    body.appendChild(el('div', { class: 'empty-state' }, 'No timelines yet.'));
    openSheet('Choose a timeline · 0', body);
    return;
  }

  const visible = showAll ? allowed.slice() : shuffledPick(allowed, 3);
  if (showAll) visible.sort((a, b) => parseInt(a) - parseInt(b));

  let i = 1;
  for (const t of visible) {
    const node = await getNode(t);
    const rating = await getRating(t);
    const author = node ? node.author : '';
    const previewText = state.settings.spoilerMode
      ? (node && node.subtitle ? node.subtitle :
          (node ? plainText(node.text).slice(0, 80) + (plainText(node.text).length > 80 ? '…' : '') : ''))
      : (node ? plainText(node.text) : '(empty)');

    const tlRow = el('button', {
      class: 'list-row',
      onclick: () => { closeSheet(); navigateTo(t, true); }
    },
      el('div', { class: 'choice-num', style: 'border: none; padding-right: 8px;' }, String(i).padStart(2, '0')),
      el('div', { class: 'row-main' },
        el('div', {
          style: 'display: flex; gap: 8px; align-items: center; margin-bottom: 4px;'
        },
          el('span', { class: 'choice-rating ' + rating }, rating),
          el('span', { class: 'addr-pill' }, t),
          author && el('span', { class: 'row-sub' }, '· ' + author)
        ),
        el('div', { class: 'choice-preview' }, previewText)
      )
    );
    body.appendChild(tlRow);
    i++;
  }

  // Footer with shuffle + show-all toggle when there's more than 3 timelines.
  // Buttons close + reopen the sheet rather than mutating in place so that
  // back-button history handling stays consistent (each open = one entry).
  if (allowed.length > 3) {
    const actions = el('div', {
      style: 'display: flex; gap: 8px; padding: 12px var(--pad); border-top: 1px solid var(--line-soft); margin-top: 8px;'
    });
    if (!showAll) {
      actions.appendChild(el('button', {
        class: 'btn',
        style: 'flex: 1;',
        onclick: () => { closeSheet(); openTimelinePicker(false); }
      }, 'Shuffle'));
    }
    actions.appendChild(el('button', {
      class: 'btn',
      style: 'flex: 1;',
      onclick: () => { closeSheet(); openTimelinePicker(!showAll); }
    }, showAll ? 'Show random 3' : 'Show all'));
    body.appendChild(actions);
  }

  openSheet(showAll ? `Choose a timeline · ${allowed.length}` : 'Choose a timeline', body);
}

function openSearchSheet() {
  const input = el('input', {
    class: 'popup-input',
    type: 'text',
    placeholder: 'search…'
  });
  const helper = el('div', {
    style: 'padding: 8px var(--pad) 0; font-family: var(--sans); font-size: 10px; letter-spacing: 0.6px; color: var(--ink-dim); text-transform: uppercase;'
  }, 'Try: keyword · author:name · address:1C2B');
  const results = el('div', { class: 'list' });
  const meta = el('div', { class: 'empty-state', style: 'padding: 14px; font-style: normal;' }, 'Type to search.');

  async function runSearch() {
    const q = input.value.trim();
    results.innerHTML = '';
    meta.textContent = '';

    if (!q) {
      meta.textContent = 'Type to search.';
      return;
    }

    let mode = 'all', term = q;
    if (q.startsWith('keyword:')) { mode = 'keyword'; term = q.slice(8).trim(); }
    else if (q.startsWith('author:')) { mode = 'author'; term = q.slice(7).trim(); }
    else if (q.startsWith('address:')) { mode = 'address'; term = q.slice(8).trim().toUpperCase(); }

    const all = await state.db.nodes.toArray();
    const matched = all.filter(n => {
      if (mode === 'keyword') return n.text && n.text.toLowerCase().includes(term.toLowerCase());
      if (mode === 'author')  return n.author && n.author.toLowerCase().includes(term.toLowerCase());
      if (mode === 'address') return n.address.includes(term);
      // all
      return (n.text && n.text.toLowerCase().includes(term.toLowerCase())) ||
             (n.author && n.author.toLowerCase().includes(term.toLowerCase())) ||
             n.address.includes(term.toUpperCase());
    });

    if (matched.length === 0) {
      meta.textContent = 'No matches.';
      return;
    }
    meta.textContent = matched.length + ' match' + (matched.length === 1 ? '' : 'es');

    for (const n of matched.slice(0, 50)) {
      const rating = await getRating(n.address);
      const row = el('button', {
        class: 'list-row',
        onclick: () => { closeSheet(); navigateTo(n.address, true); }
      },
        el('div', { class: 'row-main' },
          el('div', {
            style: 'display: flex; gap: 8px; align-items: center; margin-bottom: 4px;'
          },
            el('span', { class: 'choice-rating ' + rating }, rating),
            el('span', { class: 'addr-pill' }, n.address),
            n.author && el('span', { class: 'row-sub' }, '· ' + n.author)
          ),
          el('div', { class: 'choice-preview' }, plainText(n.text || '').slice(0, 200))
        )
      );
      results.appendChild(row);
    }
  }

  input.addEventListener('input', runSearch);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });

  const body = el('div', {},
    el('div', { style: 'padding: var(--pad) var(--pad) 0;' }, input),
    helper,
    meta,
    results
  );

  openSheet('Search', body);
  setTimeout(() => input.focus(), 200);
}

async function openGlossaryEntry(key, displayTitle) {
  const origin = await glossaryResolve(key, state.currentAddr);

  const body = el('div', { class: 'gloss-entry' });

  if (!origin) {
    const elsewhere = await glossaryExistsAnywhere(key);
    body.appendChild(el('div', { class: 'g-title' }, displayTitle || key));
    body.appendChild(el('div', { class: 'g-meta' },
      el('span', {}, 'No entry yet'),
      el('span', { class: 'stamp' }, 'key: ' + key)
    ));
    if (elsewhere) {
      body.appendChild(el('div', { class: 'g-empty' },
        'This key has entries elsewhere in the story but none are visible from your current position. That can be intentional (a forward reference, or an entry on a different branch).'
      ));
    } else {
      body.appendChild(el('div', { class: 'g-empty' },
        'This reference has no entry written for it yet.'
      ));
    }
    body.appendChild(el('div', { class: 'g-actions' },
      el('button', {
        class: 'btn primary',
        onclick: () => openGlossaryEditor(key, null)
      }, 'Create entry')
    ));
    openSheet('Glossary', body);
    return;
  }

  const entry = await glossaryGet(key, origin);
  // Title = the bracket's display text from THIS node (e.g. "the sister" vs
  // "Sister Margaret"), so each reference shows the name that led to it. Falls
  // back to the stored title, then the key. entry.title defaults to the key in
  // glossarySave, so it must come AFTER displayTitle or the key always wins.
  body.appendChild(el('div', { class: 'g-title' }, displayTitle || entry.title || key));
  body.appendChild(el('div', { class: 'g-meta' },
    el('span', { class: 'stamp' }, 'key: ' + key),
    el('span', {}, 'stamped at ' + origin),
    entry.author && el('span', {}, 'by ' + entry.author)
  ));
  const textDiv = el('div', { class: 'g-text' });
  renderRich(textDiv, entry.text || '');
  body.appendChild(textDiv);

  body.appendChild(el('div', { class: 'g-actions' },
    el('button', {
      class: 'btn',
      onclick: () => openGlossaryEditor(key, origin)
    }, 'Edit')
  ));

  openSheet('Glossary', body);
}

async function openGlossaryEditor(key, existingOrigin) {
  // existingOrigin: null = new entry; otherwise we may want to fork or in-place edit.
  let initialTitle = key;
  let initialText = '';

  if (existingOrigin) {
    const entry = await glossaryGet(key, existingOrigin);
    initialTitle = entry.title || key;
    initialText = entry.text || '';

    if (existingOrigin !== state.currentAddr) {
      const choice = await showPopup(
        'Existing entry',
        `An entry for "${key}" exists at ${existingOrigin}. Copy its content as a starting point for a new version stamped at ${state.currentAddr}?`,
        { confirm: true, okLabel: 'Copy & edit', cancelLabel: 'Empty' }
      );
      if (choice === null) return;
      if (choice === false) initialText = '';
    }
  }

  closeSheet();

  const titleInput = el('input', {
    class: 'popup-input',
    type: 'text',
    placeholder: 'Display title',
    value: initialTitle,
    style: 'margin: 0;'
  });
  titleInput.value = initialTitle;

  const editor = el('textarea', {
    class: 'editor',
    placeholder: 'Describe ' + key + '…'
  });
  editor.value = initialText;

  const overlay = el('div', { class: 'overlay-content', style: 'display: flex; flex-direction: column; height: 100%;' });
  overlay.appendChild(el('div', { class: 'writer-head' },
    el('div', { class: 'writer-title' }, existingOrigin === state.currentAddr ? 'Edit entry · ' + key : 'New entry · ' + key),
    el('div', { class: 'writer-actions' },
      el('button', { class: 'btn ghost', onclick: () => closeOverlay() }, 'Cancel'),
      el('button', {
        class: 'btn primary',
        onclick: async () => {
          const t = (titleInput.value || '').trim();
          if (t.includes('|') || t.includes('\n')) {
            toast('Title cannot contain pipes or newlines');
            return;
          }
          await glossarySave(key, state.currentAddr, t || key, editor.value);
          haptic(15);
          closeOverlay();
          toast('Entry saved');
          openGlossaryEntry(key);
        }
      }, 'Save')
    )
  ));
  overlay.appendChild(el('div', { class: 'writer-meta' },
    el('strong', {}, 'Stamped at: '),
    el('span', {}, state.currentAddr),
    el('span', { style: 'color: var(--ink-dim); margin-left: auto;' },
      'as ' + state.story.authorName)
  ));
  overlay.appendChild(el('div', { class: 'subtitle-row', style: 'border-top: none;' },
    el('label', {}, 'Display title (what readers see)'),
    titleInput
  ));
  overlay.appendChild(el('div', { class: 'editor-wrap' },
    editor,
    makeMarkdownToolbar(editor)
  ));
  openOverlay(overlay);
  setTimeout(() => editor.focus(), 250);
}

/* Accessibility sub-sheet: text scale + reading column width.
   Both manual. Text scale: 5% steps, 70-200%. Reading width: 50px steps,
   400-1400px, plus a "Full width" option (stored as 0). */
async function openAccessibilitySheet() {
  closeSheet();

  function stepperRow(label, settingKey, opts) {
    const { min, max, step, suffix, fallback, format, special } = opts;
    const wrap = el('div', {
      style: 'padding: 14px var(--pad); border-bottom: 1px solid var(--line-soft);'
    });
    wrap.appendChild(el('div', {
      style: 'font-family: var(--sans); font-size: 12px; letter-spacing: 0.6px; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 10px;'
    }, label));

    const controls = el('div', { style: 'display: flex; align-items: center; gap: 10px;' });

    const labelFor = (v) => (special && v === special.value) ? special.label : format(v);

    const valueLabel = el('button', {
      class: 'btn ghost',
      style: 'flex: 1; font-family: var(--mono); font-size: 16px; text-align: center;',
      title: 'Tap to reset',
      onclick: async () => {
        if ((state.settings[settingKey] ?? fallback) === fallback) return;
        await saveSetting(settingKey, fallback);
        applyScales();
        valueLabel.textContent = labelFor(fallback);
        haptic(8);
      }
    }, labelFor(state.settings[settingKey] ?? fallback));

    const stepBy = async (delta) => {
      const cur = state.settings[settingKey] ?? fallback;
      let next = cur + delta;
      // If special value exists (e.g. 0 for full width), step from min ↔ special
      if (special && cur === special.value && delta < 0) next = max;
      else if (special && cur === max && delta > 0) next = special.value;      else next = Math.min(max, Math.max(min, next));
      if (next === cur) return;
      await saveSetting(settingKey, next);
      applyScales();
      valueLabel.textContent = labelFor(next);
      haptic(5);
    };

    controls.appendChild(el('button', {
      class: 'btn ghost',
      style: 'min-width: 48px; font-size: 18px; font-weight: bold;',
      onclick: () => stepBy(-step)
    }, '−'));
    controls.appendChild(valueLabel);
    controls.appendChild(el('button', {
      class: 'btn ghost',
      style: 'min-width: 48px; font-size: 18px; font-weight: bold;',
      onclick: () => stepBy(step)
    }, '+'));

    wrap.appendChild(controls);
    return wrap;
  }

  const body = el('div', { class: 'list' });

  body.appendChild(el('div', {
    style: 'padding: var(--pad); color: var(--ink-soft); font-size: 13px; line-height: 1.5; border-bottom: 1px solid var(--line-soft);'
  }, 'Tap the value to reset. Changes apply live.'));

  body.appendChild(stepperRow('Reading text', 'textScale', {
    min: 70, max: 200, step: 5, fallback: 100,
    format: (v) => v + '%'
  }));

  body.appendChild(stepperRow('UI / chrome', 'uiScale', {
    min: 70, max: 200, step: 5, fallback: 100,
    format: (v) => v + '%'
  }));

  body.appendChild(stepperRow('Reading width', 'readWidth', {
    min: 400, max: 1400, step: 50, fallback: 0,
    format: (v) => v + 'px',
    special: { value: 0, label: 'Full width' }
  }));

  openSheet('Accessibility', body, null, { compact: true });
}

/* PC scale setup — shown once during onboarding on PC-sized screens.
   A popup containing a live mock of the reader UI plus the three scale
   controls. The mock uses the actual app CSS classes so scale changes
   apply to it instantly. Resolves when the user clicks "Looks good". */
function showPCScaleSetup() {
  return new Promise((resolve) => {
    const body = el('div', {});

    body.appendChild(el('div', {
      style: 'color: var(--ink-soft); font-size: calc(14px * var(--text-scale)); line-height: 1.6; margin-bottom: 16px;'
    }, 'Looks like you\'re on a larger screen. Default sizes are tuned for mobile, so things may feel small. Adjust below — the text and buttons in this popup scale live with the sliders, so you can preview the effect directly. You can always come back via Menu → Accessibility.'));

    // Live preview that mirrors the actual screen at scale.
    // The outer box represents the viewport (proportionally sized);
    // the inner highlighted strip represents the reading column at the
    // chosen width. As the user adjusts readWidth, the inner strip resizes.
    const PREVIEW_W = 320;       // popup-friendly width in px
    const screenW = window.innerWidth;
    const screenH = window.innerHeight;
    const previewH = Math.round(PREVIEW_W * (screenH / screenW));
    const pxPerPreviewPx = screenW / PREVIEW_W;

    const previewBox = el('div', {
      style: `position: relative; width: ${PREVIEW_W}px; height: ${previewH}px; max-height: 200px; margin: 0 auto 8px; background: var(--bg-card); border: 1px solid var(--line); overflow: hidden;`
    });

    // Inner column representing the reading area, sized proportionally
    // to the chosen readWidth vs. actual screen width.
    const innerCol = el('div', {
      style: 'position: absolute; top: 0; bottom: 0; left: 50%; transform: translateX(-50%); background: var(--bg-elev); border-left: 1px dashed var(--fox-soft); border-right: 1px dashed var(--fox-soft);'
    });
    previewBox.appendChild(innerCol);

    // Caption beneath preview
    const caption = el('div', {
      style: 'text-align: center; font-family: var(--mono); font-size: 11px; color: var(--ink-dim); margin-bottom: 16px;'
    }, '');

    function updatePreview() {
      const w = state.settings.readWidth || 0;
      if (w === 0) {
        innerCol.style.width = '100%';
        caption.textContent = `Full screen width (${screenW}px)`;
      } else {
        // Clamp visual width so it never exceeds the preview box
        const visualW = Math.min(PREVIEW_W, w / pxPerPreviewPx);
        innerCol.style.width = visualW + 'px';
        caption.textContent = `${w}px column on ${screenW}px screen`;
      }
    }
    updatePreview();

    body.appendChild(previewBox);
    body.appendChild(caption);

    // Reuse the stepper pattern from Accessibility sheet.
    // Stepper UI scales with --ui-scale so the user gets a live preview
    // of UI scale changes in this popup itself.
    function stepperRow(label, settingKey, opts) {
      const { min, max, step, fallback, format, special } = opts;
      const wrap = el('div', {
        style: 'padding: calc(10px * var(--ui-scale)) 0; border-top: 1px solid var(--line-soft); display: flex; align-items: center; gap: calc(10px * var(--ui-scale));'
      });
      wrap.appendChild(el('div', {
        style: 'font-family: var(--sans); font-size: calc(11px * var(--ui-scale)); letter-spacing: 0.6px; text-transform: uppercase; color: var(--ink-soft); flex: 1;'
      }, label));

      const labelFor = (v) => (special && v === special.value) ? special.label : format(v);
      const valueLabel = el('button', {
        class: 'btn ghost',
        style: 'min-width: calc(90px * var(--ui-scale)); font-family: var(--mono); font-size: calc(13px * var(--ui-scale)); text-align: center; padding: calc(6px * var(--ui-scale));',
        title: 'Tap to reset',
        onclick: async () => {
          if ((state.settings[settingKey] ?? fallback) === fallback) return;
          await saveSetting(settingKey, fallback);
          applyScales();
          updatePreview();
          valueLabel.textContent = labelFor(fallback);
        }
      }, labelFor(state.settings[settingKey] ?? fallback));

      const stepBy = async (delta) => {
        const cur = state.settings[settingKey] ?? fallback;
        let next = cur + delta;
        if (special && cur === special.value && delta < 0) next = max;
        else if (special && cur === max && delta > 0) next = special.value;
        else next = Math.min(max, Math.max(min, next));
        if (next === cur) return;
        await saveSetting(settingKey, next);
        applyScales();
        updatePreview();
        valueLabel.textContent = labelFor(next);
      };

      wrap.appendChild(el('button', {
        class: 'btn ghost',
        style: 'min-width: calc(40px * var(--ui-scale)); font-size: calc(16px * var(--ui-scale)); font-weight: bold; padding: calc(6px * var(--ui-scale));',
        onclick: () => stepBy(-step)
      }, '−'));
      wrap.appendChild(valueLabel);
      wrap.appendChild(el('button', {
        class: 'btn ghost',
        style: 'min-width: calc(40px * var(--ui-scale)); font-size: calc(16px * var(--ui-scale)); font-weight: bold; padding: calc(6px * var(--ui-scale));',
        onclick: () => stepBy(step)
      }, '+'));
      return wrap;
    }

    body.appendChild(stepperRow('Text', 'textScale', {
      min: 70, max: 200, step: 5, fallback: 100, format: (v) => v + '%'
    }));
    body.appendChild(stepperRow('UI', 'uiScale', {
      min: 70, max: 200, step: 5, fallback: 100, format: (v) => v + '%'
    }));
    body.appendChild(stepperRow('Width', 'readWidth', {
      min: 400, max: 1400, step: 50, fallback: 0, format: (v) => v + 'px',
      special: { value: 0, label: 'Full width' }
    }));

    // Action button — also scales with UI so the preview is honest
    const actions = el('div', { style: 'display: flex; margin-top: calc(16px * var(--ui-scale));' },
      el('button', {
        class: 'btn primary',
        style: 'flex: 1; font-size: calc(14px * var(--ui-scale)); padding: calc(10px * var(--ui-scale));',
        onclick: () => { resolvePopup(true); resolve(); }
      }, 'Looks good')
    );
    body.appendChild(actions);

    showPopup('Welcome — set up your view', body, { noActions: true });
  });
}

    { id: 'fox-dark', name: 'Fox dark', desc: 'Cool charcoal with vivid orange (default)' },
    { id: 'warm',     name: 'Warm dark', desc: 'Sepia-tinted dark, gentler on the eyes' },

function toggleRow(label, isOn, onChange) {
  const tog = el('div', { class: 'toggle ' + (isOn ? 'on' : '') });
  const row = el('div', {
    class: 'settings-row tappable',
    onclick: async () => {
      const newVal = !tog.classList.contains('on');
      tog.classList.toggle('on', newVal);
      await onChange(newVal);
      haptic(8);
    }
  },
    el('div', { class: 'label', style: 'flex: 1;' }, label),
    tog
  );
  return row;
}

/* ----- Author sheet ----- */

async function openAuthorSheet() {
  const escName = state.story.authorName;
  const myCount = await state.db.nodes.where('author').equals(escName).count();

  const body = el('div', {},
    el('div', { class: 'gloss-entry' },
      el('div', { class: 'g-title' }, state.story.authorName),
      el('div', { class: 'g-meta' },
        el('span', {}, myCount + ' node' + (myCount === 1 ? '' : 's') + ' written here'),
        el('span', { class: 'stamp' }, 'in ' + state.story.title)
      ),
      el('div', { class: 'g-actions', style: 'flex-direction: column; gap: 8px;' },
        el('button', {
          class: 'btn',
          style: 'width: 100%;',
          onclick: async () => {
            const newName = await showPopup('Change author name',
              'All nodes you have written in this story will be renamed.',
              { input: state.story.authorName });
            if (!newName || newName.trim() === state.story.authorName) return;
            if (newName.includes('|') || newName.includes('\n')) {
              toast('Pipes and newlines not allowed'); return;
            }
            // Check if taken
            const taken = await state.db.nodes.where('author').equals(newName.trim()).count();
            if (taken > 0 && newName.trim() !== state.story.authorName) {
              const claim = await showPopup('Name in use',
                `"${newName.trim()}" already has ${taken} nodes in this story. Is this you?`,
                { confirm: true, okLabel: 'Yes, claim it', cancelLabel: 'Pick another' });
              if (!claim) return;
            }
            // Update all nodes' author
            const all = await state.db.nodes.where('author').equals(state.story.authorName).toArray();
            for (const n of all) {
              n.author = newName.trim();
              await state.db.nodes.put(n);
            }
            state.story.authorName = newName.trim();
            await saveStoryMeta();
            toast('Renamed to ' + newName.trim());
            closeSheet();
            openAuthorSheet();
          }
        }, 'Rename'),
        el('button', {
          class: 'btn',
          style: 'width: 100%;',
          onclick: async () => {
            const cname = await showPopup('Check name', 'Is this name available?', { input: '' });
            if (!cname) return;
            const c = await state.db.nodes.where('author').equals(cname.trim()).count();
            toast(c > 0 ? `Taken (${c} nodes)` : 'Available');
          }
        }, 'Check name availability')
      )
    )
  );
  openSheet('Author', body);
}

/* ----- Help / Controls ----- */

function openHelpSheet() {
  const body = el('div', {});

  function section(title) {
    body.appendChild(el('div', { class: 'help-section' }, title));
  }
  function row(cmd, desc) {
    body.appendChild(el('div', { class: 'help-row' },
      el('div', { class: 'help-cmd' }, cmd),
      el('div', { class: 'help-desc' }, desc)
    ));
  }
  function prose(text) {
    body.appendChild(el('div', {
      style: 'padding: 10px var(--pad) 14px; font-size: 13px; color: var(--ink-soft); line-height: 1.6; border-bottom: 1px solid var(--line-soft);'
    }, text));
  }

  section('Addresses');
  prose('Every node has a permanent address like 1A, 1B, 1C2A, 1C2B1F. The number-letter pairs are segments. 1A is a top-level timeline root. 1C2A means: the 2nd branch off node 1C, first node of that branch. Addresses never change or get renumbered — deleting a node leaves a gap. The current address is always shown top-right in the header.');

  section('Reading & Navigation');
  row('Tap a numbered choice', 'Navigate to that node. Up to 3 choices are shown at a time, randomly sampled from the full pool.');
  row('Back button (tap)', 'Walk backward through the current segment (1C → 1B → 1A), skipping emptied nodes. At a fork it jumps to the parent. At a top-level root it opens the timeline picker.');
  row('Back button (hold)', 'Long-press to step back to the raw previous address even if it is emptied — useful for authors editing empty nodes.');
  row('Forward button (tap)', 'Move forward through the current segment, skipping emptied nodes. Also retraces your exact path if you have been pressing Back (it remembers where you came from until you pick a different choice).');
  row('Forward button (hold)', 'Long-press to step forward to the raw next address even if it is emptied.');
  row('Shuffle button', 'Draw 3 fresh choices at random from the full pool. The pool itself does not change, just which 3 are shown.');
  row('Timeline picker', 'Pressing Back at a top-level node (1A, 2A...) opens a picker showing all timelines, with its own shuffle and show-all. Lets you hop between separate story strands.');
  row('Stories (home icon, top-left)', 'Return to the story picker to switch between stories.');
  row('Tap the address pill', 'Opens a small popup showing the full current address with a copy button.');
  row('See all options (menu)', 'Show every option from this node in full, sorted by address, no shuffle.');

  section('Writing');
  prose('You need an author name before writing. If you have not set one, you will be prompted the first time you tap Write. Names are per-story and per-honor-system — no passwords.');
  row('Write next', 'Open the editor for the next step in the current segment (e.g. if you are at 1C, writes 1D). Automatically links the new node as a forward continuation.');
  row('Write here', 'Fill in the current node if it is empty.');
  row('Edit (in menu)', 'Rewrite the content of the current node. Everything else (address, rating, options) stays the same.');
  row('Branch', 'Create a new branch from the current node. The branch gets its own content rating and appears as a choice here. You must write the current node AND its continuation before branching, so readers always have a forward path.');
  row('New timeline (in menu)', 'Start a completely new top-level story strand. It will appear on the timeline picker when you re-enter this story.');
  row('Subtitle', 'Set when writing or editing. A short line shown in choice previews when spoiler mode is on. Leave blank and the engine shows the first ~80 characters of text instead.');
  row('Rating', 'Set on branch-root nodes (any node whose address ends in the first letter of a segment, like 1A, 1C2A). The rating is inherited by every node in that branch. L = general, M = adult content, H = heavily mature. The max-rating filter in settings hides anything above your threshold.');

  section('Text formatting');
  prose('The editor toolbar has seven buttons: Bold, Italic, Underline, Color, Glossary link, Address jump, and + (more tools — custom fonts, redaction, and images live there). Select text first, then tap a button to wrap it — or tap with nothing selected to insert the markers and type between them.');
  row('Bold / Italic / Underline', 'Wrap text in **bold**, *italic*, or _underline_. Single * and _ stay literal next to letters, so "5 * 3" and snake_case do not trigger.');
  row('Size', 'Wrap text in matched hashes to enlarge it: ##text## is a small bump, ###text### bigger, ####text#### biggest (capped). Two hashes minimum, so a lone # or "issue #42" stays literal. Sizes are relative, so they scale with your accessibility text setting.');
  row('Color', 'The palette button gives named colors (theme-tuned), your recent custom colors, and a color wheel. Wraps text as {color:text} for names or {#hexcode:text} for exact colors.');
  row('Glossary link', 'Inserts [[display|key]] — a wiki reference (see Glossary below).');
  row('Address jump', 'Inserts ((display|address)) — a shimmering link that teleports the reader to another address when tapped. Respects the rating filter and refuses emptied or missing targets with an explanation. Good for "meanwhile..." cross-references without merging branches.');
  row('Custom fonts', 'Under the + button. Build a fictional alphabet, then wrap text in it with {{Font Name:text}} — the letters render as your glyphs while staying real text underneath (so links, color, and copy/paste still work through them). See Custom fonts below.');

  section('Combining formatting');
  prose('All formatting nests freely and composes in any order — bold inside color, color inside a size, a glyph wrapping a colored link, and so on. A few worked examples:');
  row('Big red header', '##{red:The Gate}## — size wrapping color.');
  row('Colored glossary link', '{red:[[Sister Margaret|margaret]]} — color wrapping a link. With link mode on, the link colour wins; off, your colour shows.');
  row('Glyph title, sized', '###{{Elder Runes:The Pact}}### — glyphs scale up with the size because they size to the text.');
  row('Everything at once', '##{red:_**[[the door|door]]**_}## — big, red, underlined, bold, and a working link, all on one phrase.');
  prose('Ordering tip: there is no required order — ##{red:x}## and {red:##x##} both work. The renderer figures out the nesting either way. The only thing that cannot wrap a whole link or jump is nothing — they all compose. If a marker ever shows up literally in the reading view, it usually means it was left unpaired (a stray ## or a missing closing brace); pairing it fixes it.');

  section('Glossary (the wiki layer)');
  prose('The glossary is a spoiler-safe wiki built into each story. Entries are scoped by ancestry — a reader at 1C cannot see an entry stamped at 1F, even if they share the same key. Entries on parallel branches are also isolated from each other. This means characters can have evolving or contradictory truths depending on where in the story you are.');
  row('How to create a reference', 'While writing or editing any node, include [[Display text|key]] in the text. The display text is what readers see. The key is a short identifier (letters, digits, underscores, dashes). Example: [[Sister Margaret|sister_margaret]] or [[The old lighthouse|lighthouse]]. Multiple display variations can point to the same key.');
  row('Links mode (menu toggle)', 'When on, references render as tappable orange spans with [1] [2] numbers. Tap any to open the entry. When off, references render as plain display text — no visual distinction.');
  row('Tap an orange reference', 'Opens the glossary sheet for that key. If no entry exists yet at your ancestry, you see a Create button. If one exists upstream, you can read it and choose to edit.');
  row('Creating an entry', 'Tap a reference (links mode on), or go to Menu → Glossary → tap any key. Give it a display title and body text. The entry is stamped at your current address.');
  row('Editing an entry', 'When you edit an existing entry that was stamped upstream, a new copy is created stamped at your current node. The upstream version is untouched — earlier readers still see the old version. This is the ancestry scoping in action.');
  row('Glossary (in menu)', 'Lists every entry visible from your current position — closest-ancestor version per key. Keys on other branches or ahead in the timeline are intentionally absent.');

  section('Custom fonts');
  prose('Build fictional alphabets and write text in them. The glyphs render in the reading view while the real letters stay underneath, so links, colour, sizing, and copy/paste all keep working through your script. Open the + button in the editor, then Manage custom fonts.');
  row('Making a set', 'Create a set and give it a name (the name is how you reference it, and names must be unique). Pick a grid size from 4×4 (crude, minimal) to 16×16 (detailed, flowing) — this locks once the set has glyphs. Choose a smoothing mode: Sharp (straight lines), Rounded (straight lines with softened corners), or Flowing (fully curved).');

function openDeleteSheet() {
  const body = el('div', { class: 'list' });

  body.appendChild(el('div', {
    style: 'padding: var(--pad); color: var(--ink-soft); font-size: 13px; line-height: 1.5; border-bottom: 1px solid var(--line-soft);'
  }, 'Per-node deletion has been retired — it could corrupt the tree by leaving orphan nodes. Emptying a node is non-destructive: the address is preserved, descendants stay attached, and the node is simply skipped in choice lists until you write content into it again. Story-level erase / delete remain as below.'));

  body.appendChild(el('button', {
    class: 'list-row',
    onclick: async () => {
      const cur = state.currentAddr;
      const node = await getNode(cur);
      if (!node) { toast('Nothing to empty here'); return; }
      if (node.emptied) { toast('Already empty'); return; }
      const ok = await showPopup('Empty this node?',
        `${cur} will be marked empty: its text is permanently cleared and it will be skipped in choice lists. The address, branches, and links are untouched. You can write new content here at any time.`,

      await emptyNode(cur);

      await renderMain();

  },
    el('div', { class: 'row-action', style: 'color: var(--fox);' }, svg(ICON.trash)),
    el('div', { class: 'row-main' },
      el('div', { class: 'row-title' }, 'Empty this node'),
      el('div', { class: 'row-sub' }, state.currentAddr + ' · clears text permanently')
    )
  ));

  body.appendChild(el('button', {
    class: 'list-row',
    onclick: async () => {
      const cur = state.currentAddr;
      const n = await countEmptyableUnder(cur);
      if (!n) { toast('Nothing to empty here or below'); return; }
      const ok = await showPopup('Empty this node and everything below?',
        `${n} node${n === 1 ? '' : 's'} from ${cur} downward — continuations and branches alike — will be emptied: text permanently cleared, addresses and structure kept, skipped in choice lists until rewritten. This does not delete anything.`,

      if (!ok) return;
