/* ----- Export logic ----- */

/* Collect every image id referenced by a set of node texts. Used both to
   scope which blobs an export carries and to drive orphan cleanup. */
function collectImageIds(nodeTexts) {
  const ids = new Set();
  const re = /\[IMG:([A-Za-z0-9_]+):[^\]]*\]/g;
  for (const t of nodeTexts) {
    if (!t) continue;
    let m;
    re.lastIndex = 0;
    while ((m = re.exec(t)) !== null) ids.add(m[1]);
  }
  return ids;
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(String(r.result).split(',')[1] || '');
    r.onerror = () => reject(r.error);
    r.readAsDataURL(blob);
  });
}

function base64ToBlob(b64, mime) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new Blob([bytes], { type: mime || 'application/octet-stream' });
}

/* Serialize the images referenced by `ids` into IMAGE| lines (base64). One
   line per image; base64 has no newlines so the line format stays intact.
   Images not in `ids` are simply not written — that is the export-time orphan
   sweep, by construction. */
async function imageExportLines(ids) {
  const out = [];
  if (!ids || !ids.size || !state.db) return out;
  for (const id of ids) {
    const rec = await state.db.images.get(id).catch(() => null);
    if (!rec || !rec.blob) continue;
    const b64 = await blobToBase64(rec.blob);
    out.push(`IMAGE|${rec.id}|${rec.mime || 'image/*'}|${(rec.name || '').replace(/[\n\r|]/g, ' ')}|${rec.w || 0}|${rec.h || 0}|${b64}`);
  }
  return out;
}

/* Delete image blobs that no node references. Deferred GC: call on export and
   on node delete, never per-keystroke (eager deletion breaks cut/paste/undo).
   Reference-counted globally, so a blob shared by a copy-pasted node survives
   until the LAST reference is gone. */
async function sweepOrphanImages() {
  if (!state.db) return 0;
  const allNodes = await state.db.nodes.toArray();
  const referenced = collectImageIds(allNodes.map(n => n.text));
  const stored = await state.db.images.toArray();
  let removed = 0;
  for (const rec of stored) {
    if (!referenced.has(rec.id)) { await state.db.images.delete(rec.id); removed++; }
  }
  return removed;
}

/* Is `addr` downstream of `root` (i.e. is `root` an ancestor of `addr`, or are
   they the same node)? Walks backward exactly the way navigation does —
   prevStepAddr for continuations within a segment, branchParentAddr at a
   segment boundary — and returns true if the walk reaches `root`.

   This is the CORRECT definition of "descendant" for export scoping. The old
   `^root[0-9]` regex only matched addresses that had root as a literal prefix
   followed by a digit, which captures BRANCHES (1A → 1A1A) but NOT
   CONTINUATIONS (1A → 1B, which share no prefix beyond the timeline digit).
   That silently dropped the entire forward main line from any branch export. */
function addrIsUnder(addr, root) {
  if (addr === root) return true;
  let cursor = addr;
  for (let guard = 0; cursor && guard < 5000; guard++) {
    const prv = prevStepAddr(cursor);
    const up = prv ? prv : branchParentAddr(cursor);
    if (!up || up === cursor) return false;
    cursor = up;
    if (cursor === root) return true;
  }
  return false;
}

/* Does any node in `nodeAddrSet` have `addr` as a strict ancestor? Used to
   decide whether an emptied node is a dead-end leaf (droppable) or sits on the
   path to live content (must stay, or we'd orphan what's below it). */
function addrHasDescendantIn(addr, nodeAddrs) {
  for (const other of nodeAddrs) {
    if (other !== addr && addrIsUnder(other, addr)) return true;
  }
  return false;
}

async function doExport(mode) {
  // Guarantee clean output: drop any image blobs no node references before we
  // serialize, so a shared file never carries dead images.
  if (mode !== 'path') { try { await sweepOrphanImages(); } catch (e) {} }
  const isPath = mode === 'path';
  const ext = isPath ? 'txt' : 'cyoa';
  const lines = [];

  if (mode === 'branch') {
    const root = state.currentAddr;
    const allNodes = await state.db.nodes.toArray();
    const allOpts = await state.db.options.toArray();
    const allGloss = await state.db.glossary.toArray();

    // Everything downstream of root — continuations AND branches, via the same
    // backward walk navigation uses (not a prefix regex).
    const scoped = allNodes.filter(n => addrIsUnder(n.address, root));
    const scopedAddrs = scoped.map(n => n.address);

    // Drop emptied dead-end leaves (no content, no descendant carrying content
    // below them). Emptied nodes that sit on the path to live content are kept,
    // so we never orphan a branch hanging off an emptied node.
    const isEmpty = (n) => n.emptied || !(n.text || '').trim();
    const keep = new Set(
      scoped
        .filter(n => !(isEmpty(n) && !addrHasDescendantIn(n.address, scopedAddrs)))
        .map(n => n.address)
    );

    lines.push('# CYOA EXPORT');
    lines.push('# story: ' + state.story.title);
    lines.push('# root: ' + root);
    lines.push('# date: ' + new Date().toISOString());
    lines.push('# ---');

    const keptTexts = [];
    for (const n of allNodes) {
      if (!keep.has(n.address)) continue;
      lines.push(`NODE|${n.address}|${n.author||''}|${n.rating||''}|${n.subtitle||''}|${n.emptied ? 'E' : ''}|${(n.text||'').replace(/\n/g, '\\n')}`);
      keptTexts.push(n.text || '');
    }
    for (const o of allOpts) {
      if (keep.has(o.parent) && keep.has(o.target)) lines.push(`OPTION|${o.parent}|${o.target}`);
    }
    for (const g of allGloss) {
      if (keep.has(g.origin_address)) {
        lines.push(`GLOSS|${g.key}|${g.origin_address}|${g.author||''}|${g.title||''}|${(g.text||'').replace(/\n/g, '\\n')}`);
      }
    }
    // Glyph sets are story-wide; include them so a shared branch carries the
    // fonts it references. JSON.stringify yields a single line (no literal
    // newlines), so one GLYPHSET line per set is safe.
    for (const set of (state.story.glyphSets || [])) {
      lines.push('GLYPHSET|' + JSON.stringify(set));
    }
    // Images referenced by the exported nodes (base64). Scoped to the kept
    // texts, so orphans and unrelated images aren't carried.
    for (const line of await imageExportLines(collectImageIds(keptTexts))) lines.push(line);
  } else if (mode === 'all') {
    const allNodes = await state.db.nodes.toArray();
    const allOpts = await state.db.options.toArray();
    const allGloss = await state.db.glossary.toArray();

    lines.push('# CYOA EXPORT (full story)');
    lines.push('# story: ' + state.story.title);
    lines.push('# date: ' + new Date().toISOString());
    lines.push('# ---');

    for (const n of allNodes) {
      lines.push(`NODE|${n.address}|${n.author||''}|${n.rating||''}|${n.subtitle||''}|${n.emptied ? 'E' : ''}|${(n.text||'').replace(/\n/g, '\\n')}`);
    }
    for (const o of allOpts) {
      lines.push(`OPTION|${o.parent}|${o.target}`);
    }
    for (const g of allGloss) {
      lines.push(`GLOSS|${g.key}|${g.origin_address}|${g.author||''}|${g.title||''}|${(g.text||'').replace(/\n/g, '\\n')}`);
    }
    // Glyph sets — story-wide custom fonts
    for (const set of (state.story.glyphSets || [])) {
      lines.push('GLYPHSET|' + JSON.stringify(set));
    }
    // All referenced images (base64). Unreferenced blobs are skipped — this is
    // the export-time orphan sweep, so a shared file never carries dead images.
    for (const line of await imageExportLines(collectImageIds(allNodes.map(n => n.text)))) lines.push(line);
  } else if (mode === 'path') {
    // Walk backward
    const path = [];
    let cursor = state.currentAddr;
    while (cursor) {
      path.push(cursor);
      const prv = prevStepAddr(cursor);
      if (prv && await nodeExists(prv)) {
        cursor = prv;
      } else {
        const par = branchParentAddr(cursor);
        if (par && await nodeExists(par)) cursor = par;
        else cursor = '';
      }
    }
    path.reverse();

    lines.push('# ' + state.story.title);
    lines.push('# Path from root to ' + state.currentAddr);
    lines.push('# ' + path.length + ' nodes, exported ' + new Date().toLocaleString());
    lines.push('# ---');
    lines.push('');

    for (const a of path) {
      const n = await getNode(a);
      const r = await getRating(a);
      const meta = `[${a}]  rating: ${r}` + (n && n.author ? `  by: ${n.author}` : '');
      lines.push(meta);
      lines.push('');
      lines.push(plainText((n && n.text) || ''));
      lines.push('');
      lines.push('-----');
      lines.push('');
    }
  }

  const blob = new Blob([lines.join('\n')], { type: 'application/octet-stream' });
  const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  const filename = mode === 'branch' ? `${state.story.slug}_${state.currentAddr}_${ts}.${ext}` :
                   mode === 'path'   ? `${state.story.slug}_path_${state.currentAddr}_${ts}.${ext}` :
                                       `${state.story.slug}_ALL_${ts}.${ext}`;

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);

  closeSheet();
  toast('Exported ' + filename);
  haptic(15);
}

/* ----- Import logic ----- */

$fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const text = await file.text();
  $fileInput.value = '';
  await handleImport(text, file.name);
});

/* ═════════════════════════════════════════════════════════════════
   ADDRESS REWRITE FOR IMPORTS — read carefully before editing.

   When importing a branch, the export file declares a root like `1F`.
   Three classes of addresses can appear in the file:

   1. The root itself:         1F          → newRoot
   2. Same-segment continuations of the root:  1G, 1H, 1I, 1AA, 1AB...
      These continue forward from 1F in the same segment, so they must
      remain forward continuations of newRoot. If newRoot is `1B`, then
      1G→1C, 1H→1D, etc. If newRoot is `1C1A`, then 1G→1C1B, 1H→1C1C.
   3. True descendants:        1F1A, 1F2A, 1F1A1B...
      These keep their structural suffix and graft under newRoot.
      1F1A → newRoot+1A, 1F2A → newRoot+2A, etc.

   Anything else is OUT OF SCOPE for this import (a sibling timeline,
   an unrelated branch) and returns null so it gets skipped.

   How to translate a same-segment continuation:
     The root's last segment is `<num><letter>`.  e.g. `1F` has segment `1F`,
     prefix `''`, num `1`, letter `F`.  An address like `1G` has the same
     prefix and num but a different letter. The OFFSET is the number of
     letter increments from the root letter to the address letter.
     We then apply that same offset, starting from newRoot's last letter.

   This works for letter rollover too:
     Root `1Y`, address `1AB` is 1 → Z → AA → AB = 3 increments from Y.
     If newRoot is `1B`, that's 1B → 1C → 1D → 1E.
   ════════════════════════════════════════════════════════════════ */

/* Returns how many _charInc steps it takes to get from `from` to `to`,
   or null if `to` is not reachable forward from `from`. */
function letterOffset(from, to) {
  if (from === to) return 0;
  let cur = from;
  for (let i = 0; i < 10000; i++) {
    cur = _charInc(cur);
    if (cur === to) return i + 1;
    if (cur.length > to.length) return null; // overshot
  }
  return null;
}

/* Apply `offset` letter increments to `letter`. */
function letterAdd(letter, offset) {
  let cur = letter;
  for (let i = 0; i < offset; i++) cur = _charInc(cur);
  return cur;
}

/* Split an address into (prefix, num, letter). For `1F2AF` returns
   ['1F2A', '2', 'F']... actually wait, segments are number+letters.
   So '1F2AF' is '1F' + '2AF'? No — segments are <digits><letters>.
   '1F2AF' decomposes as segment '1F' then segment '2AF'.
   The LAST segment of '1F2AF' is '2AF', prefix '1F', num '2', letter 'AF'. */
function splitAddr(addr) {
  // _segLast already exists and returns the last <digits><letters> segment
  const seg = _segLast(addr);
  if (!seg) return null;
  const prefix = addr.slice(0, addr.length - seg.length);
  const m = seg.match(/^([0-9]+)([A-Z]+)$/);
  if (!m) return null;
  return { prefix, num: m[1], letter: m[2] };
}

/* The actual rewrite. */
function rewriteUnderRoot(oAddr, oldRoot, newRoot) {
  // Case 1: exact match.
  if (oAddr === oldRoot) return newRoot;

  const oldParts = splitAddr(oldRoot);
  const newParts = splitAddr(newRoot);
  if (!oldParts || !newParts) return null;

  // Case 2: same-segment continuation of the root.
  // The address has the same prefix and num as the root, but a different
  // (later) letter, and nothing else after it.
  if (oAddr.startsWith(oldParts.prefix + oldParts.num)) {
    const tail = oAddr.slice(oldParts.prefix.length + oldParts.num.length);
    // tail must be only letters AND extend the root's letter forward
    if (/^[A-Z]+$/.test(tail)) {
      const offset = letterOffset(oldParts.letter, tail);
      if (offset !== null) {
        const newLetter = letterAdd(newParts.letter, offset);
        return newParts.prefix + newParts.num + newLetter;
      }
    }
  }

  // Case 3: true descendant — oldRoot followed by a digit (the start of
  // a child segment). Keep the structural suffix, graft under newRoot.
  if (oAddr.startsWith(oldRoot)) {
    const rest = oAddr.slice(oldRoot.length);
    if (/^[0-9]/.test(rest)) return newRoot + rest;
  }

  // Case 4: also need to handle descendants of the continuations.
  // E.g. if export root is 1F and the file contains 1G1A, that's a child
  // of the continuation 1G. We have to remap the continuation first then
  // append the structural rest.
  if (oAddr.startsWith(oldParts.prefix + oldParts.num)) {
    // Find where the letters end and digits begin in the tail
    const tail = oAddr.slice(oldParts.prefix.length + oldParts.num.length);
    const m = tail.match(/^([A-Z]+)([0-9].*)$/);
    if (m) {
      const contLetter = m[1];
      const rest = m[2];
      const offset = letterOffset(oldParts.letter, contLetter);
      if (offset !== null) {
        const newLetter = letterAdd(newParts.letter, offset);
        return newParts.prefix + newParts.num + newLetter + rest;
      }
    }
  }

  return null;
}

/* Rewrite an address using a top-level number map.
   Used for full-story imports where each top-level (1A, 2A, etc.)
   gets remapped to a new top-level slot. */
function rewriteWithTopMap(oAddr, numMap) {
  const m = oAddr.match(/^([0-9]+)/);
  if (!m) return null;
  const oldNum = m[1];
  if (numMap[oldNum] === undefined) return null;
  return numMap[oldNum] + oAddr.slice(oldNum.length);
}

async function handleImport(text, filename) {
  const hadStory = !!state.story;  // are we importing into an already-open story?
  // Parse header
  const allLines = text.split(/\r?\n/);
  let exportRoot = null;
  let storyTitle = filename;
  for (const line of allLines) {
    if (line.startsWith('# root:')) exportRoot = line.slice(7).trim();
    if (line.startsWith('# story:')) storyTitle = line.slice(8).trim();
    if (line.startsWith('NODE|') || line.startsWith('OPTION|') || line.startsWith('GLOSS|')) break;
  }

  // Need a story to import into. Create one if necessary.
  if (!state.story) {
    const newSlug = await createStory(storyTitle);
    await setStory(newSlug);
    state.currentAddr = '1A';
  }

  // Validate
  const issues = [];
  for (let i = 0; i < allLines.length; i++) {
    const line = allLines[i];
    if (!line || line.startsWith('#')) continue;
    const rec = line.split('|')[0];
    if (!['NODE', 'OPTION', 'GLOSS', 'GLYPHSET', 'IMAGE'].includes(rec)) {
      issues.push(`Line ${i+1}: unknown record type '${rec}'`);
      continue;
    }
    const fields = line.split('|');
    if (rec === 'NODE') {
      if (!/^[0-9A-Z]+$/.test(fields[1] || '')) issues.push(`Line ${i+1}: invalid address '${fields[1]}'`);
      const r = fields[3] || '';
      if (r && !/^[LMH]$/.test(r)) issues.push(`Line ${i+1}: invalid rating '${r}'`);
    } else if (rec === 'OPTION') {
      if (!/^[0-9A-Z]+$/.test(fields[1] || '')) issues.push(`Line ${i+1}: invalid parent`);
      if (!/^[0-9A-Z]+$/.test(fields[2] || '')) issues.push(`Line ${i+1}: invalid target`);
    } else if (rec === 'GLYPHSET') {
      // Validate the JSON parses; deeper checks happen at import time
      try { JSON.parse(line.slice('GLYPHSET|'.length)); }
      catch { issues.push(`Line ${i+1}: malformed glyph set data`); }
    }
  }

  if (issues.length > 0) {
    const proceed = await showPopup('Validation issues',
      `Found ${issues.length} issues:\n\n${issues.slice(0, 10).join('\n')}${issues.length > 10 ? '\n…' : ''}\n\nImport anyway?`,
      { confirm: true, danger: true, okLabel: 'Import anyway' });
    if (!proceed) { toast('Import cancelled'); return; }
  }

  // Two import modes:
  //   A) Branch import (file has `# root:` line) — graft as a new branch at current node.
  //   B) Full-story import (no `# root:`) — each top-level timeline becomes a new top-level here.

  let mode = exportRoot ? 'branch' : 'full';
  let rewriteFn = null;
  let primaryNewRoot = null;
  let graft = null;
  let graftRoots = [];

  if (mode === 'branch') {
    /* Decide between continuation mode and branch mode.
       Continuation mode: import flows forward in the current segment.
         e.g. graft at 1C, next free step is 1D → newRoot = 1D
       Branch mode: import becomes a new sub-branch.
         e.g. graft at 1C with branches taken → newRoot = 1C1A (or next free)
       We prefer continuation when:
         - the current node exists (has content)
         - and the next step in its segment is free
       Otherwise we fall back to a new branch. */
    graft = state.currentAddr;
    const currentExists = await nodeExists(graft);
    const nextStep = nextStepAddr(graft);
    const nextStepFree = nextStep && !(await nodeExists(nextStep));

    let useContinuation = currentExists && nextStepFree;

    if (useContinuation) {
      primaryNewRoot = nextStep;
    } else {
      primaryNewRoot = await newBranchAddr(graft);
    }
    rewriteFn = (a) => rewriteUnderRoot(a, exportRoot, primaryNewRoot);
    graftRoots = [primaryNewRoot];

    const modeLabel = useContinuation ? 'as continuation' : 'as new branch';
    const proceed = await showPopup('Import',
      `${exportRoot} will become ${primaryNewRoot}, ${modeLabel} from ${graft}.`,
      { confirm: true, okLabel: 'Import' });
    if (!proceed) return;
  } else {
    // Find all distinct leading-digit prefixes (top-level timelines) in the file
    const fileTops = new Set();
    for (const line of allLines) {
      if (!line.startsWith('NODE|') && !line.startsWith('OPTION|') && !line.startsWith('GLOSS|')) continue;
      const fields = line.split('|');
      // NODE address at index 1; OPTION parent+target at 1 and 2; GLOSS origin at 2
      const candidates = line.startsWith('NODE|') ? [fields[1]] :
                         line.startsWith('OPTION|') ? [fields[1], fields[2]] :
                         [fields[2]];
      for (const a of candidates) {
        const m = (a || '').match(/^([0-9]+)/);
        if (m) fileTops.add(m[1]);
      }
    }
    if (fileTops.size === 0) { toast('Nothing to import'); return; }
    const sortedTops = [...fileTops].sort((a, b) => parseInt(a) - parseInt(b));

    // --- Precompute the AS-NEW-ROOT mapping (each top-level → a fresh free slot) ---
    const existing = await state.db.nodes.toArray();
    const claimed = new Set();
    for (const node of existing) {
      const m = node.address.match(/^([0-9]+)/);
      if (m) claimed.add(parseInt(m[1]));
    }
    const rootNumMap = {};
    let next = 1;
    for (const oldNum of sortedTops) {
      while (claimed.has(next)) next++;
      rootNumMap[oldNum] = String(next);
      claimed.add(next);
      next++;
    }
    const rootPrimary = rootNumMap[sortedTops[0]] + 'A';

    // --- Precompute the FROM-NODE (graft) mapping, when grafting is possible ---
    // Only when importing into a pre-existing story with a real current node; a
    // freshly-created story has only the empty 1A, so root is the sole option.
    const canGraft = hadStory && !!state.currentAddr;
    let graftTopMap = null, graftRootsPre = [], graftPrimary = null;
    if (canGraft) {
      const g = state.currentAddr;
      const currentExists = await nodeExists(g);
      const nextStep = nextStepAddr(g);
      const nextStepFree = nextStep && !(await nodeExists(nextStep));
      graftTopMap = {};
      if (sortedTops.length === 1) {
        // Single timeline → flow as a continuation if that slot is free, else a branch
        const t = sortedTops[0];
        const nr = (currentExists && nextStepFree) ? nextStep : await newBranchAddr(g);
        graftTopMap[t] = { oldRoot: t + 'A', newRoot: nr };
        graftRootsPre = [nr];
      } else {
        // Multiple timelines → each becomes its own branch off the graft node
        const slots = await branchSlots(g, sortedTops.length);
        sortedTops.forEach((t, i) => { graftTopMap[t] = { oldRoot: t + 'A', newRoot: slots[i] }; });
        graftRootsPre = sortedTops.map(t => graftTopMap[t].newRoot);
      }
      graftPrimary = graftRootsPre[0];
    }

    // --- Ask where to put it. One popup; the choice is the confirm. ---
    let placement = 'root';
    if (canGraft) {
      const n = sortedTops.length;
      const body = el('div');
      body.appendChild(el('div', { style: 'margin-bottom: 14px;' },
        `This file has ${n} timeline${n === 1 ? '' : 's'}. Where should ${n === 1 ? 'it' : 'they'} go?`));
      const acts = el('div', { class: 'popup-actions', style: 'flex-direction: column; gap: 8px;' });
      acts.appendChild(el('button', { class: 'btn primary', onclick: () => resolvePopup('node') },
        `From ${state.currentAddr} → ${graftPrimary}${n > 1 ? ' …' : ''}`));
      acts.appendChild(el('button', { class: 'btn ghost', onclick: () => resolvePopup('root') },
        `As new root → ${rootPrimary}${n > 1 ? ' …' : ''}`));
      acts.appendChild(el('button', { class: 'btn ghost', onclick: () => resolvePopup(null) }, 'Cancel'));
      body.appendChild(acts);
      placement = await showPopup('Where to import?', body, { noActions: true });
      if (placement == null) { toast('Import cancelled'); return; }
    }

    if (placement === 'node') {
      graft = state.currentAddr;
      graftRoots = graftRootsPre;
      primaryNewRoot = graftPrimary;
      // Per-top dispatch into the same rewriteUnderRoot the branch path uses, so
      // each timeline grafts under its own assigned root and nothing is dropped.
      rewriteFn = (a) => {
        const m = (a || '').match(/^([0-9]+)/);
        if (!m) return null;
        const pair = graftTopMap[m[1]];
        if (!pair) return null;
        return rewriteUnderRoot(a, pair.oldRoot, pair.newRoot);
      };
    } else {
      rewriteFn = (a) => rewriteWithTopMap(a, rootNumMap);
      primaryNewRoot = rootPrimary;
    }
  }

  let imported = 0;

  // Process IMAGEs first, before NODEs, so the old→new id map exists when we
  // rewrite [IMG:...] tokens in node text. Each imported image gets a fresh id
  // (so importing into a story that already has images can't collide), and we
  // remember the mapping to rewrite the tokens. base64 → Blob → Dexie.
  const imageIdMap = {};
  for (const line of allLines) {
    if (!line.startsWith('IMAGE|')) continue;
    const fields = line.split('|');
    // IMAGE|id|mime|name|w|h|base64
    const oldId = fields[1];
    const mime = fields[2] || 'image/*';
    const name = fields[3] || '';
    const w = parseInt(fields[4]) || 0;
    const h = parseInt(fields[5]) || 0;
    const b64 = fields.slice(6).join('|'); // base64 has no '|', but be safe
    if (!oldId || !b64) continue;
    try {
      const blob = base64ToBlob(b64, mime);
      const newId = newImageId();
      await state.db.images.put({ id: newId, blob, mime, name, w, h });
      imageIdMap[oldId] = newId;
    } catch (e) {
      // Bad base64 — skip this image, leave its token to fail safe as text.
    }
  }

  // Process NODEs
  for (const line of allLines) {
    if (!line.startsWith('NODE|')) continue;
    const fields = line.split('|');
    const [, oAddr, author, rating, subOrText, ...rest] = fields;
    let subtitle = '', text = '', emptied = false;
    if (rest.length === 0) {
      // Legacy 4-field format: NODE|addr|author|rating|text (no subtitle)
      subtitle = '';
      text = subOrText || '';
    } else if (rest.length === 1) {
      // Old 5-field format: NODE|addr|author|rating|subtitle|text
      subtitle = subOrText || '';
      text = rest[0] || '';
    } else {
      // Current format: NODE|addr|author|rating|subtitle|flags|text...
      // flags field matches /^[E]?$/ — only '' or 'E'. Anything else
      // means this is an old file where text happened to contain pipes,
      // so fall back to treating rest as the full text.
      if (/^[E]?$/.test(rest[0])) {
        subtitle = subOrText || '';
        emptied = rest[0] === 'E';
        text = rest.slice(1).join('|');
      } else {
        subtitle = subOrText || '';
        text = rest.join('|');
      }
    }
    text = text.replace(/\\n/g, '\n');

    const newAddr = rewriteFn(oAddr);
    if (!newAddr) continue;

    // Rewrite any address jump links ((display|ADDR)) inside the text so
    // they point at the rewritten addresses. Glossary links use keys, not
    // addresses, so they don't need this. Invalid/unmapped targets are
    // left as-is (rewriteFn returns falsy → keep original).
    const rewrittenText = text.replace(
      /\(\(([^|)]+)\|([^)]+)\)\)/g,
      (whole, disp, addr) => {
        const mapped = rewriteFn(addr.trim().toUpperCase());
        return mapped ? `((${disp}|${mapped}))` : whole;
      }
    ).replace(
      // Remap image tokens to the freshly-stored blob ids. An unmapped id
      // (image line missing/corrupt) is left as-is and simply fails safe to
      // literal text in the renderer.
      /\[IMG:([A-Za-z0-9_]+):([^\]]*)\]/g,
      (whole, oldId, label) => {
        const newId = imageIdMap[oldId];
        return newId ? `[IMG:${newId}:${label}]` : whole;
      }
    );

    await state.db.nodes.put({
      address: newAddr,
      text: rewrittenText,
      author: author || '',
      rating: rating || '',
      subtitle: subtitle || '',
      emptied: emptied || false
    });
    imported++;
  }

  // Process OPTIONs
  for (const line of allLines) {
    if (!line.startsWith('OPTION|')) continue;
    const [, parent, target] = line.split('|');
    const np = rewriteFn(parent);
    const nt = rewriteFn(target);
    if (!np || !nt) continue;
    await state.db.options.put({ parent: np, target: nt });
  }

  // Process GLOSS
  for (const line of allLines) {
    if (!line.startsWith('GLOSS|')) continue;
    const fields = line.split('|');
    const [, key, origin, gauthor, gtitle, ...rest] = fields;
    const gtext = (rest.join('|')).replace(/\\n/g, '\n');
    const no = rewriteFn(origin);
    if (!no) continue;
    await state.db.glossary.put({
      key, origin_address: no,
      author: gauthor || '',
      title: gtitle || key,
      text: gtext,
      edited: Date.now()
    });
  }

  // Process GLYPHSET — story-wide custom fonts. Each line is GLYPHSET|json.
  // We append imported sets that aren't already present (matched by id), so
  // re-importing the same story doesn't duplicate them. Note: node text
  // references sets by 1-based index, so importing a branch into a DIFFERENT
  // story that already has sets can shift indices; for same-story round
  // trips (the common case) order and indices are preserved.
  let glyphSetsAdded = 0;
  for (const line of allLines) {
    if (!line.startsWith('GLYPHSET|')) continue;
    const json = line.slice('GLYPHSET|'.length);
    try {
      const set = JSON.parse(json);
      if (!set || !set.id) continue;
      const exists = (state.story.glyphSets || []).some(s => s.id === set.id);
      if (!exists) {
        // Basic shape guard
        set.glyphs = set.glyphs || {};
        set.glyphWidths = set.glyphWidths || {};
        set.grid = set.grid || 8;
        state.story.glyphSets.push(set);
        glyphSetsAdded++;
      }
    } catch {
      // Malformed glyph set line — skip it, don't break the import
    }
  }
  if (glyphSetsAdded > 0) await saveGlyphSets();

  // Wire graft — connect the graft node to every imported root: one for a branch
  // import or a single-timeline graft, several for a multi-timeline graft.
  if (graft && graftRoots.length) {
    for (const r of graftRoots) await addOption(graft, r);
  }

  const extra = glyphSetsAdded > 0 ? ` + ${glyphSetsAdded} font${glyphSetsAdded === 1 ? '' : 's'}` : '';
  toast(`Imported ${imported} nodes${extra}`);
  haptic(20);
  closeSheet();

  const jump = await showPopup('Imported',
    `Brought in ${imported} nodes${extra}. Jump to ${primaryNewRoot}?`,
    { confirm: true, okLabel: 'Jump' });
  if (jump) await navigateTo(primaryNewRoot, true);
  else await renderMain();
}

/* ============================================================
   Tree View
   ============================================================ */

const $treeOverlay = document.getElementById('tree-overlay');

function closeTreeView() {
  $treeOverlay.classList.remove('show');
  setTimeout(() => { $treeOverlay.innerHTML = ''; }, 300);
}

async function openTreeView() {
  // Collect all nodes
  const allNodes = await state.db.nodes.toArray();
  const allOpts  = await state.db.options.toArray();

  if (allNodes.length === 0) {
    toast('No nodes to show yet');
    return;
  }

  // Rating lives on the branch root and is inherited by every continuation
  // in the segment (same model as getRating). Resolve it from the in-memory
  // node list rather than the raw n.rating, otherwise continuations — which
  // never carry their own rating — fall through to 'L' and show green even
  // when their branch is M/H.
  const nodeByAddr = new Map(allNodes.map(n => [n.address, n]));
  const ratingForAddr = (addr) => {
    const root = nodeByAddr.get(ratingAncestor(addr));
    return (root && root.rating) ? root.rating : 'L';
  };

  // Build adjacency map: parent -> [children...]
  // We treat real nodes and "ghost" nodes (gaps in segments) uniformly.
  const nodeSet = new Set(allNodes.map(n => n.address));

  // ── Detect ghost addresses ────────────────────────────────────
  // For every real node, walk forward in its segment. Any addresses we
  // encounter that don't exist as real nodes — but which lie between
  // this node and another real node ahead in the same segment — are
  // ghosts. Cap at 50 ahead to avoid pathological loops.
  const ghosts = new Set();
  for (const n of allNodes) {
    let cursor = nextStepAddr(n.address);
    const ownParent = branchParentAddr(n.address);
    const pending = [];
    for (let i = 0; i < 50 && cursor; i++) {
      if (branchParentAddr(cursor) !== ownParent) break;
      if (nodeSet.has(cursor)) {
        // We found a real forward neighbor — every address we collected
        // along the way is a confirmed gap.
        for (const g of pending) ghosts.add(g);
        break;
      }
      pending.push(cursor);
      cursor = nextStepAddr(cursor);
    }
    // If we never found a forward real node, pending stays unflushed —
    // those aren't gaps, they're just empty future space.
  }

  const allAddresses = [...nodeSet, ...ghosts];
  const children = {};
  for (const a of allAddresses) children[a] = [];

  // From options table — but only when the relationship represents
  // direct same-segment continuation OR a true branching link. Bridge
  // options that skip over ghosts should NOT produce edges, because
  // we'll have explicit edges through the ghosts instead.
  for (const o of allOpts) {
    if (!children[o.parent]) continue;
    if (!nodeSet.has(o.target) && !ghosts.has(o.target)) continue;
    const parParent = branchParentAddr(o.parent);
    const tgtParent = branchParentAddr(o.target);
    if (parParent === tgtParent) {
      // Same segment — only include if it's the IMMEDIATE next step
      // (otherwise it's a bridge option that ghosts will replace)
      if (prevStepAddr(o.target) !== o.parent) continue;
    }
    if (!children[o.parent].includes(o.target)) {
      children[o.parent].push(o.target);
    }
  }

  // Implicit forward links — every address (real or ghost) connects to
  // its prevStep if that prev exists in our universe of addresses.
  for (const a of allAddresses) {
    const prv = prevStepAddr(a);
    if (prv && children[prv] && !children[prv].includes(a)) {
      children[prv].push(a);
    }
  }

  // Find roots: addresses with no parent in our universe
  const hasParent = new Set();
  for (const [par, kids] of Object.entries(children)) {
    for (const k of kids) hasParent.add(k);
  }
  const roots = allAddresses.filter(a => !hasParent.has(a));
  roots.sort((a, b) => a.localeCompare(b));

  // Grid-based layout.
  // Every node snaps to a (col, row) cell. Continuations go straight up
  // in the same column. Branches go one column right and one row up,
  // with the connecting line occupying cells in the source row from
  // sourceCol+1 to branchCol. If a branch's chain would collide with
  // something already placed (a node OR another branch's line cell),
  // the entire branch chain shifts one column right and we retry.
  // Roots are placed in the first column where row 0 is free.
  // Nothing is hardcoded as an anchor — any tree shape is processed
  // dynamically by walking the children map.
  const NODE_W = 70;
  const NODE_H = 40;
  const CELL_W = NODE_W + 20;
  const CELL_H = NODE_H + 30;

  const positions = {};   // addr → { col, row }
  let occupied = new Map(); // "col,row" → 'node' | 'line'

  // Hidden = emptied and we're in hide-empty mode. These nodes still
  // exist structurally but get skipped during layout so the grid compacts.
  const emptiedSet = new Set(allNodes.filter(n => n.emptied).map(n => n.address));
  const isHidden = (a) => hideEmpty && emptiedSet.has(a);

  const cellKey = (c, r) => c + ',' + r;
  const isOcc = (c, r) => occupied.has(cellKey(c, r));
  const mark = (c, r, t) => occupied.set(cellKey(c, r), t);
  // Node cells block everything. Line cells block nodes but allow other lines
  // to pass through (lines from the same source visually overlap; lines from
  // different sources at the same row also overlap harmlessly).
  // ⚠ LAYOUT INVARIANT — the line-vs-node asymmetry below is load-bearing.
  // A NODE cell blocks everything (nodes never overlap nodes OR lines). A LINE
  // cell blocks nodes but NOT other lines (connector lines may visually cross
  // each other harmlessly; they may never cross a node). Do not "simplify" these
  // to the same rule — collapsing them either drops nodes (lines walling off
  // columns) or lets nodes render on top of connectors. This pair plus the
  // top-down processBranches order are what make the tree place cleanly with
  // emptied nodes shown. Both were hard-won; see the git/chat history before
  // touching either.
  const canPlaceNode = (c, r) => !occupied.has(cellKey(c, r));
  const canPlaceLine = (c, r) => occupied.get(cellKey(c, r)) !== 'node';
  const markLine = (c, r) => {
    // Don't overwrite existing line marks (keeps them line, not anything fancier)
    if (!occupied.has(cellKey(c, r))) occupied.set(cellKey(c, r), 'line');
  };

  // Number of visible (non-hidden) nodes in addr's straight-up continuation
  // chain, including addr itself. Used to reserve vertical space before
  // committing to a branch column.
  function chainLength(addr) {
    let len = 0;
    let cur = addr;
    while (cur) {
      if (!isHidden(cur)) len++;
      const next = nextStepAddr(cur);
      if (next && children[cur] && children[cur].includes(next)) {
        cur = next;
      } else break;
    }
    return len;
  }

  // Place addr at (col, startRow) and walk its continuation chain straight up.
  // Hidden nodes are skipped (no cell taken, no row increment) but the walk
  // continues through them so their children still get a chance to render.
  function placeChain(addr, col, startRow) {
    const placed = [];
    let cur = addr;
    let row = startRow;
    while (cur) {
      if (!isHidden(cur)) {
        mark(col, row, 'node');
        positions[cur] = { col, row };
        placed.push({ addr: cur, col, row });
        row++;
      }
      const next = nextStepAddr(cur);
      if (next && children[cur] && children[cur].includes(next)) {
        cur = next;
      } else break;
    }
    return placed;
  }

  function processBranches(chainNodes) {
    // Process branches from the TOP of the chain downward (highest row first).
    // Branch connector lines run horizontally along the parent's row, so a
    // lower branch's node, if placed first, sits in the row a higher branch's
    // line needs to cross — blocking it and (at the column cap) dropping it.
    // Giving upper branches first claim on the inner columns makes lower
    // branches route further right, AROUND the upper ones — which is correct
    // for a tree that grows upward (lower branches take the long way, like
    // roots spreading around the ones above). Reverse a shallow copy so the
    // caller's array order is untouched.
    for (const { addr, col, row } of chainNodes.slice().reverse()) { // ⚠ reverse is REQUIRED — see block above; do not change to a forward loop
      // Branches = children of addr that are NOT the same-segment continuation
      const branches = (children[addr] || [])
        .filter(c => prevStepAddr(c) !== addr)
        .sort((a, b) => a.localeCompare(b));

      for (const branch of branches) {
        if (isHidden(branch)) continue;
        const branchLen = chainLength(branch);
        if (branchLen === 0) continue;

        // Try branchCol = col+1, col+2, ... until everything fits
        let branchCol = col + 1;
        while (branchCol < 10000) {
          let conflict = false;

          // Line cells in source's row from col+1 through branchCol.
          // Lines can overlap other lines, but not nodes.
          for (let c = col + 1; c <= branchCol; c++) {
            if (!canPlaceLine(c, row)) { conflict = true; break; }
          }
          if (!conflict) {
            // Chain cells in branchCol from row+1 through row+branchLen.
            // These are NODES — must be totally free.
            for (let r = row + 1; r <= row + branchLen; r++) {
              if (!canPlaceNode(branchCol, r)) { conflict = true; break; }
            }
          }

          if (!conflict) {
            for (let c = col + 1; c <= branchCol; c++) markLine(c, row);
            const branchPlaced = placeChain(branch, branchCol, row + 1);
            processBranches(branchPlaced);
            break;
          }
          branchCol++;
        }
      }
    }
  }

  function buildLayout() {
    // Reset every rebuild — eye toggle reuses this
    for (const k in positions) delete positions[k];
    occupied = new Map();

    // Refresh emptiedSet from allNodes (in case it changed)
    emptiedSet.clear();
    for (const n of allNodes) if (n.emptied) emptiedSet.add(n.address);

    // Sort roots numerically so timeline 1 comes before timeline 2, etc.
    const sortedRoots = roots.slice().sort((a, b) => {
      const na = parseInt(a) || 0, nb = parseInt(b) || 0;
      return na - nb || a.localeCompare(b);
    });

    for (const root of sortedRoots) {
      if (isHidden(root)) continue;
      const rootLen = chainLength(root);
      if (rootLen === 0) continue;
      // Find the first column where the entire root chain fits.
      // Without this we'd put 2A in any column with row 0 free, even if
      // its later continuations (2B, 2C, ...) would overlap branch nodes
      // from earlier timelines.
      let col = 0;
      while (true) {
        let fits = true;
        for (let r = 0; r < rootLen; r++) {
          if (!canPlaceNode(col, r)) { fits = false; break; }
        }
        if (fits) break;
        col++;
      }
      const rootPlaced = placeChain(root, col, 0);
      processBranches(rootPlaced);
    }
  }

  // Eye toggle: when true, emptied nodes are skipped during layout AND not
  // rendered. Persisted across tree opens (and sessions) via settings, so
  // hiding empties stays hidden until the user flips it back.
  let hideEmpty = !!state.settings.treeHideEmpty;

  function getVisibleNodes() {
    if (!hideEmpty) return allNodes;
    return allNodes.filter(n => !n.emptied);
  }

  buildLayout();

  // Pan & zoom state — declared outside rebuildSVG so eye toggle preserves them
  let scale = 1;
  let ox = 0, oy = 0;
  const SVG_NS = 'http://www.w3.org/2000/svg';

  function svgEl(tag, attrs) {
    const e = document.createElementNS(SVG_NS, tag);
    for (const k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }

  let svg; // assigned by rebuildSVG, replaced on eye toggle

  function rebuildSVG() {
    const posArr = Object.values(positions);
    if (!posArr.length) return;

    let maxRow = 0, maxCol = 0;
    for (const p of posArr) {
      if (p.row > maxRow) maxRow = p.row;
      if (p.col > maxCol) maxCol = p.col;
    }

    // Pixel coordinate helpers. Y is INVERTED so row 0 sits at the bottom
    // and rows grow upward visually.
    const colX = (col) => col * CELL_W;
    const rowY = (row) => (maxRow - row) * CELL_H;

    const PAD = 30;
    const totalW = (maxCol + 1) * CELL_W + PAD * 2;
    const totalH = (maxRow + 1) * CELL_H + PAD * 2;
    const minX = -PAD;
    const minY = -PAD;

    const newSvg = svgEl('svg', {
      class: 'tree-svg',
      width: totalW,
      height: totalH,
      viewBox: `${minX} ${minY} ${totalW} ${totalH}`
    });

    // Arrow marker for edges
    const defs = svgEl('defs', {});
    const marker = svgEl('marker', {
      id: 'arrow', viewBox: '0 0 10 10',
      refX: '8', refY: '5',
      markerWidth: '6', markerHeight: '6',
      orient: 'auto-start-reverse'
    });
    const arrowPath = svgEl('path', { d: 'M 0 0 L 10 5 L 0 10 z', fill: 'var(--ink-soft)' });
    marker.appendChild(arrowPath);
    defs.appendChild(marker);
    newSvg.appendChild(defs);

    // Edges: straight lines, right angles only. Continuations go straight up
    // from parent top to child bottom. Branches use an L: from parent's right
    // edge, horizontal to branch column, then vertical up to branch bottom.
    const edgeGroup = svgEl('g', {});
    for (const [par, kids] of Object.entries(children)) {
      const p = positions[par];
      if (!p) continue;
      for (const k of kids) {
        const c = positions[k];
        if (!c) continue;
        const pX = colX(p.col), pY = rowY(p.row);
        const cX = colX(c.col), cY = rowY(c.row);
        const isCont = c.col === p.col;
        let d;
        if (isCont) {
          // Straight vertical: top-center of parent to bottom-center of child
          const x = pX + NODE_W / 2;
          d = `M ${x} ${pY} L ${x} ${cY + NODE_H}`;
        } else {
          // L-shape: from parent's right-middle, horizontal to branch's center-x,
          // then vertical up to branch bottom.
          const x1 = pX + NODE_W;
          const y1 = pY + NODE_H / 2;
          const x2 = cX + NODE_W / 2;
          const y2 = cY + NODE_H;
          d = `M ${x1} ${y1} L ${x2} ${y1} L ${x2} ${y2}`;
        }
        const path = svgEl('path', {
          class: 'tree-edge',
          d, fill: 'none',
          'marker-end': 'url(#arrow)'
        });
        edgeGroup.appendChild(path);
      }
    }
    newSvg.appendChild(edgeGroup);

    // Nodes
    const nodeGroup = svgEl('g', {});
    const ratingColors = { L: 'var(--rate-l)', M: 'var(--rate-m)', H: 'var(--rate-h)' };
    const visibleNodes = getVisibleNodes();

    for (const n of visibleNodes) {
      const p = positions[n.address];
      if (!p) continue;
      const isCurrent = n.address === state.currentAddr;
      const isEmptied = n.emptied === true;
      const hasText = !!(n.text && n.text.trim()) && !isEmptied;
      const rating = ratingForAddr(n.address);
      const px = colX(p.col), py = rowY(p.row);

      const g = svgEl('g', {
        class: 'tree-node',
        transform: `translate(${px}, ${py})`,
        style: 'cursor: pointer;' + (isEmptied ? ' opacity: 0.38;' : '')
      });

      const rect = svgEl('rect', { x: 0, y: 0, width: NODE_W, height: NODE_H, rx: 0 });
      if (isCurrent)  { rect.setAttribute('stroke', 'var(--fox)'); rect.setAttribute('stroke-width', '2'); }
      if (hasText)    rect.setAttribute('fill', 'var(--bg-elev)');
      if (isEmptied)  { rect.setAttribute('stroke-dasharray', '4 3'); rect.setAttribute('fill', 'var(--bg-card)'); }
      g.appendChild(rect);

      if (!isEmptied) {
        const dot = svgEl('circle', { cx: NODE_W - 8, cy: 8, r: 3, fill: ratingColors[rating] || 'var(--ink-dim)' });
        g.appendChild(dot);
      }

      const addrText = svgEl('text', {
        x: NODE_W / 2, y: NODE_H / 2 + 1,
        'text-anchor': 'middle', 'dominant-baseline': 'middle',
        class: 'addr' + (isCurrent ? ' curr' : ''),
        style: isCurrent ? 'fill: var(--fox); font-weight: bold;'
             : isEmptied ? 'fill: var(--ink-dim);' : ''
      });
      addrText.textContent = n.address.length > 7 ? n.address.slice(0, 6) + '…' : n.address;
      g.appendChild(addrText);

      g.addEventListener('click', () => {
        closeTreeView();
        navigateTo(n.address, true);
      });
      nodeGroup.appendChild(g);
    }

    // Ghosts (hidden when hideEmpty is on, since they're empty-adjacent)
    if (!hideEmpty) {
      for (const ghostAddr of ghosts) {
        const p = positions[ghostAddr];
        if (!p) continue;
        const px = colX(p.col), py = rowY(p.row);
        const g = svgEl('g', {
          class: 'tree-node tree-ghost',
          transform: `translate(${px}, ${py})`,
          style: 'cursor: pointer;'
        });
        const rect = svgEl('rect', {
          x: 0, y: 0, width: NODE_W, height: NODE_H, rx: 0,
          fill: 'rgba(249, 115, 22, 0.07)',
          stroke: 'var(--fox-soft)', 'stroke-width': '1.5', 'stroke-dasharray': '4 3'
        });
        g.appendChild(rect);
        const addrText = svgEl('text', {
          x: NODE_W / 2, y: NODE_H / 2 - 4,
          'text-anchor': 'middle', 'dominant-baseline': 'middle',
          style: 'fill: var(--ink-soft); font-size: 10px; font-family: var(--mono);'
        });
        addrText.textContent = ghostAddr.length > 7 ? ghostAddr.slice(0, 6) + '…' : ghostAddr;
        g.appendChild(addrText);
        const plus = svgEl('text', {
          x: NODE_W / 2, y: NODE_H / 2 + 9,
          'text-anchor': 'middle', 'dominant-baseline': 'middle',
          style: 'fill: var(--fox); font-size: 14px; font-family: var(--sans); font-weight: bold;'
        });
        plus.textContent = '+';
        g.appendChild(plus);
        g.addEventListener('click', () => {
          closeTreeView();
          const seg = _segLast(ghostAddr);
          const isRoot = seg && /^[0-9]+A$/.test(seg);
          openWriter('new', { addr: ghostAddr, isRoot });
        });
        nodeGroup.appendChild(g);
      }
    }

    newSvg.appendChild(nodeGroup);
    newSvg.style.transform = `translate(${ox}px, ${oy}px) scale(${scale})`;
    newSvg.style.transformOrigin = '0 0';

    if (svg && svg.parentNode) svg.parentNode.replaceChild(newSvg, svg);
    svg = newSvg;
  }

  rebuildSVG();

  // Build header with eye toggle
  const eyeBtn = iconBtn(hideEmpty ? 'eyeOff' : 'eye', hideEmpty ? 'Show empty' : 'Hide empty', () => {
    hideEmpty = !hideEmpty;
    saveSetting('treeHideEmpty', hideEmpty);
    eyeBtn.title = hideEmpty ? 'Show empty' : 'Hide empty';
    eyeBtn.setAttribute('aria-label', hideEmpty ? 'Show empty' : 'Hide empty');
    eyeBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">${ICON[hideEmpty ? 'eyeOff' : 'eye']}</svg>`;
    buildLayout();
    rebuildSVG();
    centerOnCurrent();
  });

  // Eye toggle and close grouped on the right of the header
  const headerActions = el('div', { style: 'display: flex; gap: 4px; align-items: center;' },
    eyeBtn,
    iconBtn('check', 'Close', closeTreeView)
  );
  const header = el('div', { class: 'tree-header' },
    el('div', { class: 'tree-title' }, 'Tree · ' + allNodes.length + ' nodes' +
      (ghosts.size > 0 ? ' · ' + ghosts.size + ' gap' + (ghosts.size === 1 ? '' : 's') : '')),
    headerActions
  );

  function applyTransform() {
    if (svg) {
      svg.style.transform = `translate(${ox}px, ${oy}px) scale(${scale})`;
      svg.style.transformOrigin = '0 0';
    }
  }

  // Convert a position {col, row} to pixel coords for the centering math.
  // Mirrors what rebuildSVG does internally.
  function centerOnCurrent() {
    const curPos = positions[state.currentAddr];
    if (!curPos) return;
    let maxRow = 0;
    for (const p of Object.values(positions)) if (p.row > maxRow) maxRow = p.row;
    const px = curPos.col * CELL_W;
    const py = (maxRow - curPos.row) * CELL_H;
    const vw = window.innerWidth;
    const vh = window.innerHeight - 52;
    ox = vw / 2 - (px + NODE_W / 2) * scale;
    oy = vh / 2 - (py + NODE_H / 2) * scale;
    applyTransform();
  }

  const canvasWrap = el('div', { class: 'tree-canvas-wrap' });
  canvasWrap.appendChild(svg);
  canvasWrap.appendChild(el('div', { class: 'tree-direction-hint' }, '↑ continuations go up · branches go right ↑'));
  canvasWrap.appendChild(el('div', { class: 'tree-hint' }, 'Drag to pan · Pinch or scroll to zoom · Tap a node to jump'));

  centerOnCurrent();

  // Unified pointer event handling. We track every active pointer in a Map
  // so we can distinguish between single-pointer pan and two-pointer pinch
  // without ever mixing pointer events with touch events.
  const activePointers = new Map();
  let pinchStartDist = 0;
  let pinchStartScale = 1;
  let pinchCenter = { x: 0, y: 0 };
  let panStart = null;
  let suppressClick = false;

  function getTwoPointers() {
    const arr = [...activePointers.values()];
    return arr.length >= 2 ? [arr[0], arr[1]] : null;
  }

  canvasWrap.addEventListener('pointerdown', (e) => {
    // Don't capture pointer here — capturing prevents click events from
    // reaching child SVG nodes on desktop. We only set capture if the user
    // actually starts dragging past the threshold (handled in pointermove).
    activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (activePointers.size === 1) {
      panStart = { x: e.clientX, y: e.clientY, ox, oy };
    } else if (activePointers.size === 2) {
      panStart = null;
      const two = getTwoPointers();
      const dx = two[0].x - two[1].x;
      const dy = two[0].y - two[1].y;
      pinchStartDist = Math.hypot(dx, dy) || 1;
      pinchStartScale = scale;
      const rect = canvasWrap.getBoundingClientRect();
      pinchCenter = {
        x: (two[0].x + two[1].x) / 2 - rect.left,
        y: (two[0].y + two[1].y) / 2 - rect.top
      };
      // Two-finger touch needs capture so we can track both fingers reliably
      try { canvasWrap.setPointerCapture(e.pointerId); } catch {}
    }
  });

  canvasWrap.addEventListener('pointermove', (e) => {
    if (!activePointers.has(e.pointerId)) return;
    activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if (activePointers.size === 1 && panStart) {
      const dx = e.clientX - panStart.x;
      const dy = e.clientY - panStart.y;
      // Only start panning after a real movement threshold so tiny mouse
      // jitter on a click doesn't trigger drag mode.
      if (Math.abs(dx) > 4 || Math.abs(dy) > 4) {
        suppressClick = true;
        // Now that we're really dragging, capture the pointer so we get
        // pointermove even outside the canvas
        try { canvasWrap.setPointerCapture(e.pointerId); } catch {}
      }
      if (suppressClick) {
        ox = panStart.ox + dx;
        oy = panStart.oy + dy;
        applyTransform();
      }
    } else if (activePointers.size === 2) {
      const two = getTwoPointers();
      const dx = two[0].x - two[1].x;
      const dy = two[0].y - two[1].y;
      const dist = Math.hypot(dx, dy) || 1;
      const newScale = Math.min(Math.max(pinchStartScale * (dist / pinchStartDist), 0.1), 4);
      // Zoom around the pinch center: keep the world-point under the center fixed
      const factor = newScale / scale;
      ox = pinchCenter.x - (pinchCenter.x - ox) * factor;
      oy = pinchCenter.y - (pinchCenter.y - oy) * factor;
      scale = newScale;
      suppressClick = true;
      applyTransform();
    }
  });

  function endPointer(e) {
    activePointers.delete(e.pointerId);
    if (activePointers.size < 2) {
      pinchStartDist = 0;
    }
    if (activePointers.size === 1) {
      // After pinch ends with one finger remaining, restart pan from current position
      const remaining = [...activePointers.values()][0];
      panStart = { x: remaining.x, y: remaining.y, ox, oy };
    }
    if (activePointers.size === 0) {
      panStart = null;
      // Suppress click for a tick so it doesn't bubble after a drag
      setTimeout(() => { suppressClick = false; }, 50);
    }
  }
  canvasWrap.addEventListener('pointerup', endPointer);
  canvasWrap.addEventListener('pointercancel', endPointer);

  // Capture-phase click guard for node taps after a drag
  canvasWrap.addEventListener('click', (e) => {
    if (suppressClick) {
      e.stopPropagation();
      e.preventDefault();
    }
  }, true);

  // Wheel zoom (desktop)
  canvasWrap.addEventListener('wheel', (e) => {
    e.preventDefault();
    const factor = e.deltaY > 0 ? 0.9 : 1.1;
    const rect = canvasWrap.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const newScale = Math.min(Math.max(scale * factor, 0.1), 4);
    const realFactor = newScale / scale;
    ox = mx - (mx - ox) * realFactor;
    oy = my - (my - oy) * realFactor;
    scale = newScale;
    applyTransform();
  }, { passive: false });

  $treeOverlay.innerHTML = '';
  $treeOverlay.appendChild(header);
  $treeOverlay.appendChild(canvasWrap);
  void $treeOverlay.offsetWidth;
  $treeOverlay.classList.add('show');
}

/* ============================================================
   Boot
   ============================================================ */

async function boot() {
  document.title = APP_NAME + ' — CYOA creation and reading engine';
  await loadSettings();
  applyTheme(state.settings.theme || 'fox-dark');
  applyScales();

  if (!state.settings.hasOnboarded) {
    await showOnboarding();
    return;
  }

  await bootStorySelection();

  // Allow animations after first paint
  setTimeout(() => $app.classList.remove('no-anim'), 50);
}

async function bootStorySelection() {
  const last = state.settings.lastStory;
  if (last) {
    const reg = await registry.stories.get(last);
    if (reg) {
      await setStory(last);
      // Explicit URL hash (shared link / bookmark) wins and skips the boot —
      // a deep link is a deliberate jump to a specific node, not a "fresh open".
      if (location.hash && location.hash.length > 1) {
        const addr = location.hash.slice(1).toUpperCase();
        if (isValidAddress(addr) && await nodeExists(addr)) {
          recordPosition(addr);
          await renderMain();
          return;
        }
      }
      // Otherwise defer entirely to pickStartTimeline, which owns resume +
      // boot. (Previously this re-implemented resume here and rendered WITHOUT
      // a boot, so startup-resume and picker-open behaved inconsistently, and
      // the overlapping logic was the source of an occasional double boot.)
      await pickStartTimeline();
      return;
    }
  }
  await showStoryPicker();
}

window.addEventListener('hashchange', async () => {
  if (!state.story) return;
  const addr = location.hash.slice(1).toUpperCase();
  if (isValidAddress(addr) && addr !== state.currentAddr) {
    if (await nodeExists(addr)) {
      const prev = state.currentAddr;
      recordPosition(addr);
      await renderMain();
      if (prev && prev !== addr) shiftTick();
    }
  }
});

window.addEventListener('popstate', async (e) => {
  // Android back button: if a sheet or overlay is open, close it instead
  // of navigating. The pushState in openSheet/openOverlay created this entry.
  if (e.state && e.state.overlay === 'sheet') {
    closeSheet();
    return;
  }
  if (e.state && e.state.overlay === 'overlay') {
    closeOverlay();
    return;
  }
  if (!state.story) return;
  const addr = (e.state && e.state.addr) || location.hash.slice(1).toUpperCase();
  if (isValidAddress(addr) && addr !== state.currentAddr) {
    if (await nodeExists(addr)) {
      const prev = state.currentAddr;
      recordPosition(addr);
      await renderMain();
      // Back/forward is a navigation, so it counts toward the (opt-in) forced
      // shift, same as the on-screen Back button. Opens are excluded elsewhere.
      if (prev && prev !== addr) shiftTick();
    }
  }
});

// Wait for Dexie to be available
function waitForDexie(cb) {
  if (typeof Dexie !== 'undefined') cb();
  else setTimeout(() => waitForDexie(cb), 50);
}

waitForDexie(() => {
  boot().catch(err => {
    console.error(err);
    document.body.innerHTML = `<pre style="padding:20px;color:#e8e3d8;background:#0d0c0b;">${err.message}\n${err.stack}</pre>`;
  });
});

</script>
