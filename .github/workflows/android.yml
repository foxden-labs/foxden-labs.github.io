name: Build Android APK

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: npm install

      - name: Stage the web app into the webDir
        run: |
          mkdir -p www
          cp index.html www/index.html
          cp tutorial.cyoa www/tutorial.cyoa 2>/dev/null || true

      - name: Generate the Android project
        run: npx cap add android

      - name: Copy the web assets into it
        run: npx cap sync android

      - name: Generate app icons
        run: npx @capacitor/assets generate --android --iconBackgroundColor '#000000' --iconBackgroundColorDark '#000000' --splashBackgroundColor '#000000' --splashBackgroundColorDark '#000000'

      - name: Build the debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename the APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk the-den.apk

      - name: Upload APK as an artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: the-den-apk
          path: the-den.apk

      - name: Attach the APK to the release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: the-den.apk
