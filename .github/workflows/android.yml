name: Build Android APK

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: npm install

      - name: Stage the web app into the webDir
        run: |
          mkdir -p www
          cp index.html www/index.html
          cp tutorial.cyoa www/tutorial.cyoa 2>/dev/null || true

      - name: Generate the Android project
        run: npx cap add android

      - name: Set the app version
        run: |
          NAME="${GITHUB_REF_NAME#v}"
          [ "$NAME" = "main" ] && NAME="0.0.${GITHUB_RUN_NUMBER}"
          sed -i -E "s/versionCode [0-9]+/versionCode ${GITHUB_RUN_NUMBER}/" android/app/build.gradle
          sed -i -E "s/versionName \"[^\"]*\"/versionName \"${NAME}\"/" android/app/build.gradle

      - name: Copy the web assets into it
        run: npx cap sync android

      - name: Generate app icons
        run: npx @capacitor/assets generate --android --iconBackgroundColor '#000000' --iconBackgroundColorDark '#000000' --splashBackgroundColor '#000000' --splashBackgroundColorDark '#000000'

      # Pull the permanent signing key out of repo Secrets and write it to a
      # temp file. RUNNER_TEMP is wiped when the job ends, so the key never
      # lingers on the runner. KEYSTORE_BASE64 is the keystore file you made
      # locally, base64-encoded.
      - name: Decode the signing keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      # assembleRelease (not Debug) so we get a release variant, and the
      # android.injected.signing.* props tell Gradle to sign it with OUR key
      # instead of the random debug one. This is the actual fix for the
      # "signatures don't match, update blocked" problem.
      - name: Build the release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/release.keystore" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename the APK
        run: cp android/app/build/outputs/apk/release/app-release.apk the-den.apk

      - name: Upload APK as an artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: the-den-apk
          path: the-den.apk

      - name: Attach the APK to the release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: the-den.apk
